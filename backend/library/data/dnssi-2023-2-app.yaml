- code: ACTIF--RESP-CARTO
  domain: DOMAIN-4
  title:
    en: Cartographie SI
    fr: Cartographie SI
  description:
    en: 'Chaque entité ou IIV doit tenir et mettre à jour une cartographie de son SI qui précise les composants matériels et logiciels ainsi que les architectures des réseaux sur lesquels sont identifiés les centres de données et les différents sites desservis.


      Les documents de cartographie doivent être maintenus au fil des évolutions apportées aux SI et faire l''objet d''une protection adaptée.'
