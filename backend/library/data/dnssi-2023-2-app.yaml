- code: CRYPTO-MES-POL
  domain: DOMAIN-6
  title:
    en: Politique d'utilisation des mesures cryptographiques
    fr: Politique d'utilisation des mesures cryptographiques
  description:
    en: 'En cas de recours à la cryptographie, l''entité ou l''IIV doit élaborer et mettre en œuvre une politique d''utilisation de mesures cryptographiques en vue de protéger l''information.


      Cette politique doit spécifier notamment les exigences en matière de certificats de signature ou de chiffrement (délai maximum de validité, algorithme, longueurs de clés, etc .. ) ou en matière de connexions chiffrées (protocoles autorisés).'
