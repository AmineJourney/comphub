      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
  requirements: []
- code: POL-PAS
  domain: DOMAIN-1
  title:
    en: Plan d'actions de la sécurité des SI
    fr: Plan d'actions de la sécurité des SI
  description:
    en: Chaque entité ou IIV doit définir un plan d'actions pour la mise en conformité avec sa politique de sécurité des SI. Ce plan d'actions tiendra compte des impacts sur les activités, et des moyens financiers et humains à mettre en œuvre en indiquant les mesures à court terme et les mesures atteignables à moyen terme.
    fr: Chaque entité ou IIV doit définir un plan d'actions pour la mise en conformité avec sa politique de sécurité des SI. Ce plan d'actions tiendra compte des impacts sur les activités, et des moyens financiers et humains à mettre en œuvre en indiquant les mesures à court terme et les mesures atteignables à moyen terme.
