- code: INCID-GEST-REPONSE
  domain: DOMAIN-12
  title:
    en: Réponse aux incidents liés à la sécurité des SI
    fr: Réponse aux incidents liés à la sécurité des SI
  description:
    en: 'Dès qu’un incident de cybersécurité est confirmé, chaque entité ou IIV doit attribuer les rôles et responsabilités aux

      différents membres de l’équipe d’intervention interne, externe ou mixte, et s’assurer que toutes les tâches

      concernant la réponse sont correctement réalisées et journalisées conformément à une procédure de réponse

      formalisée.'
    fr: 'Dès qu’un incident de cybersécurité est confirmé, chaque entité ou IIV doit attribuer les rôles et responsabilités aux

