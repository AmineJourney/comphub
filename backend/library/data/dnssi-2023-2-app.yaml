- code: DEV-PROC-POL
  domain: DOMAIN-10
  title:
    en: Politique de développement sécurisé
    fr: Politique de développement sécurisé
  description:
    en: 'Chaque entité ou IIV doit élaborer et mettre en place, conformément aux guides et référentiels élaborés par la DGSSI, une politique de développement sécurisé des logiciels et des systèmes, qui définit notamment :


      - les exigences de sécurité de l''environnement de développement ;


      - les exigences de sécurité dans la phase de conception ;


      - les points de contrôle de la sécurité aux différentes étapes clés du projet ;


      - les référentiels de développement sécurisé à utiliser ;


      - les règles de protection du code source et le contrôle des versions.'
    fr: 'Chaque entité ou IIV doit élaborer et mettre en place, conformément aux guides et référentiels élaborés par la DGSSI, une politique de développement sécurisé des logiciels et des systèmes, qui définit notamment :


      - les exigences de sécurité de l''environnement de développement ;


      - les exigences de sécurité dans la phase de conception ;


      - les points de contrôle de la sécurité aux différentes étapes clés du projet ;


      - les référentiels de développement sécurisé à utiliser ;


      - les règles de protection du code source et le contrôle des versions.'
