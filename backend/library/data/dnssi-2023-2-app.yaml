- code: RH-AVT--PERSON
  domain: DOMAIN-3
  title:
    en: Personnel de confiance
    fr: Personnel de confiance
  description:
    en: A l'embauche, des vérifications des informations des candidats appelés à travailler sur des tâches sensibles au sein de l'entité ou de l'IIV doivent être réalisées conformément à la réglementation, à l'éthique, et proportionnellement aux exigences métier et à la classification des actifs informationnels accessibles.
