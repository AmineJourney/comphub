- code: INCID-GEST-ALERT
  domain: DOMAIN-12
  title:
    en: Réaction aux alertes liés à la sécurité des SI
    fr: Réaction aux alertes liés à la sécurité des SI
  description:
    en: 'Chaque entité ou IIV doit mobiliser les ressources internes et/ou externes pour réagir efficacement aux alertes liées

      à la sécurité des SI.

      Ces alertes peuvent provenir soit d’un éditeur ou fournisseur, soit du centre de veille, de détection et de réponses

      aux attaques informatiques (ma-CERT) relevant de la DGSSI.

      Dans ce dernier cas, l’entité ou l’IIV accuse réception de l’alerte et transmet par la suite, si elle est impactée par

      cette alerte, un compte rendu d’exécution à la DGSSI.'
