- code: RH-FIN-GEST
  domain: DOMAIN-3
  title:
    en: Gestion des mutations et départs
    fr: Gestion des mutations et départs
  description:
    en: 'Afin de préserver la confidentialité et l''intégrité de l''information, chaque entité ou IIV doit formaliser et mettre en place une procédure de gestion des mutations ou des départs qui couvre notamment :


      - La notification au service informatique par le service des ressources humaines de tout mouvement du personnel ;


      - La passation des consignes ;


      - La restitution des biens informatiques ;


      - Le retrait ou la modification des accès aux SI.'
    fr: 'Afin de préserver la confidentialité et l''intégrité de l''information, chaque entité ou IIV doit formaliser et mettre en place une procédure de gestion des mutations ou des départs qui couvre notamment :


