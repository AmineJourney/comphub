- code: ACC-EXIG-POL
  domain: DOMAIN-5
  title:
    en: Politique de contrôle d'accès
    fr: Politique de contrôle d'accès
  description:
    en: Chaque entité ou IIV est tenue d'établir, de documenter et de revoir une politique de contrôle d'accès aux systèmes, réseaux et services sur la base des exigences métier et de sécurité de l'information en respectant le principe du moindre privilège.
    fr: Chaque entité ou IIV est tenue d'établir, de documenter et de revoir une politique de contrôle d'accès aux systèmes, réseaux et services sur la base des exigences métier et de sécurité de l'information en respectant le principe du moindre privilège.
