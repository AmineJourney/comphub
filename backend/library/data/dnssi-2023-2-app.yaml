controls:
- code: POL-RISQUE
  domain: DOMAIN-1
  title:
    en: Analyse de risque
    fr: Analyse de risque
  description:
    en: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à ce système d'information.
    fr: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à ce système d'information.
  guidance:
    en: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à ce système d'information.
    fr: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à ce système d'information.
  requirements: []
- code: POL-FORMEL
  domain: DOMAIN-1
  title:
    en: Politique de sécurité des systèmes d'information
    fr: Politique de sécurité des systèmes d'information
  description:
    en: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour gérer les besoins identifiés de sécurité des SI.


      Cette politique doit être déclinée au besoin en politiques spécifiques par domaine ou par aspect de sécurité.


      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
    fr: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour gérer les besoins identifiés de sécurité des SI.


      Cette politique doit être déclinée au besoin en politiques spécifiques par domaine ou par aspect de sécurité.


      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
  guidance:
    en: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour gérer les besoins identifiés de sécurité des SI.


      Cette politique doit être déclinée au besoin en politiques spécifiques par domaine ou par aspect de sécurité.


      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
    fr: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour gérer les besoins identifiés de sécurité des SI.


