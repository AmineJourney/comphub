- code: ORG-INTER-RESP
  domain: DOMAIN-2
  title:
    en: Attribution des rôles et responsabilités
    fr: Attribution des rôles et responsabilités
  description:
    en: 'Chaque entité ou IIV doit définir et attribuer les rôles et responsabilités des différents acteurs en matière de sécurité des SI.


      Cette attribution doit tenir compte de la séparation entre les tâches et les domaines de responsabilité incompatibles.'
