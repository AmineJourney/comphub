- code: ORG-INTER-RSSI
  domain: DOMAIN-2
  title:
    en: Désignation d'un responsable de la sécurité des SI (RSSI)
    fr: Désignation d'un responsable de la sécurité des SI (RSSI)
  description:
    en: 'Les règles applicables à la désignation et aux missions du RSSI sont fixées par la loi n° 05-20 relative à la cybersécurité et son décret d''application.


      Tout changement de l''identité et des coordonnées du RSSI doit être porté à la connaissance de la DGSSI.'
    fr: 'Les règles applicables à la désignation et aux missions du RSSI sont fixées par la loi n° 05-20 relative à la cybersécurité et son décret d''application.


