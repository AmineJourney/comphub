- code: ORG-INTER-GOUV
  domain: DOMAIN-2
  title:
    en: Gouvernance de la sécurité des SI
    fr: Gouvernance de la sécurité des SI
  description:
    en: 'Chaque entité ou IIV doit mettre en place une gouvernance appropriée de la sécurité des SI avec l''implication notamment d''un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) de l''entité ou de l''IIV, et ce afin de définir les orientations stratégiques en matière de sécurité des SI et assurer le suivi de l''avancement de l''ensemble des projets y afférents.'
    fr: 'Chaque entité ou IIV doit mettre en place une gouvernance appropriée de la sécurité des SI avec l''implication notamment d''un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) de l''entité ou de l''IIV, et ce afin de définir les orientations stratégiques en matière de sécurité des SI et assurer le suivi de l''avancement de l''ensemble des projets y afférents.'
