- code: ACTIF-SUP-REB
  domain: DOMAIN-4
  title:
    en: Mise au rebut ou recyclage des supports
    fr: Mise au rebut ou recyclage des supports
  description:
    en: 'Une procédure de mise au rebut ou de recyclage des supports doit être mise en place afin d''effacer de manière sécurisée les données présentes sur tous type de support (les disques durs, les mémoires intégrées, ... ).


      Dans le cas de données sensibles, la destruction du support ou sa démagnétisation si applicable, peut s''avérer nécessaire de manière à empêcher toute tentative de récupération.'
