    fr: Chaque entité ou IIV doit définir un plan d'actions pour la mise en conformité avec sa politique de sécurité des SI. Ce plan d'actions tiendra compte des impacts sur les activités, et des moyens financiers et humains à mettre en œuvre en indiquant les mesures à court terme et les mesures atteignables à moyen terme.
  requirements: []
- code: POL-TDB
  domain: DOMAIN-1
  title:
    en: Tableau de bord de la sécurité des SI
    fr: Tableau de bord de la sécurité des SI
  description:
    en: 'Chaque entité ou IIV doit élaborer et se servir d''un tableau de bord de la sécurité des SI pour assurer le suivi de la bonne application des règles édictées dans sa politique de sécurité.


      Le tableau de bord doit se baser sur des indicateurs permettant le suivi de la mise en œuvre des règles de sécurité des SI propres à l''entité ou à l''IIV.'
    fr: 'Chaque entité ou IIV doit élaborer et se servir d''un tableau de bord de la sécurité des SI pour assurer le suivi de la bonne application des règles édictées dans sa politique de sécurité.


      Le tableau de bord doit se baser sur des indicateurs permettant le suivi de la mise en œuvre des règles de sécurité des SI propres à l''entité ou à l''IIV.'
