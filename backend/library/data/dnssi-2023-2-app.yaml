- code: ACTIF--CLASSIF-MES
  domain: DOMAIN-4
  title:
    en: Mesures de protection des informations
    fr: Mesures de protection des informations
  description:
    en: 'Sur la base des résultats de ces classifications, chaque entité ou IIV doit mettre en place les mesures de sécurité proportionnelles à la sensibilité des actifs et les formaliser dans une procédure de classification des actifs informationnels.


      L''entité ou l''IIV doit également se conformer aux dispositions pertinentes de la loi nº 05-20 relative à la cybersécurité et son décret d''application et appliquer les mesures de protection définies dans les référentiels élaborés par la DGSSI.'
    fr: 'Sur la base des résultats de ces classifications, chaque entité ou IIV doit mettre en place les mesures de sécurité proportionnelles à la sensibilité des actifs et les formaliser dans une procédure de classification des actifs informationnels.


