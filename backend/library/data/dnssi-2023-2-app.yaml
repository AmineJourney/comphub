- code: ACTIF-SUP-AMOV
  domain: DOMAIN-4
  title:
    en: Gestion des supports amovibles
    fr: Gestion des supports amovibles
  description:
    en: 'Chaque entité ou IIV doit mettre en place des mesures appropriées pour la gestion des supports amovibles notamment :


      - la désactivation de leur exécution automatique, sauf dans des cas exceptionnels liés à des impératifs de service ;


      - leur conservation dans des locaux protégés et l''adoption de mesures adaptées tel que le chiffrement, le contrôle anti-virus, etc. surtout lorsqu''ils contiennent des données sensibles ;'
    fr: 'Chaque entité ou IIV doit mettre en place des mesures appropriées pour la gestion des supports amovibles notamment :


