- code: CONF-REVU-SSI
  domain: DOMAIN-14
  title:
    en: Verification of information systems security compliance
    fr: Vérification de la conformité de la sécurité des SI
  description:
    en: Each entity or critical infrastructure operator must regularly audit the security compliance of its information systems.
      Each audit must result in recommendations, which must be implemented through action plans in coordination with the relevant
      structures. Audit reports may be made available to the DGSSI upon request.
    fr: 'Chaque entité ou IIV doit auditer régulièrement la conformité de la sécurité de ses systèmes d’information.

      Chaque opération d’audit doit donner lieu à des recommandations. Celles-ci doivent être mises en œuvre dans le

      cadre de plans d’actions en concertation avec les structures concernées.

      A sa demande, les rapports d’audit peuvent être mis à la disposition de la DGSSI.'
