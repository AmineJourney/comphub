- code: CONTINU-BIA
  domain: DOMAIN-13
  title:
    en: Analyse d’impact sur l’activité
    fr: Analyse d’impact sur l’activité
  description:
    en: 'Chaque entité ou IIV est tenue d’établir une analyse d’impacts sur son activité, qui consiste à :

      - identifier les activités et processus critiques ;

      - analyser les risques liés aux activités et processus ;

      - analyser les impacts qui résulteraient d’un arrêt de ces activités et processus critiques ;

      - déterminer comment ces impacts évolueraient dans le temps en cas d’arrêt prolongé ;

      - établir le temps d’arrêt ou d’indisponibilité maximum supportable des activités critiques ;

      - identifier et considérer toute activité critique dépendant d’autres entités ou IIV, des fournisseurs et

      d’autres tiers ;

      - estimer le délai cible de rétablissement des activités après un sinistre ;

      - estimer les ressources humaines, techniques et logistiques que chaque activité critique requiert pour sa

      reprise.'
