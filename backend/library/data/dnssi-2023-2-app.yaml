- code: DEV-EXIG-PROJET
  domain: DOMAIN-10
  title:
    en: Sécurité de l'information dans la gestion de projet
    fr: Sécurité de l'information dans la gestion de projet
  description:
    en: 'Chaque entité ou IIV doit traiter la sécurité de l''information dans la gestion de tous types de projets SI. A ce titre, la sécurité doit être intégrée à toutes les phases du cycle de vie du projet de manière à s''assurer notamment que :


      - une appréciation du risque, liée à la sécurité de l''information, soit effectuée au commencement du projet pour identifier les exigences de sécurité ;


      - les objectifs en matière de sécurité de l''information soient intégrés aux objectifs du projet et pris en compte dès la conception ;


      - la vérification de la sécurité soit intégrée dans les tests d''acceptation.'
