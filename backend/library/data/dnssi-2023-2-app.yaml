- code: ACC-SYS/APP-MDP
  domain: DOMAIN-5
  title:
    en: Gestion des mots de passe
    fr: Gestion des mots de passe
  description:
    en: 'Chaque entité ou IIV est tenue de formaliser une politique de gestion des mots de passe qui définit les règles applicables aux mots de passe, en particulier :


      - la structure (complexité minimale) ;


      - le changement périodique ;


      - la suppression en cas de suspicion de compromission ;


      - la réinitialisation ;


      Un processus de contrôle de l''application de ces règles doit être déployé.'
