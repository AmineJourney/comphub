- code: ACTIF-RESP-INV
  domain: DOMAIN-4
  title:
    en: Inventaire des actifs
    fr: Inventaire des actifs
  description:
    en: 'Un inventaire des actifs informationnels (matériels et logiciels) doit être réalisé et mis à jour régulièrement, intégrant notamment :


      - la liste des composants matériels (avec nº de série) et logiciels (avec nº de licence);


      - la version du système d''exploitation et les correctifs appliqués ;


      - l''identification de l''utilisateur final si applicable (poste de travail, téléphonie IP, imprimante, ... ).'
    fr: 'Un inventaire des actifs informationnels (matériels et logiciels) doit être réalisé et mis à jour régulièrement, intégrant notamment :


