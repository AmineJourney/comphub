- code: EXP--JOURN/SURV-JOURNAL
  domain: DOMAIN-8
  title:
    en: Journalisation des événements
    fr: Journalisation des événements
  description:
    en: 'Chaque entité ou IIV doit mener une étude pour identifier les journaux à collecter des différentes sources (serveurs, équipements de sécurité, équipements réseaux, applications, postes de travail, etc.) en fonction des risques et incidents redoutés par l''entité ou par l''IIV. Elle doit mettre en place un journal répertoriant les événements de sécurité à collecter. Ces journaux doivent être analysés périodiquement et les actions à mener doivent être bien définies.


      Ces journaux doivent être centralisés et protégés contre les risques de falsification ou d''accès non autorisé. Ils doivent être conservés pour une durée minimale de six mois.'
