- code: PHYS-ZONE-DELIMIT
  domain: DOMAIN-7
  title:
    en: Délimitation des zones
    fr: Délimitation des zones
  description:
    en: 'Des zones physiques de sécurité doivent être délimitées pour protéger les SI et les moyens de traitement associés. Cette délimitation peut se faire selon la typologie suivante :


      - zones publiques : autorisées à toute personne.


      - zones internes : autorisées uniquement au personnel de l''entité ou de l''IIV, aux tiers autorisés ou aux visiteurs accompagnés.


      - zones restreintes : accessibles uniquement aux personnes de l''entité ou de l''IIV habilitées à consulter, à traiter et manipuler des informations ou des équipements classifiés, et le cas échéant aux tiers autorisés et accompagnés.'
    fr: 'Des zones physiques de sécurité doivent être délimitées pour protéger les SI et les moyens de traitement associés. Cette délimitation peut se faire selon la typologie suivante :


