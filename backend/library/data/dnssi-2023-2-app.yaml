- code: ACTIF-SUP-MOBIL
  domain: DOMAIN-4
  title:
    en: Politique en matière d'appareils mobiles
    fr: Politique en matière d'appareils mobiles
  description:
    en: Les règles de sécurité destinées à gérer les risques découlant de l'utilisation des appareils mobiles doivent faire partie intégrante de la politique de sécurité des SI de l'entité ou de l'IIV.
    fr: Les règles de sécurité destinées à gérer les risques découlant de l'utilisation des appareils mobiles doivent faire partie intégrante de la politique de sécurité des SI de l'entité ou de l'IIV.
