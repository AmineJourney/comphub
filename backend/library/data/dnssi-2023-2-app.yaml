- code: INCID-GEST-PREUV
  domain: DOMAIN-12
  title:
    en: Recueil des preuves
    fr: Recueil des preuves
  description:
    en: 'En cas d’attaque suspectée, chaque entité ou IIV doit définir et appliquer les procédures relatives :

