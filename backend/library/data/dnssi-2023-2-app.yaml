- code: ACC-UTILIS-IDF/AUTH
  domain: DOMAIN-5
  title:
    en: Identification et authentification
    fr: Identification et authentification
  description:
    en: 'L''accès des utilisateurs aux ressources (réseaux, système d''exploitation ou applications informatiques) passe obligatoirement par une identification et une authentification individuelle.


      Les droits particuliers (super-utilisateur, Administrateur systèmes et réseaux, ... ) doivent être parfaitement identifiés, limités (nombre et droits) et justifiés.'
