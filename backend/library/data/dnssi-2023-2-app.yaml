- code: ACTIF-SUP-NOMAD
  domain: DOMAIN-4
  title:
    en: Postes nomades
    fr: Postes nomades
  description:
    en: 'Les postes nomades doivent être tous soumis aux mêmes mesures de sécurité que les autres équipements du parc en termes de mise à jour régulière de l''antivirus, application des correctifs, contrôle de conformité et interdiction des téléchargements à caractère non conforme à la charte d''utilisation du SI.


      En cas d''utilisation de ces postes hors des locaux de travail (mission, conférence, réunion, etc.), une procédure formalisée doit être prévue pour leur protection.'
    fr: 'Les postes nomades doivent être tous soumis aux mêmes mesures de sécurité que les autres équipements du parc en termes de mise à jour régulière de l''antivirus, application des correctifs, contrôle de conformité et interdiction des téléchargements à caractère non conforme à la charte d''utilisation du SI.


      En cas d''utilisation de ces postes hors des locaux de travail (mission, conférence, réunion, etc.), une procédure formalisée doit être prévue pour leur protection.'
