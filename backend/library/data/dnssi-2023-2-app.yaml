- code: FOURNIS-REL-EXIG
  domain: DOMAIN-11
  title:
    en: Exigences contractuelles
    fr: Exigences contractuelles
  description:
    en: 'Les contrats conclus doivent prévoir les exigences de l’entité ou de l’IIV en termes de sécurité et de niveaux de

      service. Les fournisseurs et les prestataires sont tenus conformément aux contrats conclus de respecter la politique

      de sécurité des SI de l’entité ou de l’IIV.

      Des clauses d’auditabilité et de réversibilité sont à prévoir lorsqu’il s’agit de contrats d’externalisation, et ce

      conformément aux dispositions de la loi n°05-20 relative à la cybersécurité.'
