- code: ACTIF--CLASSIF--EXAM
  domain: DOMAIN-4
  title:
    en: Examen de la classification
    fr: Examen de la classification
  description:
    en: Chaque entité ou IIV doit revoir la classification de ses actifs informationnels et de ses SI au moins une fois tous les trois ans et à chaque fois que nécessaire. Les mesures de protection doivent évoluer en fonction de la nouvelle classification.
