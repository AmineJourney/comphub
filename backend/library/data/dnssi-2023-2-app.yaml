controls:
- code: POL-RISQUE
  domain: DOMAIN-1
  title:
    en: Risk analysis
    fr: Analyse de risque
  description:
    en: Each entity or critical infrastructure operator must identify security needs for confidentiality, availability and
      integrity for every process supported by the information system, and must perform a security risk analysis for that
      information system.
    fr: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité
      pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à
      ce système d'information.
  guidance:
    en: Each entity or critical infrastructure operator must identify security needs for confidentiality, availability and
      integrity for every process supported by the information system, and must perform a security risk analysis for that
      information system.
    fr: Chaque entité ou IIV doit identifier les besoins de sécurité en matière de confidentialité, disponibilité et intégrité
      pour chaque processus supporté par le système d'information et procéder à une analyse des risques de sécurité liés à
      ce système d'information.
  requirements: []
- code: POL-FORMEL
  domain: DOMAIN-1
  title:
    en: Information systems security policy
    fr: Politique de sécurité des systèmes d'information
  description:
    en: Each entity or critical infrastructure operator must define an information systems security policy approved by senior
      management. The policy must describe the rules adopted to manage identified security needs, may be broken down into
      domain-specific policies, must be based on risk analysis, and must be distributed, communicated and regularly updated.
    fr: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique
      élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour
      gérer les besoins identifiés de sécurité des SI.


      Cette politique doit être déclinée au besoin en politiques spécifiques par domaine ou par aspect de sécurité.


      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et
      communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
  guidance:
    en: Each entity or critical infrastructure operator must define an information systems security policy approved by senior
      management. The policy must describe the rules adopted to manage identified security needs, may be broken down into
      domain-specific policies, must be based on risk analysis, and must be distributed, communicated and regularly updated.
    fr: 'Chaque entité ou IIV doit définir une politique en matière de sécurité des SI qui soit approuvée par un niveau hiérarchique
      élevé (ex. : secrétariat général, direction générale, ... ) et qui décrit les règles qui doivent être adoptées pour
      gérer les besoins identifiés de sécurité des SI.


      Cette politique doit être déclinée au besoin en politiques spécifiques par domaine ou par aspect de sécurité.


      La politique de sécurité des SI doit être élaborée en se basant sur une analyse de risques, et doit être diffusée et
      communiquée au personnel et aux tiers concernés et mise à jour régulièrement.'
  requirements: []
- code: POL-PAS
  domain: DOMAIN-1
  title:
    en: Information systems security action plan
    fr: Plan d'actions de la sécurité des SI
  description:
    en: Each entity or critical infrastructure operator must define an action plan to align with its information systems security
      policy. The plan must consider business impacts, financial and human resources, short-term measures and achievable medium-term
      measures.
    fr: Chaque entité ou IIV doit définir un plan d'actions pour la mise en conformité avec sa politique de sécurité des SI.
      Ce plan d'actions tiendra compte des impacts sur les activités, et des moyens financiers et humains à mettre en œuvre
      en indiquant les mesures à court terme et les mesures atteignables à moyen terme.
  guidance:
    en: Each entity or critical infrastructure operator must define an action plan to align with its information systems security
      policy. The plan must consider business impacts, financial and human resources, short-term measures and achievable medium-term
      measures.
    fr: Chaque entité ou IIV doit définir un plan d'actions pour la mise en conformité avec sa politique de sécurité des SI.
      Ce plan d'actions tiendra compte des impacts sur les activités, et des moyens financiers et humains à mettre en œuvre
      en indiquant les mesures à court terme et les mesures atteignables à moyen terme.
  requirements: []
- code: POL-TDB
  domain: DOMAIN-1
  title:
    en: Information systems security dashboard
    fr: Tableau de bord de la sécurité des SI
  description:
    en: Each entity or critical infrastructure operator must establish and use an information systems security dashboard to
      monitor proper application of the rules set out in its security policy. The dashboard must rely on indicators that track
      implementation of the entity-specific security rules.
    fr: 'Chaque entité ou IIV doit élaborer et se servir d''un tableau de bord de la sécurité des SI pour assurer le suivi
      de la bonne application des règles édictées dans sa politique de sécurité.


      Le tableau de bord doit se baser sur des indicateurs permettant le suivi de la mise en œuvre des règles de sécurité
      des SI propres à l''entité ou à l''IIV.'
  guidance:
    en: Each entity or critical infrastructure operator must establish and use an information systems security dashboard to
      monitor proper application of the rules set out in its security policy. The dashboard must rely on indicators that track
      implementation of the entity-specific security rules.
    fr: 'Chaque entité ou IIV doit élaborer et se servir d''un tableau de bord de la sécurité des SI pour assurer le suivi
      de la bonne application des règles édictées dans sa politique de sécurité.


      Le tableau de bord doit se baser sur des indicateurs permettant le suivi de la mise en œuvre des règles de sécurité
      des SI propres à l''entité ou à l''IIV.'
  requirements: []
- code: ORG-INTER-GOUV
  domain: DOMAIN-2
  title:
    en: Information systems security governance
    fr: Gouvernance de la sécurité des SI
  description:
    en: Each entity or critical infrastructure operator must implement appropriate information systems security governance
      with senior management involvement, in order to define strategic security directions and monitor progress of all related
      projects.
    fr: 'Chaque entité ou IIV doit mettre en place une gouvernance appropriée de la sécurité des SI avec l''implication notamment
      d''un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) de l''entité ou de l''IIV, et
      ce afin de définir les orientations stratégiques en matière de sécurité des SI et assurer le suivi de l''avancement
      de l''ensemble des projets y afférents.'
  guidance:
    en: Each entity or critical infrastructure operator must implement appropriate information systems security governance
      with senior management involvement, in order to define strategic security directions and monitor progress of all related
      projects.
    fr: 'Chaque entité ou IIV doit mettre en place une gouvernance appropriée de la sécurité des SI avec l''implication notamment
      d''un niveau hiérarchique élevé (ex. : secrétariat général, direction générale, ... ) de l''entité ou de l''IIV, et
      ce afin de définir les orientations stratégiques en matière de sécurité des SI et assurer le suivi de l''avancement
      de l''ensemble des projets y afférents.'
  requirements: []
- code: ORG-INTER-RSSI
  domain: DOMAIN-2
  title:
    en: Appointment of an Information Systems Security Officer (ISSO)
    fr: Désignation d'un responsable de la sécurité des SI (RSSI)
  description:
    en: The rules governing the appointment and duties of the Information Systems Security Officer are defined by Law No.
      05-20 on cybersecurity and its implementing decree. Any change to the officer identity or contact details must be reported
      to the DGSSI.
    fr: 'Les règles applicables à la désignation et aux missions du RSSI sont fixées par la loi n° 05-20 relative à la cybersécurité
      et son décret d''application.


      Tout changement de l''identité et des coordonnées du RSSI doit être porté à la connaissance de la DGSSI.'
  guidance:
    en: The rules governing the appointment and duties of the Information Systems Security Officer are defined by Law No.
      05-20 on cybersecurity and its implementing decree. Any change to the officer identity or contact details must be reported
      to the DGSSI.
    fr: 'Les règles applicables à la désignation et aux missions du RSSI sont fixées par la loi n° 05-20 relative à la cybersécurité
      et son décret d''application.


      Tout changement de l''identité et des coordonnées du RSSI doit être porté à la connaissance de la DGSSI.'
  requirements: []
- code: ORG-INTER-RESP
  domain: DOMAIN-2
  title:
    en: Assignment of roles and responsibilities
    fr: Attribution des rôles et responsabilités
  description:
    en: Each entity or critical infrastructure operator must define and assign information systems security roles and responsibilities
      to the relevant stakeholders. This assignment must take into account segregation of duties and incompatible areas of
      responsibility.
    fr: 'Chaque entité ou IIV doit définir et attribuer les rôles et responsabilités des différents acteurs en matière de
      sécurité des SI.


      Cette attribution doit tenir compte de la séparation entre les tâches et les domaines de responsabilité incompatibles.'
  guidance:
    en: Each entity or critical infrastructure operator must define and assign information systems security roles and responsibilities
      to the relevant stakeholders. This assignment must take into account segregation of duties and incompatible areas of
      responsibility.
    fr: 'Chaque entité ou IIV doit définir et attribuer les rôles et responsabilités des différents acteurs en matière de
      sécurité des SI.


      Cette attribution doit tenir compte de la séparation entre les tâches et les domaines de responsabilité incompatibles.'
  requirements: []
- code: ORG-TELETRAV-SEC
  domain: DOMAIN-2
  title:
    en: Secure remote work
    fr: Télétravail sécurisé
  description:
    en: Each entity or critical infrastructure operator must take appropriate measures, depending on the access method, to
      protect information accessed, processed or stored from remote work locations. Clear policies or procedures must define
      accessible systems and applicable security measures, be approved by management, communicated, maintained and applied
      for secure remote work.
    fr: 'Chaque entité ou IIV doit prendre les mesures adéquates, en fonction du moyen d''accès, pour protéger les informations
      consultées, traitées ou stockées sur des sites de télétravail.


      A cet effet, une politique ou des procédures claires précisant les systèmes accessibles et les mesures de sécurité applicables,
      doivent être définies, validées par la hiérarchie, communiquées et tenues à jour pour une mise en œuvre appropriée du
      télétravail.'
  guidance:
    en: Each entity or critical infrastructure operator must take appropriate measures, depending on the access method, to
      protect information accessed, processed or stored from remote work locations. Clear policies or procedures must define
      accessible systems and applicable security measures, be approved by management, communicated, maintained and applied
      for secure remote work.
    fr: 'Chaque entité ou IIV doit prendre les mesures adéquates, en fonction du moyen d''accès, pour protéger les informations
      consultées, traitées ou stockées sur des sites de télétravail.


      A cet effet, une politique ou des procédures claires précisant les systèmes accessibles et les mesures de sécurité applicables,
      doivent être définies, validées par la hiérarchie, communiquées et tenues à jour pour une mise en œuvre appropriée du
      télétravail.'
  requirements: []
- code: RH-AVT--PERSON
  domain: DOMAIN-3
  title:
    en: Trusted personnel
    fr: Personnel de confiance
  description:
    en: Before hiring, checks must be performed on candidates who will work on sensitive tasks within the entity or critical
      infrastructure operator. These checks must comply with regulations and ethics, and be proportionate to business requirements
      and to the classification of accessible information assets.
    fr: A l'embauche, des vérifications des informations des candidats appelés à travailler sur des tâches sensibles au sein
      de l'entité ou de l'IIV doivent être réalisées conformément à la réglementation, à l'éthique, et proportionnellement
      aux exigences métier et à la classification des actifs informationnels accessibles.
  guidance:
    en: Before hiring, checks must be performed on candidates who will work on sensitive tasks within the entity or critical
      infrastructure operator. These checks must comply with regulations and ethics, and be proportionate to business requirements
      and to the classification of accessible information assets.
    fr: A l'embauche, des vérifications des informations des candidats appelés à travailler sur des tâches sensibles au sein
      de l'entité ou de l'IIV doivent être réalisées conformément à la réglementation, à l'éthique, et proportionnellement
      aux exigences métier et à la classification des actifs informationnels accessibles.
  requirements: []
- code: RH-AVT--COND
  domain: DOMAIN-3
  title:
    en: Terms and conditions of employment
    fr: Termes et conditions d'embauche
  description:
    en: Contractual agreements with employees and subcontractors must specify their responsibilities and those of the entity
      or critical infrastructure operator regarding information systems security.
    fr: Les accords contractuels avec les employés et les sous-traitants doivent préciser leurs responsabilités et celles
      de l'entité ou de l'IIV en matière de sécurité des SI.
  guidance:
    en: Contractual agreements with employees and subcontractors must specify their responsibilities and those of the entity
      or critical infrastructure operator regarding information systems security.
    fr: Les accords contractuels avec les employés et les sous-traitants doivent préciser leurs responsabilités et celles
      de l'entité ou de l'IIV en matière de sécurité des SI.
  requirements: []
- code: RH-APRES--FORM
  domain: DOMAIN-3
  title:
    en: Staff training and awareness
    fr: Formation et sensibilisation du personnel
  description:
    en: Each entity or critical infrastructure operator must regularly organize staff training and awareness sessions for
      information systems security according to a predefined program.
    fr: Chaque entité ou IIV doit organiser régulièrement, selon un programme préétabli, des sessions de formation et de sensibilisation
      au profit de son personnel en matière de sécurité des SI.
  guidance:
    en: Each entity or critical infrastructure operator must regularly organize staff training and awareness sessions for
      information systems security according to a predefined program.
    fr: Chaque entité ou IIV doit organiser régulièrement, selon un programme préétabli, des sessions de formation et de sensibilisation
      au profit de son personnel en matière de sécurité des SI.
  requirements: []
- code: RH-FIN-GEST
  domain: DOMAIN-3
  title:
    en: Management of transfers and departures
    fr: Gestion des mutations et départs
  description:
    en: To preserve the confidentiality and integrity of information, each entity or critical infrastructure operator must
      formalize and implement a procedure for transfers and departures. The procedure must cover notification by human resources
      to IT, handover of instructions, return of IT assets, and withdrawal or modification of information system access.
    fr: 'Afin de préserver la confidentialité et l''intégrité de l''information, chaque entité ou IIV doit formaliser et mettre
      en place une procédure de gestion des mutations ou des départs qui couvre notamment :


      - La notification au service informatique par le service des ressources humaines de tout mouvement du personnel ;


      - La passation des consignes ;


      - La restitution des biens informatiques ;


      - Le retrait ou la modification des accès aux SI.'
  guidance:
    en: To preserve the confidentiality and integrity of information, each entity or critical infrastructure operator must
      formalize and implement a procedure for transfers and departures. The procedure must cover notification by human resources
      to IT, handover of instructions, return of IT assets, and withdrawal or modification of information system access.
    fr: 'Afin de préserver la confidentialité et l''intégrité de l''information, chaque entité ou IIV doit formaliser et mettre
      en place une procédure de gestion des mutations ou des départs qui couvre notamment :


      - La notification au service informatique par le service des ressources humaines de tout mouvement du personnel ;


      - La passation des consignes ;


      - La restitution des biens informatiques ;


      - Le retrait ou la modification des accès aux SI.'
  requirements: []
- code: ACTIF-RESP-INV
  domain: DOMAIN-4
  title:
    en: Asset inventory
    fr: Inventaire des actifs
  description:
    en: An inventory of information assets, including hardware and software, must be created and regularly updated. It must
      include hardware and software lists with serial or license numbers, operating system versions, applied patches, and
      end-user identification where applicable.
    fr: 'Un inventaire des actifs informationnels (matériels et logiciels) doit être réalisé et mis à jour régulièrement,
      intégrant notamment :


      - la liste des composants matériels (avec nº de série) et logiciels (avec nº de licence);


      - la version du système d''exploitation et les correctifs appliqués ;


      - l''identification de l''utilisateur final si applicable (poste de travail, téléphonie IP, imprimante, ... ).'
  guidance:
    en: An inventory of information assets, including hardware and software, must be created and regularly updated. It must
      include hardware and software lists with serial or license numbers, operating system versions, applied patches, and
      end-user identification where applicable.
    fr: 'Un inventaire des actifs informationnels (matériels et logiciels) doit être réalisé et mis à jour régulièrement,
      intégrant notamment :


      - la liste des composants matériels (avec nº de série) et logiciels (avec nº de licence);


      - la version du système d''exploitation et les correctifs appliqués ;


      - l''identification de l''utilisateur final si applicable (poste de travail, téléphonie IP, imprimante, ... ).'
  requirements: []
- code: ACTIF-RESP-PROP
  domain: DOMAIN-4
  title:
    en: Asset owners
    fr: Propriétaires des actifs
  description:
    en: Each information asset must be formally assigned to an owner responsible for managing the assigned assets throughout
      their lifecycle, including inventory, classification, protection, destruction and decommissioning.
    fr: Chaque actif informationnel doit être attribué formellement à un propriétaire qui a la responsabilité de la gestion
      des actifs informationnels qui lui sont attribués (inventaire, classification, protection, destruction, réforme ...
      ) tout au long de leurs cycles de vie.
  guidance:
    en: Each information asset must be formally assigned to an owner responsible for managing the assigned assets throughout
      their lifecycle, including inventory, classification, protection, destruction and decommissioning.
    fr: Chaque actif informationnel doit être attribué formellement à un propriétaire qui a la responsabilité de la gestion
      des actifs informationnels qui lui sont attribués (inventaire, classification, protection, destruction, réforme ...
      ) tout au long de leurs cycles de vie.
  requirements: []
- code: ACTIF-RESP-CHARTE
  domain: DOMAIN-4
  title:
    en: Information system acceptable use charter
    fr: Charte d'utilisation du SI
  description:
    en: An information system acceptable use charter must be developed in accordance with the current security policy. It
      must be approved by management, communicated, and signed or accepted by users. It must include applicable legal and
      regulatory requirements, general rules for IT resource use, user awareness items, liability clauses, and security obligations.
    fr: 'Une charte d''utilisation du SI doit être élaborée en conformité avec la politique de sécurité des SI en vigueur.
      Elle doit être validée par la hiérarchie, communiqué et signée ou acceptée par les utilisateurs.


      Cette charte doit contenir, entre autres :


      - Un rappel des exigences législatives et réglementaires applicables dans le contexte de l''entité ou de l''IIV;


      - Les règles générales d''utilisation des ressources informatiques ;


      - Les éléments de sensibilisation des utilisateurs ;


      - Les clauses de confidentialité des informations manipulées ;


      - Les réflexes à adopter en cas d''incident ou de suspicion d''incident de cybersécurité et les règles à respecter notamment
      l''obligation de déclarer tout incident de cybersécurité à la DGSSI ;


      - La charte d''utilisation du SI constitue un élément opposable en cas de manquement grave.'
  guidance:
    en: An information system acceptable use charter must be developed in accordance with the current security policy. It
      must be approved by management, communicated, and signed or accepted by users. It must include applicable legal and
      regulatory requirements, general rules for IT resource use, user awareness items, liability clauses, and security obligations.
    fr: 'Une charte d''utilisation du SI doit être élaborée en conformité avec la politique de sécurité des SI en vigueur.
      Elle doit être validée par la hiérarchie, communiqué et signée ou acceptée par les utilisateurs.


      Cette charte doit contenir, entre autres :


      - Un rappel des exigences législatives et réglementaires applicables dans le contexte de l''entité ou de l''IIV;


      - Les règles générales d''utilisation des ressources informatiques ;


      - Les éléments de sensibilisation des utilisateurs ;


      - Les clauses de confidentialité des informations manipulées ;


      - Les réflexes à adopter en cas d''incident ou de suspicion d''incident de cybersécurité et les règles à respecter notamment
      l''obligation de déclarer tout incident de cybersécurité à la DGSSI ;


      - La charte d''utilisation du SI constitue un élément opposable en cas de manquement grave.'
  requirements: []
- code: ACTIF--RESP-CARTO
  domain: DOMAIN-4
  title:
    en: Information system mapping
    fr: Cartographie SI
  description:
    en: Each entity or critical infrastructure operator must maintain an information system map describing hardware and software
      components, network architectures, data centers and served sites. Mapping documents must be kept current as the information
      system evolves and must receive appropriate protection.
    fr: 'Chaque entité ou IIV doit tenir et mettre à jour une cartographie de son SI qui précise les composants matériels
      et logiciels ainsi que les architectures des réseaux sur lesquels sont identifiés les centres de données et les différents
      sites desservis.


      Les documents de cartographie doivent être maintenus au fil des évolutions apportées aux SI et faire l''objet d''une
      protection adaptée.'
  guidance:
    en: Each entity or critical infrastructure operator must maintain an information system map describing hardware and software
      components, network architectures, data centers and served sites. Mapping documents must be kept current as the information
      system evolves and must receive appropriate protection.
    fr: 'Chaque entité ou IIV doit tenir et mettre à jour une cartographie de son SI qui précise les composants matériels
      et logiciels ainsi que les architectures des réseaux sur lesquels sont identifiés les centres de données et les différents
      sites desservis.


      Les documents de cartographie doivent être maintenus au fil des évolutions apportées aux SI et faire l''objet d''une
      protection adaptée.'
  requirements: []
- code: ACTIF--CLASSIF-INFO
  domain: DOMAIN-4
  title:
    en: Classification
    fr: Classification
  description:
    en: Each entity or critical infrastructure operator must classify its information assets according to sensitivity for
      confidentiality, integrity and availability. The classification must be based on an impact scale defined by the entity,
      considering size, importance, mission, business area, business requirements, security challenges and applicable legal,
      regulatory, contractual or normative obligations.
    fr: 'Chaque entité ou IIV doit classifier ses actifs informationnels selon leur niveau de sensibilité en termes de confidentialité,
      d''intégrité et de disponibilité, et ce sur la base d''une échelle d''impacts fixée par l''entité ou par l''IIV et qui
      tient compte notamment de sa taille, de son importance, de ses missions, de son domaine d''activités, de ses exigences
      métiers, de ses propres enjeux de sécurité et des obligations légales, règlementaires, contractuelles ou normatives
      qui lui sont applicables. Le résultat de cette classification traduit la valeur des actifs informationnels en fonction
      de leur sensibilité et de leur caractère critique pour l''entité ou pour l''IIV.


      En parallèle, l''entité ou l''IIV doit procéder à la classification des mêmes actifs informationnels et SI selon le
      référentiel de la classification des actifs informationnels et SI fixé par la loi nº 05.20 et son décret d''application.
      L''objectif de cette classification est d''identifier les SI sensibles et les données sensibles au sens de la loi précitée.'
  guidance:
    en: Each entity or critical infrastructure operator must classify its information assets according to sensitivity for
      confidentiality, integrity and availability. The classification must be based on an impact scale defined by the entity,
      considering size, importance, mission, business area, business requirements, security challenges and applicable legal,
      regulatory, contractual or normative obligations.
    fr: 'Chaque entité ou IIV doit classifier ses actifs informationnels selon leur niveau de sensibilité en termes de confidentialité,
      d''intégrité et de disponibilité, et ce sur la base d''une échelle d''impacts fixée par l''entité ou par l''IIV et qui
      tient compte notamment de sa taille, de son importance, de ses missions, de son domaine d''activités, de ses exigences
      métiers, de ses propres enjeux de sécurité et des obligations légales, règlementaires, contractuelles ou normatives
      qui lui sont applicables. Le résultat de cette classification traduit la valeur des actifs informationnels en fonction
      de leur sensibilité et de leur caractère critique pour l''entité ou pour l''IIV.


      En parallèle, l''entité ou l''IIV doit procéder à la classification des mêmes actifs informationnels et SI selon le
      référentiel de la classification des actifs informationnels et SI fixé par la loi nº 05.20 et son décret d''application.
      L''objectif de cette classification est d''identifier les SI sensibles et les données sensibles au sens de la loi précitée.'
  requirements: []
- code: ACTIF--CLASSIF-MES
  domain: DOMAIN-4
  title:
    en: Information protection measures
    fr: Mesures de protection des informations
  description:
    en: Based on classification results, each entity or critical infrastructure operator must implement security measures
      proportionate to asset sensitivity and formalize them in an information asset classification procedure. It must also
      comply with Law No. 05-20 on cybersecurity, its implementing decree, and the protection measures defined in DGSSI frameworks.
    fr: 'Sur la base des résultats de ces classifications, chaque entité ou IIV doit mettre en place les mesures de sécurité
      proportionnelles à la sensibilité des actifs et les formaliser dans une procédure de classification des actifs informationnels.


      L''entité ou l''IIV doit également se conformer aux dispositions pertinentes de la loi nº 05-20 relative à la cybersécurité
      et son décret d''application et appliquer les mesures de protection définies dans les référentiels élaborés par la DGSSI.'
  guidance:
    en: Based on classification results, each entity or critical infrastructure operator must implement security measures
      proportionate to asset sensitivity and formalize them in an information asset classification procedure. It must also
      comply with Law No. 05-20 on cybersecurity, its implementing decree, and the protection measures defined in DGSSI frameworks.
    fr: 'Sur la base des résultats de ces classifications, chaque entité ou IIV doit mettre en place les mesures de sécurité
      proportionnelles à la sensibilité des actifs et les formaliser dans une procédure de classification des actifs informationnels.


      L''entité ou l''IIV doit également se conformer aux dispositions pertinentes de la loi nº 05-20 relative à la cybersécurité
      et son décret d''application et appliquer les mesures de protection définies dans les référentiels élaborés par la DGSSI.'
  requirements: []
- code: ACTIF--CLASSIF--EXAM
  domain: DOMAIN-4
  title:
    en: Classification review
    fr: Examen de la classification
  description:
    en: Each entity or critical infrastructure operator must review the classification of its information assets and information
      systems at least every three years and whenever necessary. Protection measures must evolve according to the new classification.
    fr: Chaque entité ou IIV doit revoir la classification de ses actifs informationnels et de ses SI au moins une fois tous
      les trois ans et à chaque fois que nécessaire. Les mesures de protection doivent évoluer en fonction de la nouvelle
      classification.
  guidance:
    en: Each entity or critical infrastructure operator must review the classification of its information assets and information
      systems at least every three years and whenever necessary. Protection measures must evolve according to the new classification.
    fr: Chaque entité ou IIV doit revoir la classification de ses actifs informationnels et de ses SI au moins une fois tous
      les trois ans et à chaque fois que nécessaire. Les mesures de protection doivent évoluer en fonction de la nouvelle
      classification.
  requirements: []
- code: ACTIF-SUP-AMOV
  domain: DOMAIN-4
  title:
    en: Removable media management
    fr: Gestion des supports amovibles
  description:
    en: Each entity or critical infrastructure operator must implement appropriate measures for removable media management,
      including disabling automatic execution except in exceptional service cases, storing media in protected premises, and
      applying suitable measures such as encryption and anti-virus checks, especially when media contain sensitive data.
    fr: 'Chaque entité ou IIV doit mettre en place des mesures appropriées pour la gestion des supports amovibles notamment
      :


      - la désactivation de leur exécution automatique, sauf dans des cas exceptionnels liés à des impératifs de service ;


      - leur conservation dans des locaux protégés et l''adoption de mesures adaptées tel que le chiffrement, le contrôle
      anti-virus, etc. surtout lorsqu''ils contiennent des données sensibles ;'
  guidance:
    en: Each entity or critical infrastructure operator must implement appropriate measures for removable media management,
      including disabling automatic execution except in exceptional service cases, storing media in protected premises, and
      applying suitable measures such as encryption and anti-virus checks, especially when media contain sensitive data.
    fr: 'Chaque entité ou IIV doit mettre en place des mesures appropriées pour la gestion des supports amovibles notamment
      :


      - la désactivation de leur exécution automatique, sauf dans des cas exceptionnels liés à des impératifs de service ;


      - leur conservation dans des locaux protégés et l''adoption de mesures adaptées tel que le chiffrement, le contrôle
      anti-virus, etc. surtout lorsqu''ils contiennent des données sensibles ;'
  requirements: []
- code: ACTIF-SUP-MOBIL
  domain: DOMAIN-4
  title:
    en: Mobile device policy
    fr: Politique en matière d'appareils mobiles
  description:
    en: Security rules for managing risks arising from mobile device use must be an integral part of the entity or critical
      infrastructure operator information systems security policy.
    fr: Les règles de sécurité destinées à gérer les risques découlant de l'utilisation des appareils mobiles doivent faire
      partie intégrante de la politique de sécurité des SI de l'entité ou de l'IIV.
  guidance:
    en: Security rules for managing risks arising from mobile device use must be an integral part of the entity or critical
      infrastructure operator information systems security policy.
    fr: Les règles de sécurité destinées à gérer les risques découlant de l'utilisation des appareils mobiles doivent faire
      partie intégrante de la politique de sécurité des SI de l'entité ou de l'IIV.
  requirements: []
- code: ACTIF-SUP-NOMAD
  domain: DOMAIN-4
  title:
    en: Mobile workstations
    fr: Postes nomades
  description:
    en: Mobile workstations must be subject to the same security measures as other equipment, including regular antivirus
      updates, patching, compliance checks and prohibition of downloads that do not comply with the information system acceptable
      use charter. Additional protection must be applied when used outside normal premises.
    fr: 'Les postes nomades doivent être tous soumis aux mêmes mesures de sécurité que les autres équipements du parc en termes
      de mise à jour régulière de l''antivirus, application des correctifs, contrôle de conformité et interdiction des téléchargements
      à caractère non conforme à la charte d''utilisation du SI.


      En cas d''utilisation de ces postes hors des locaux de travail (mission, conférence, réunion, etc.), une procédure formalisée
      doit être prévue pour leur protection.'
  guidance:
    en: Mobile workstations must be subject to the same security measures as other equipment, including regular antivirus
      updates, patching, compliance checks and prohibition of downloads that do not comply with the information system acceptable
      use charter. Additional protection must be applied when used outside normal premises.
    fr: 'Les postes nomades doivent être tous soumis aux mêmes mesures de sécurité que les autres équipements du parc en termes
      de mise à jour régulière de l''antivirus, application des correctifs, contrôle de conformité et interdiction des téléchargements
      à caractère non conforme à la charte d''utilisation du SI.


      En cas d''utilisation de ces postes hors des locaux de travail (mission, conférence, réunion, etc.), une procédure formalisée
      doit être prévue pour leur protection.'
  requirements: []
- code: ACTIF-SUP-REB
  domain: DOMAIN-4
  title:
    en: Disposal or recycling of media
    fr: Mise au rebut ou recyclage des supports
  description:
    en: A disposal or recycling procedure for media must be implemented to securely erase data from all types of media, including
      hard drives and embedded memory. For sensitive data, media destruction or degaussing may be necessary to prevent data
      recovery.
    fr: 'Une procédure de mise au rebut ou de recyclage des supports doit être mise en place afin d''effacer de manière sécurisée
      les données présentes sur tous type de support (les disques durs, les mémoires intégrées, ... ).


      Dans le cas de données sensibles, la destruction du support ou sa démagnétisation si applicable, peut s''avérer nécessaire
      de manière à empêcher toute tentative de récupération.'
  guidance:
    en: A disposal or recycling procedure for media must be implemented to securely erase data from all types of media, including
      hard drives and embedded memory. For sensitive data, media destruction or degaussing may be necessary to prevent data
      recovery.
    fr: 'Une procédure de mise au rebut ou de recyclage des supports doit être mise en place afin d''effacer de manière sécurisée
      les données présentes sur tous type de support (les disques durs, les mémoires intégrées, ... ).


      Dans le cas de données sensibles, la destruction du support ou sa démagnétisation si applicable, peut s''avérer nécessaire
      de manière à empêcher toute tentative de récupération.'
  requirements: []
- code: ACC-EXIG-POL
  domain: DOMAIN-5
  title:
    en: Access control policy
    fr: Politique de contrôle d'accès
  description:
    en: Each entity or critical infrastructure operator must establish, document and review an access control policy for systems,
      networks and services based on business and information security requirements while respecting the principle of least
      privilege.
    fr: Chaque entité ou IIV est tenue d'établir, de documenter et de revoir une politique de contrôle d'accès aux systèmes,
      réseaux et services sur la base des exigences métier et de sécurité de l'information en respectant le principe du moindre
      privilège.
  guidance:
    en: Each entity or critical infrastructure operator must establish, document and review an access control policy for systems,
      networks and services based on business and information security requirements while respecting the principle of least
      privilege.
    fr: Chaque entité ou IIV est tenue d'établir, de documenter et de revoir une politique de contrôle d'accès aux systèmes,
      réseaux et services sur la base des exigences métier et de sécurité de l'information en respectant le principe du moindre
      privilège.
  requirements: []
- code: ACC-UTILIS-ENREGIS/DESINSCRI
  domain: DOMAIN-5
  title:
    en: User registration and deregistration
    fr: Enregistrement et désinscription des utilisateurs
  description:
    en: Each entity or critical infrastructure operator must implement a formal user registration and deregistration procedure
      for assigning access rights. The procedure must include unique user identifiers, immediate removal or blocking of identifiers
      for users who leave or change roles, and regular verification of rights.
    fr: 'Chaque entité ou IIV doit mettre en œuvre une procédure formelle d''enregistrement et de désinscription des utilisateurs
      destinée à permettre l''attribution de droits d''accès.


      Cette procédure impose notamment :


      - la création d''identifiants utilisateurs uniques ;


      - la suppression ou le blocage immédiats des identifiants des utilisateurs qui ont quitté l''organisation ;


      - la détection périodique des identifiants utilisateurs redondants, suivie de leur suppression ou de leur blocage ;


      - l''assurance que des identifiants utilisateurs redondants ne sont pas attribués à d''autres utilisateurs.'
  guidance:
    en: Each entity or critical infrastructure operator must implement a formal user registration and deregistration procedure
      for assigning access rights. The procedure must include unique user identifiers, immediate removal or blocking of identifiers
      for users who leave or change roles, and regular verification of rights.
    fr: 'Chaque entité ou IIV doit mettre en œuvre une procédure formelle d''enregistrement et de désinscription des utilisateurs
      destinée à permettre l''attribution de droits d''accès.


      Cette procédure impose notamment :


      - la création d''identifiants utilisateurs uniques ;


      - la suppression ou le blocage immédiats des identifiants des utilisateurs qui ont quitté l''organisation ;


      - la détection périodique des identifiants utilisateurs redondants, suivie de leur suppression ou de leur blocage ;


      - l''assurance que des identifiants utilisateurs redondants ne sont pas attribués à d''autres utilisateurs.'
  requirements: []
- code: ACC-UTILIS-IDF/AUTH
  domain: DOMAIN-5
  title:
    en: Identification and authentication
    fr: Identification et authentification
  description:
    en: User access to resources such as networks, operating systems and applications must require individual identification
      and authentication. Special rights, including superuser and system or network administrator rights, must be clearly
      identified, limited, justified and controlled.
    fr: 'L''accès des utilisateurs aux ressources (réseaux, système d''exploitation ou applications informatiques) passe obligatoirement
      par une identification et une authentification individuelle.


      Les droits particuliers (super-utilisateur, Administrateur systèmes et réseaux, ... ) doivent être parfaitement identifiés,
      limités (nombre et droits) et justifiés.'
  guidance:
    en: User access to resources such as networks, operating systems and applications must require individual identification
      and authentication. Special rights, including superuser and system or network administrator rights, must be clearly
      identified, limited, justified and controlled.
    fr: 'L''accès des utilisateurs aux ressources (réseaux, système d''exploitation ou applications informatiques) passe obligatoirement
      par une identification et une authentification individuelle.


      Les droits particuliers (super-utilisateur, Administrateur systèmes et réseaux, ... ) doivent être parfaitement identifiés,
      limités (nombre et droits) et justifiés.'
  requirements: []
- code: ACC-UTILIS-HABILIT
  domain: DOMAIN-5
  title:
    en: Authorization management
    fr: Gestion des habilitations
  description:
    en: Each entity or critical infrastructure operator must implement an authorization matrix specifying each user access
      rights across the different information system services and systems.
    fr: Chaque entité ou IIV est tenue de mettre en place une matrice d'habilitations qui précise pour chaque utilisateur
      ses droits d'accès sur les différents systèmes et services du SI.
  guidance:
    en: Each entity or critical infrastructure operator must implement an authorization matrix specifying each user access
      rights across the different information system services and systems.
    fr: Chaque entité ou IIV est tenue de mettre en place une matrice d'habilitations qui précise pour chaque utilisateur
      ses droits d'accès sur les différents systèmes et services du SI.
  requirements: []
- code: ACC-UTILIS-GENERIQ
  domain: DOMAIN-5
  title:
    en: Generic account management
    fr: Gestion des comptes génériques
  description:
    en: Each entity or critical infrastructure operator must create named user accounts so actions can be linked and attributed
      to users. Where operational requirements require generic accounts, those accounts must be approved, documented and inventoried.
    fr: 'Chaque entité ou IIV est tenue de créer des comptes nominatifs pour les utilisateurs permettant de les relier à leurs
      actions et de les leur imputer.


      Lorsque les aspects opérationnels liés à l''activité de l''entité ou de l''IIV exigent l''utilisation de comptes génériques,
      ces comptes doivent être approuvés, documentés et inventoriés.'
  guidance:
    en: Each entity or critical infrastructure operator must create named user accounts so actions can be linked and attributed
      to users. Where operational requirements require generic accounts, those accounts must be approved, documented and inventoried.
    fr: 'Chaque entité ou IIV est tenue de créer des comptes nominatifs pour les utilisateurs permettant de les relier à leurs
      actions et de les leur imputer.


      Lorsque les aspects opérationnels liés à l''activité de l''entité ou de l''IIV exigent l''utilisation de comptes génériques,
      ces comptes doivent être approuvés, documentés et inventoriés.'
  requirements: []
- code: ACC-UTILIS-REVUE
  domain: DOMAIN-5
  title:
    en: Access rights review
    fr: Revue des droits d'accès
  description:
    en: A periodic review of assigned access rights is required at least once a year, based on the inventory of applications
      and resources used and on the authorization matrix. Necessary corrections must be made following the review.
    fr: 'Une revue périodique des droits attribués est nécessaire, au moins une fois par an, en s''appuyant sur l''inventaire
      des applications et des ressources utilisées, ainsi que sur la matrice des habilitations.


      Suite à cet examen, les corrections nécessaires doivent être apportées.'
  guidance:
    en: A periodic review of assigned access rights is required at least once a year, based on the inventory of applications
      and resources used and on the authorization matrix. Necessary corrections must be made following the review.
    fr: 'Une revue périodique des droits attribués est nécessaire, au moins une fois par an, en s''appuyant sur l''inventaire
      des applications et des ressources utilisées, ainsi que sur la matrice des habilitations.


      Suite à cet examen, les corrections nécessaires doivent être apportées.'
  requirements: []
- code: ACC-SYS/APP-ACC
  domain: DOMAIN-5
  title:
    en: Access to systems and applications
    fr: Accès aux systèmes et applications
  description:
    en: Systems and applications must be protected by appropriate access restriction mechanisms such as login and password,
      strong authentication, filtering and access rules, and connection time windows, in accordance with the entity access
      control policy.
    fr: Les systèmes et applications doivent être protégés par des mécanismes adaptés de restriction des accès (login/mot
      de passe, authentification forte, règles de filtrage et d'accès, plages horaires de connexions) conformément à la politique
      de contrôle d'accès de l'entité ou de l'IIV.
  guidance:
    en: Systems and applications must be protected by appropriate access restriction mechanisms such as login and password,
      strong authentication, filtering and access rules, and connection time windows, in accordance with the entity access
      control policy.
    fr: Les systèmes et applications doivent être protégés par des mécanismes adaptés de restriction des accès (login/mot
      de passe, authentification forte, règles de filtrage et d'accès, plages horaires de connexions) conformément à la politique
      de contrôle d'accès de l'entité ou de l'IIV.
  requirements: []
- code: ACC-SYS/APP-PRIVIL
  domain: DOMAIN-5
  title:
    en: Privileged access management
    fr: Gestion des accès à privilèges
  description:
    en: Access to administration tools and interfaces must be strictly limited to authorized persons through a formal access
      authorization procedure. The inventory of privileged accounts must be kept up to date.
    fr: 'L''accès aux outils et interfaces d''administration doit être strictement limité aux personnes habilitées, selon
      une procédure formelle d''autorisation d''accès.


      L''inventaire des comptes à privilège doit être tenu à jour.'
  guidance:
    en: Access to administration tools and interfaces must be strictly limited to authorized persons through a formal access
      authorization procedure. The inventory of privileged accounts must be kept up to date.
    fr: 'L''accès aux outils et interfaces d''administration doit être strictement limité aux personnes habilitées, selon
      une procédure formelle d''autorisation d''accès.


      L''inventaire des comptes à privilège doit être tenu à jour.'
  requirements: []
- code: ACC-SYS/APP-MDP
  domain: DOMAIN-5
  title:
    en: Password management
    fr: Gestion des mots de passe
  description:
    en: Each entity or critical infrastructure operator must formalize a password management policy defining applicable rules,
      including minimum complexity, periodic change, deletion in case of suspected compromise, reset procedures, and a process
      for checking policy application.
    fr: 'Chaque entité ou IIV est tenue de formaliser une politique de gestion des mots de passe qui définit les règles applicables
      aux mots de passe, en particulier :


      - la structure (complexité minimale) ;


      - le changement périodique ;


      - la suppression en cas de suspicion de compromission ;


      - la réinitialisation ;


      Un processus de contrôle de l''application de ces règles doit être déployé.'
  guidance:
    en: Each entity or critical infrastructure operator must formalize a password management policy defining applicable rules,
      including minimum complexity, periodic change, deletion in case of suspected compromise, reset procedures, and a process
      for checking policy application.
    fr: 'Chaque entité ou IIV est tenue de formaliser une politique de gestion des mots de passe qui définit les règles applicables
      aux mots de passe, en particulier :


      - la structure (complexité minimale) ;


      - le changement périodique ;


      - la suppression en cas de suspicion de compromission ;


      - la réinitialisation ;


      Un processus de contrôle de l''application de ces règles doit être déployé.'
  requirements: []
- code: CRYPTO-MES-POL
  domain: DOMAIN-6
  title:
    en: Cryptographic measures usage policy
    fr: Politique d'utilisation des mesures cryptographiques
  description:
    en: When cryptography is used, the entity or critical infrastructure operator must develop and implement a policy for
      the use of cryptographic measures to protect information. The policy must specify requirements for signing and encryption
      certificates, including validity periods, algorithms, key lengths and applicable uses.
    fr: 'En cas de recours à la cryptographie, l''entité ou l''IIV doit élaborer et mettre en œuvre une politique d''utilisation
      de mesures cryptographiques en vue de protéger l''information.


      Cette politique doit spécifier notamment les exigences en matière de certificats de signature ou de chiffrement (délai
      maximum de validité, algorithme, longueurs de clés, etc .. ) ou en matière de connexions chiffrées (protocoles autorisés).'
  guidance:
    en: When cryptography is used, the entity or critical infrastructure operator must develop and implement a policy for
      the use of cryptographic measures to protect information. The policy must specify requirements for signing and encryption
      certificates, including validity periods, algorithms, key lengths and applicable uses.
    fr: 'En cas de recours à la cryptographie, l''entité ou l''IIV doit élaborer et mettre en œuvre une politique d''utilisation
      de mesures cryptographiques en vue de protéger l''information.


      Cette politique doit spécifier notamment les exigences en matière de certificats de signature ou de chiffrement (délai
      maximum de validité, algorithme, longueurs de clés, etc .. ) ou en matière de connexions chiffrées (protocoles autorisés).'
  requirements: []
- code: CRYPTO-MES-GESTCLE
  domain: DOMAIN-6
  title:
    en: Cryptographic key management
    fr: Gestion des clés cryptographiques
  description:
    en: Each entity or critical infrastructure operator using cryptographic keys must develop and implement a procedure governing
      their use and protection throughout their lifecycle, including generation, storage, archiving, extraction, assignment,
      withdrawal and destruction.
    fr: Chaque entité ou IIV utilisant des clés cryptographiques doit élaborer et mettre en œuvre une procédure encadrant
      leur utilisation et leur protection tout au long de leur cycle de vie (génération, stockage, archivage, extraction,
      attribution, retrait et destruction).
  guidance:
    en: Each entity or critical infrastructure operator using cryptographic keys must develop and implement a procedure governing
      their use and protection throughout their lifecycle, including generation, storage, archiving, extraction, assignment,
      withdrawal and destruction.
    fr: Chaque entité ou IIV utilisant des clés cryptographiques doit élaborer et mettre en œuvre une procédure encadrant
      leur utilisation et leur protection tout au long de leur cycle de vie (génération, stockage, archivage, extraction,
      attribution, retrait et destruction).
  requirements: []
- code: PHYS-ZONE-DELIMIT
  domain: DOMAIN-7
  title:
    en: Area delimitation
    fr: Délimitation des zones
  description:
    en: Physical security areas must be defined to protect information systems and associated processing facilities. Areas
      may include public areas, internal areas, restricted areas and sensitive areas, with access rules adapted to each type.
    fr: 'Des zones physiques de sécurité doivent être délimitées pour protéger les SI et les moyens de traitement associés.
      Cette délimitation peut se faire selon la typologie suivante :


      - zones publiques : autorisées à toute personne.


      - zones internes : autorisées uniquement au personnel de l''entité ou de l''IIV, aux tiers autorisés ou aux visiteurs
      accompagnés.


      - zones restreintes : accessibles uniquement aux personnes de l''entité ou de l''IIV habilitées à consulter, à traiter
      et manipuler des informations ou des équipements classifiés, et le cas échéant aux tiers autorisés et accompagnés.'
  guidance:
    en: Physical security areas must be defined to protect information systems and associated processing facilities. Areas
      may include public areas, internal areas, restricted areas and sensitive areas, with access rules adapted to each type.
    fr: 'Des zones physiques de sécurité doivent être délimitées pour protéger les SI et les moyens de traitement associés.
      Cette délimitation peut se faire selon la typologie suivante :


      - zones publiques : autorisées à toute personne.


      - zones internes : autorisées uniquement au personnel de l''entité ou de l''IIV, aux tiers autorisés ou aux visiteurs
      accompagnés.


      - zones restreintes : accessibles uniquement aux personnes de l''entité ou de l''IIV habilitées à consulter, à traiter
      et manipuler des informations ou des équipements classifiés, et le cas échéant aux tiers autorisés et accompagnés.'
  requirements: []
- code: PHYS-ZONE-PROC
  domain: DOMAIN-7
  title:
    en: Access control procedures
    fr: Procédures de contrôle d'accès
  description:
    en: Each entity or critical infrastructure operator must formalize physical access control procedures for its premises
      and implement the mechanisms required to apply them. These procedures must be approved by management and communicated
      to staff.
    fr: Chaque entité ou IIV doit formaliser les procédures de contrôle d'accès physique à ses locaux en mettant en place
      les mécanismes nécessaires pour leur application. Ces procédures doivent être validées par la hiérarchie et le personnel
      doit être tenu au courant de leurs contenus.
  guidance:
    en: Each entity or critical infrastructure operator must formalize physical access control procedures for its premises
      and implement the mechanisms required to apply them. These procedures must be approved by management and communicated
      to staff.
    fr: Chaque entité ou IIV doit formaliser les procédures de contrôle d'accès physique à ses locaux en mettant en place
      les mécanismes nécessaires pour leur application. Ces procédures doivent être validées par la hiérarchie et le personnel
      doit être tenu au courant de leurs contenus.
  requirements: []
- code: PHYS-ZONE-DISPO
  domain: DOMAIN-7
  title:
    en: Access control device
    fr: Dispositif de contrôle d'accès
  description:
    en: Entities or critical infrastructure operators must implement individualized physical access control devices in restricted
      areas. These devices must ensure traceability of staff and authorized third-party access and keep records for at least
      three months.
    fr: 'Les entités ou les IIV sont tenues de mettre en place un dispositif de contrôle d''accès physique individualisé dans
      les zones restreintes.


      Ce dispositif doit assurer la traçabilité des accès du personnel et des tiers autorisés et accompagnés aux zones restreintes,
      et conserver les enregistrements pour une durée d''au moins trois mois.'
  guidance:
    en: Entities or critical infrastructure operators must implement individualized physical access control devices in restricted
      areas. These devices must ensure traceability of staff and authorized third-party access and keep records for at least
      three months.
    fr: 'Les entités ou les IIV sont tenues de mettre en place un dispositif de contrôle d''accès physique individualisé dans
      les zones restreintes.


      Ce dispositif doit assurer la traçabilité des accès du personnel et des tiers autorisés et accompagnés aux zones restreintes,
      et conserver les enregistrements pour une durée d''au moins trois mois.'
  requirements: []
- code: PHYS-ZONE--VIDEOPROT
  domain: DOMAIN-7
  title:
    en: Video protection
    fr: Vidéo protection
  description:
    en: Areas requiring protection must be covered by video surveillance. Recordings may only be handled by a limited number
      of persons specifically authorized for that purpose.
    fr: Les zones à sécuriser doivent être couvertes par une vidéo protection. Les enregistrements ne doivent être manipulés
      que par un nombre limité de personnes habilitées à cet effet.
  guidance:
    en: Areas requiring protection must be covered by video surveillance. Recordings may only be handled by a limited number
      of persons specifically authorized for that purpose.
    fr: Les zones à sécuriser doivent être couvertes par une vidéo protection. Les enregistrements ne doivent être manipulés
      que par un nombre limité de personnes habilitées à cet effet.
  requirements: []
- code: PHYS-ZONE-INCEN
  domain: DOMAIN-7
  title:
    en: Fire safety
    fr: Sécurité incendie
  description:
    en: Areas hosting information processing systems must be equipped with appropriate fire detection and extinguishing systems.
    fr: Les zones abritant des systèmes de traitement de l'information doivent être équipées de systèmes adaptés pour la détection
      et l'extinction d'incendies.
  guidance:
    en: Areas hosting information processing systems must be equipped with appropriate fire detection and extinguishing systems.
    fr: Les zones abritant des systèmes de traitement de l'information doivent être équipées de systèmes adaptés pour la détection
      et l'extinction d'incendies.
  requirements: []
- code: PHYS-ZONE-EAU
  domain: DOMAIN-7
  title:
    en: Water damage
    fr: Dégâts des eaux
  description:
    en: Information processing facilities must be located in premises protected against water damage risks.
    fr: Les moyens de traitement de l'information doivent être placés dans des locaux à l'abri des risques des dégâts des
      eaux.
  guidance:
    en: Information processing facilities must be located in premises protected against water damage risks.
    fr: Les moyens de traitement de l'information doivent être placés dans des locaux à l'abri des risques des dégâts des
      eaux.
  requirements: []
- code: PHYS-MAT--CABL
  domain: DOMAIN-7
  title:
    en: Cabling security
    fr: Sécurité du câblage
  description:
    en: Electrical and data transmission cables connected to information processing infrastructures must be identified, labelled,
      documented and separated. Cables must be arranged in clear, untangled bundles.
    fr: Les câbles électriques et de transmission de données (courant fort et courant faible), connectés aux infrastructures
      de traitement de l'information doivent être identifiés (étiquetés), documentés et séparés. Les câbles doivent être déroulés
      en faisceaux clairs et non emmêlés.
  guidance:
    en: Electrical and data transmission cables connected to information processing infrastructures must be identified, labelled,
      documented and separated. Cables must be arranged in clear, untangled bundles.
    fr: Les câbles électriques et de transmission de données (courant fort et courant faible), connectés aux infrastructures
      de traitement de l'information doivent être identifiés (étiquetés), documentés et séparés. Les câbles doivent être déroulés
      en faisceaux clairs et non emmêlés.
  requirements: []
- code: PHYS-MAT-OND
  domain: DOMAIN-7
  title:
    en: Uninterruptible power supplies
    fr: Onduleurs
  description:
    en: Information processing equipment must be protected against power fluctuations and micro-outages by uninterruptible
      power supplies with appropriate capacity.
    fr: Les équipements de traitement de l'information doivent être protégés des variations et des microcoupures d'électricité
      par des onduleurs à capacité adaptée.
  guidance:
    en: Information processing equipment must be protected against power fluctuations and micro-outages by uninterruptible
      power supplies with appropriate capacity.
    fr: Les équipements de traitement de l'information doivent être protégés des variations et des microcoupures d'électricité
      par des onduleurs à capacité adaptée.
  requirements: []
- code: PHYS-MAT-ELECTROG
  domain: DOMAIN-7
  title:
    en: Generator set
    fr: Groupe électrogène
  description:
    en: Where information system availability requirements are high, the entity or critical infrastructure operator may use
      a generator set to address prolonged power outages.
    fr: En cas de besoins accrus de disponibilité des SI, l'entité ou l'IIV peut faire recours à un groupe électrogène pour
      pallier les interruptions prolongées du courant électrique.
  guidance:
    en: Where information system availability requirements are high, the entity or critical infrastructure operator may use
      a generator set to address prolonged power outages.
    fr: En cas de besoins accrus de disponibilité des SI, l'entité ou l'IIV peut faire recours à un groupe électrogène pour
      pallier les interruptions prolongées du courant électrique.
  requirements: []
- code: PHYS-MAT-CLIM
  domain: DOMAIN-7
  title:
    en: Air conditioning
    fr: Climatisation
  description:
    en: Areas hosting information processing facilities, such as computer rooms and data centers, must be equipped with air
      conditioning systems to regulate temperature and humidity where needed.
    fr: Les zones abritant des moyens de traitement de l'information (salles des machines, datacenter ... etc.) doivent être
      équipées de systèmes de climatisation pour réguler au besoin la température et l'humidité.
  guidance:
    en: Areas hosting information processing facilities, such as computer rooms and data centers, must be equipped with air
      conditioning systems to regulate temperature and humidity where needed.
    fr: Les zones abritant des moyens de traitement de l'information (salles des machines, datacenter ... etc.) doivent être
      équipées de systèmes de climatisation pour réguler au besoin la température et l'humidité.
  requirements: []
- code: PHYS-MAT-EQUIP
  domain: DOMAIN-7
  title:
    en: Maintenance of environmental security equipment
    fr: Entretien des équipements de sécurité environnementale
  description:
    en: Environmental security equipment such as extinguishers, air conditioners, fire detectors, UPS units and generators
      must be properly maintained to ensure correct operation. Maintenance contracts must define suitable intervention times
      in case of failure.
    fr: 'Les équipements de sécurité environnementale (extincteurs, climatisations, détecteurs d''incendie, onduleurs, groupes
      électrogènes, etc.) doivent être correctement entretenus pour assurer leur bon fonctionnement.


      Un délai d''intervention adapté en cas de défaillance doit être précisé dans les contrats de maintenance des équipements
      de sécurité environnementale.'
  guidance:
    en: Environmental security equipment such as extinguishers, air conditioners, fire detectors, UPS units and generators
      must be properly maintained to ensure correct operation. Maintenance contracts must define suitable intervention times
      in case of failure.
    fr: 'Les équipements de sécurité environnementale (extincteurs, climatisations, détecteurs d''incendie, onduleurs, groupes
      électrogènes, etc.) doivent être correctement entretenus pour assurer leur bon fonctionnement.


      Un délai d''intervention adapté en cas de défaillance doit être précisé dans les contrats de maintenance des équipements
      de sécurité environnementale.'
  requirements: []
- code: PHYS-MAT-HORSLOC
  domain: DOMAIN-7
  title:
    en: Security of equipment and assets outside premises
    fr: Sécurité du matériel et des actifs hors les locaux
  description:
    en: Each entity or critical infrastructure operator must apply security measures to all IT equipment and media transported
      or used outside normal work premises, especially to protect them against theft, damage or intrusion.
    fr: Chaque entité ou IIV doit appliquer des mesures de sécurité à tous types d'équipements informatiques et supports destinés
      à être transportés et utilisés hors des lieux de travail habituel, afin de les protéger notamment contre les risques
      de vol, d'endommagement ou d'intrusion.
  guidance:
    en: Each entity or critical infrastructure operator must apply security measures to all IT equipment and media transported
      or used outside normal work premises, especially to protect them against theft, damage or intrusion.
    fr: Chaque entité ou IIV doit appliquer des mesures de sécurité à tous types d'équipements informatiques et supports destinés
      à être transportés et utilisés hors des lieux de travail habituel, afin de les protéger notamment contre les risques
      de vol, d'endommagement ou d'intrusion.
  requirements: []
- code: EXP-PROC-CHANG
  domain: DOMAIN-8
  title:
    en: Change management
    fr: Gestion des changements
  description:
    en: Any change to the information system must follow a formal process covering request, approval, implementation and post-implementation
      control. Each entity or critical infrastructure operator must control changes affecting information system security,
      including identification, planning, risk analysis, approval and documentation.
    fr: 'Tout changement apporté au SI doit suivre une procédure formelle respectant le cycle : demande, validation, application
      et contrôle à posteriori.


      En effet, chaque entité ou IIV doit contrôler tout changement qui influe sur la sécurité du SI, en tenant compte des
      éléments suivants :


      - L''identification et la planification des changements significatifs ;


      - L''appréciation des incidences potentielles de ces changements sur la sécurité de l''information ;


      - L''autorisation formelle des changements proposés ;


      - La transmission des informations détaillées sur les changements apportés à toutes les personnes concernées.'
  guidance:
    en: Any change to the information system must follow a formal process covering request, approval, implementation and post-implementation
      control. Each entity or critical infrastructure operator must control changes affecting information system security,
      including identification, planning, risk analysis, approval and documentation.
    fr: 'Tout changement apporté au SI doit suivre une procédure formelle respectant le cycle : demande, validation, application
      et contrôle à posteriori.


      En effet, chaque entité ou IIV doit contrôler tout changement qui influe sur la sécurité du SI, en tenant compte des
      éléments suivants :


      - L''identification et la planification des changements significatifs ;


      - L''appréciation des incidences potentielles de ces changements sur la sécurité de l''information ;


      - L''autorisation formelle des changements proposés ;


      - La transmission des informations détaillées sur les changements apportés à toutes les personnes concernées.'
  requirements: []
- code: EXP--PROC-CAP
  domain: DOMAIN-8
  title:
    en: Capacity management
    fr: Gestion des capacités
  description:
    en: Regular analyses of system and network sizing, including memory capacity, bandwidth and response times, must be performed
      to identify resizing actions that maintain or improve information system availability.
    fr: Des analyses régulières du bon dimensionnement des systèmes et des réseaux (capacité mémoire, bande passante, temps
      de réponse, ... ) doivent être réalisées dans le but de mener les actions de redimensionnement à même de garantir ou
      d'améliorer la disponibilité du SI.
  guidance:
    en: Regular analyses of system and network sizing, including memory capacity, bandwidth and response times, must be performed
      to identify resizing actions that maintain or improve information system availability.
    fr: Des analyses régulières du bon dimensionnement des systèmes et des réseaux (capacité mémoire, bande passante, temps
      de réponse, ... ) doivent être réalisées dans le but de mener les actions de redimensionnement à même de garantir ou
      d'améliorer la disponibilité du SI.
  requirements: []
- code: EXP-PROC-ENVIR
  domain: DOMAIN-8
  title:
    en: Separation of environments
    fr: Séparation des environnements
  description:
    en: Development, test and production environments must be separated, particularly to reduce risks of unauthorized access
      or unauthorized changes across the environments.
    fr: Les environnements de développement, de test et de production doivent être séparés pour réduire notamment les risques
      d'accès ou de changements non autorisés dans les trois environnements.
  guidance:
    en: Development, test and production environments must be separated, particularly to reduce risks of unauthorized access
      or unauthorized changes across the environments.
    fr: Les environnements de développement, de test et de production doivent être séparés pour réduire notamment les risques
      d'accès ou de changements non autorisés dans les trois environnements.
  requirements: []
- code: EXP-PROTEC-MALVEIL
  domain: DOMAIN-8
  title:
    en: Protection against malware
    fr: Protection contre les logiciels malveillants
  description:
    en: Protection solutions against malware must be installed and kept up to date on all servers, workstations and mobile
      devices.
    fr: Des solutions de protection contre les logiciels malveillants doivent être installées et mises à jour sur l'ensemble
      des serveurs, postes de travail et appareils mobiles.
  guidance:
    en: Protection solutions against malware must be installed and kept up to date on all servers, workstations and mobile
      devices.
    fr: Des solutions de protection contre les logiciels malveillants doivent être installées et mises à jour sur l'ensemble
      des serveurs, postes de travail et appareils mobiles.
  requirements: []
- code: EXP-SAUV-PROC
  domain: DOMAIN-8
  title:
    en: Backup procedures
    fr: Procédures de sauvegarde
  description:
    en: Each entity or critical infrastructure operator must implement backup procedures for each information system, specifying
      backup type, frequency, media type, sensitive data to be backed up, storage location and restoration conditions.
    fr: 'Chaque entité ou IIV doit mettre en place des procédures de sauvegarde qui précisent pour chaque système d''information
      :


      - la nature des sauvegardes (complète, incrémentale, déduplication, ... ) ;


      - la fréquence (journalière, hebdomadaire, mensuelle, ... ) ;


      - le type de support (sur disque, sur bande) ;


      - Les données sensibles devant être sauvegardées de manière chiffrée.'
  guidance:
    en: Each entity or critical infrastructure operator must implement backup procedures for each information system, specifying
      backup type, frequency, media type, sensitive data to be backed up, storage location and restoration conditions.
    fr: 'Chaque entité ou IIV doit mettre en place des procédures de sauvegarde qui précisent pour chaque système d''information
      :


      - la nature des sauvegardes (complète, incrémentale, déduplication, ... ) ;


      - la fréquence (journalière, hebdomadaire, mensuelle, ... ) ;


      - le type de support (sur disque, sur bande) ;


      - Les données sensibles devant être sauvegardées de manière chiffrée.'
  requirements: []
- code: EXP-SAUV-RESTAUR
  domain: DOMAIN-8
  title:
    en: Restoration
    fr: Restauration
  description:
    en: Each entity or critical infrastructure operator must regularly test backup media to ensure that backed-up data can
      be restored in a timely manner according to a documented restoration procedure.
    fr: Chaque entité ou IIV doit tester régulièrement les supports de sauvegarde en s'assurant que les données sauvegardées
      peuvent être restaurées en temps voulu conformément à une procédure de restauration documentée.
  guidance:
    en: Each entity or critical infrastructure operator must regularly test backup media to ensure that backed-up data can
      be restored in a timely manner according to a documented restoration procedure.
    fr: Chaque entité ou IIV doit tester régulièrement les supports de sauvegarde en s'assurant que les données sauvegardées
      peuvent être restaurées en temps voulu conformément à une procédure de restauration documentée.
  requirements: []
- code: EXP-SAUV-SEC
  domain: DOMAIN-8
  title:
    en: Backup security
    fr: Sécurité des sauvegardes
  description:
    en: Each entity or critical infrastructure operator must physically protect backup media by placing them in a protected
      location, such as a fireproof cabinet, or by externalizing them to a site sufficiently distant from the main site.
    fr: Chaque entité ou IIV doit protéger physiquement les supports de sauvegarde en les plaçant à un endroit protégé (Armoire
      ignifuge) ou en les externalisant sur un site suffisamment distant du site principal.
  guidance:
    en: Each entity or critical infrastructure operator must physically protect backup media by placing them in a protected
      location, such as a fireproof cabinet, or by externalizing them to a site sufficiently distant from the main site.
    fr: Chaque entité ou IIV doit protéger physiquement les supports de sauvegarde en les plaçant à un endroit protégé (Armoire
      ignifuge) ou en les externalisant sur un site suffisamment distant du site principal.
  requirements: []
- code: EXP--JOURN/SURV-JOURNAL
  domain: DOMAIN-8
  title:
    en: Event logging
    fr: Journalisation des événements
  description:
    en: Each entity or critical infrastructure operator must identify logs to collect from servers, security equipment, network
      equipment, applications and workstations according to feared risks and incidents. It must implement logs that record
      security events and support monitoring and investigation.
    fr: 'Chaque entité ou IIV doit mener une étude pour identifier les journaux à collecter des différentes sources (serveurs,
      équipements de sécurité, équipements réseaux, applications, postes de travail, etc.) en fonction des risques et incidents
      redoutés par l''entité ou par l''IIV. Elle doit mettre en place un journal répertoriant les événements de sécurité à
      collecter. Ces journaux doivent être analysés périodiquement et les actions à mener doivent être bien définies.


      Ces journaux doivent être centralisés et protégés contre les risques de falsification ou d''accès non autorisé. Ils
      doivent être conservés pour une durée minimale de six mois.'
  guidance:
    en: Each entity or critical infrastructure operator must identify logs to collect from servers, security equipment, network
      equipment, applications and workstations according to feared risks and incidents. It must implement logs that record
      security events and support monitoring and investigation.
    fr: 'Chaque entité ou IIV doit mener une étude pour identifier les journaux à collecter des différentes sources (serveurs,
      équipements de sécurité, équipements réseaux, applications, postes de travail, etc.) en fonction des risques et incidents
      redoutés par l''entité ou par l''IIV. Elle doit mettre en place un journal répertoriant les événements de sécurité à
      collecter. Ces journaux doivent être analysés périodiquement et les actions à mener doivent être bien définies.


      Ces journaux doivent être centralisés et protégés contre les risques de falsification ou d''accès non autorisé. Ils
      doivent être conservés pour une durée minimale de six mois.'
  requirements: []
- code: EXP--JOURN/SURV-PRIVIL
  domain: DOMAIN-8
  title:
    en: Traceability of privileged account actions
    fr: Traçabilité des actions des comptes à privilège
  description:
    en: Actions performed by system administrators and system operators must be traceable. Their accounts must be named accounts
      to ensure accountability for their actions.
    fr: Les actions des administrateurs système et des opérateurs système doivent être tracées. Pour cela leurs comptes doivent
      être nominatifs pour assurer l'imputabilité de leurs actions.
  guidance:
    en: Actions performed by system administrators and system operators must be traceable. Their accounts must be named accounts
      to ensure accountability for their actions.
    fr: Les actions des administrateurs système et des opérateurs système doivent être tracées. Pour cela leurs comptes doivent
      être nominatifs pour assurer l'imputabilité de leurs actions.
  requirements: []
- code: EXP-JOURN/SURV-MAINT
  domain: DOMAIN-8
  title:
    en: Traceability of maintenance actions
    fr: Traçabilité des actions de maintenance
  description:
    en: Maintenance interventions on IT resources must be traced by the IT department. These traces must be retained for at
      least three months while necessary measures are deployed to preserve their integrity.
    fr: Les interventions de maintenance sur les ressources informatiques de l'entité ou de l'IIV doivent être tracées par
      le service informatique. Ces traces sont à conserver pendant une durée d'au moins trois mois et ce tout en déployant
      les mesures nécessaires pour assurer leur intégrité.
  guidance:
    en: Maintenance interventions on IT resources must be traced by the IT department. These traces must be retained for at
      least three months while necessary measures are deployed to preserve their integrity.
    fr: Les interventions de maintenance sur les ressources informatiques de l'entité ou de l'IIV doivent être tracées par
      le service informatique. Ces traces sont à conserver pendant une durée d'au moins trois mois et ce tout en déployant
      les mesures nécessaires pour assurer leur intégrité.
  requirements: []
- code: EXP--JOURN/SURV-SYNCHRON
  domain: DOMAIN-8
  title:
    en: Clock synchronization
    fr: Synchronisation des horloges
  description:
    en: To ensure event log accuracy during investigations, assets must be synchronized to the same time source, namely a
      trusted Network Time Protocol service.
    fr: 'Pour assurer la précision des journaux d''événements qui peuvent être utilisés lors des investigations, les actifs
      doivent être synchronisés sur la même base de temps, à savoir : le service NTP de confiance (Network Time Protocol).'
  guidance:
    en: To ensure event log accuracy during investigations, assets must be synchronized to the same time source, namely a
      trusted Network Time Protocol service.
    fr: 'Pour assurer la précision des journaux d''événements qui peuvent être utilisés lors des investigations, les actifs
      doivent être synchronisés sur la même base de temps, à savoir : le service NTP de confiance (Network Time Protocol).'
  requirements: []
- code: EXP--JOURN/SURV--DIST
  domain: DOMAIN-8
  title:
    en: Remote administration
    fr: Administration à distance
  description:
    en: Remote administration actions on local resources must rely on secure administration protocols. Specific security measures
      must be defined and followed.
    fr: Les actions d'administration à distance sur les ressources locales doivent s'appuyer sur des protocoles d'administration
      sécurisés. Des mesures de sécurité spécifiques doivent être définies et respectées.
  guidance:
    en: Remote administration actions on local resources must rely on secure administration protocols. Specific security measures
      must be defined and followed.
    fr: Les actions d'administration à distance sur les ressources locales doivent s'appuyer sur des protocoles d'administration
      sécurisés. Des mesures de sécurité spécifiques doivent être définies et respectées.
  requirements: []
- code: EXP--JOURN/SURV---CENTR
  domain: DOMAIN-8
  title:
    en: Centralization
    fr: Centralisation
  description:
    en: The entity or critical infrastructure operator must centrally implement appropriate monitoring and detection capabilities
      for continuous processing of security events required by Law No. 05-20 on cybersecurity.
    fr: L'entité ou l'IIV doit mettre en place de manière centralisée les moyens appropriés de supervision et de détection
      pour le traitement continu des événements de sécurité prévus par la loi nº05-20 relative à la cybersécurité.
  guidance:
    en: The entity or critical infrastructure operator must centrally implement appropriate monitoring and detection capabilities
      for continuous processing of security events required by Law No. 05-20 on cybersecurity.
    fr: L'entité ou l'IIV doit mettre en place de manière centralisée les moyens appropriés de supervision et de détection
      pour le traitement continu des événements de sécurité prévus par la loi nº05-20 relative à la cybersécurité.
  requirements: []
- code: EXP-SYS-CONFIG
  domain: DOMAIN-8
  title:
    en: System configuration
    fr: Configuration système
  description:
    en: Each entity or critical infrastructure operator must document secure administration and configuration procedures for
      information system assets, make them available, explain them to persons who need to know them, and keep them up to date.
      Configurations must be backed up securely after each change.
    fr: 'Chaque entité ou IIV doit documenter les procédures d''administration et de configuration sécurisée des actifs du
      système d''information, les rendre disponibles, les expliquer à toute personne ayant besoin de les connaître et les
      maintenir à jour.


      Les configurations doivent être sauvegardées en lieu sûr après chaque changement.'
  guidance:
    en: Each entity or critical infrastructure operator must document secure administration and configuration procedures for
      information system assets, make them available, explain them to persons who need to know them, and keep them up to date.
      Configurations must be backed up securely after each change.
    fr: 'Chaque entité ou IIV doit documenter les procédures d''administration et de configuration sécurisée des actifs du
      système d''information, les rendre disponibles, les expliquer à toute personne ayant besoin de les connaître et les
      maintenir à jour.


      Les configurations doivent être sauvegardées en lieu sûr après chaque changement.'
  requirements: []
- code: EXP-SYS-DURC
  domain: DOMAIN-8
  title:
    en: Configuration hardening
    fr: Durcissement des configurations
  description:
    en: Equipment and system configurations must be hardened compared with supplier default versions, including changing default
      passwords and certificates and closing unnecessary services and ports. Hardening procedures and guides for different
      asset types must be documented.
    fr: 'Les configurations des équipements et systèmes doivent être durcies notamment par rapport aux versions natives des
      fournisseurs (le changement des mots de passe par défaut et des certificats, la fermeture des services et des ports
      non nécessaires, etc .. ).


      Les procédures et guides de durcissement pour les différents types d''actifs doivent être documentés et tenus à jours.'
  guidance:
    en: Equipment and system configurations must be hardened compared with supplier default versions, including changing default
      passwords and certificates and closing unnecessary services and ports. Hardening procedures and guides for different
      asset types must be documented.
    fr: 'Les configurations des équipements et systèmes doivent être durcies notamment par rapport aux versions natives des
      fournisseurs (le changement des mots de passe par défaut et des certificats, la fermeture des services et des ports
      non nécessaires, etc .. ).


      Les procédures et guides de durcissement pour les différents types d''actifs doivent être documentés et tenus à jours.'
  requirements: []
- code: EXP-VULN-INSTALL
  domain: DOMAIN-8
  title:
    en: Software installation restrictions
    fr: Restrictions liées à l'installation de logiciels
  description:
    en: Each entity or critical infrastructure operator must define and implement a process controlling which software users
      may install and which privileges are granted to them, taking their functions into account.
    fr: Chaque entité ou IIV doit définir et mettre en place un processus de contrôle des logiciels que les utilisateurs peuvent
      installer ainsi que des privilèges qui leurs sont accordés en tenant compte de leurs fonctions.
  guidance:
    en: Each entity or critical infrastructure operator must define and implement a process controlling which software users
      may install and which privileges are granted to them, taking their functions into account.
    fr: Chaque entité ou IIV doit définir et mettre en place un processus de contrôle des logiciels que les utilisateurs peuvent
      installer ainsi que des privilèges qui leurs sont accordés en tenant compte de leurs fonctions.
  requirements: []
- code: EXP-VULN-GEST
  domain: DOMAIN-8
  title:
    en: Technical vulnerability management
    fr: Gestion des vulnérabilités techniques
  description:
    en: Each entity or critical infrastructure operator must be informed in a timely manner of technical vulnerabilities affecting
      operational information systems, assess exposure to those vulnerabilities, and take appropriate measures to address
      the associated risk. A vulnerability management procedure must be implemented.
    fr: 'Chaque entité ou IIV doit être tenue informée en temps voulu des vulnérabilités techniques des systèmes d''information
      en exploitation, d''évaluer son exposition à ces vulnérabilités et de prendre les mesures appropriées pour traiter le
      risque associé.


      Une procédure de gestion des vulnérabilités doit être mise en place en prenant en compte principalement les éléments
      suivants :


      - L''inventaire des actifs informationnels en service ;


      - Les rôles et responsabilités associés à la gestion des vulnérabilités ;


      - Les délais d''intervention ;


      - Les modalités de corrections (Application de correctifs, cloisonnement, ... ).


      - Les vulnérabilités jugées critiques doivent être portées à la connaissance de la DGSSI.'
  guidance:
    en: Each entity or critical infrastructure operator must be informed in a timely manner of technical vulnerabilities affecting
      operational information systems, assess exposure to those vulnerabilities, and take appropriate measures to address
      the associated risk. A vulnerability management procedure must be implemented.
    fr: 'Chaque entité ou IIV doit être tenue informée en temps voulu des vulnérabilités techniques des systèmes d''information
      en exploitation, d''évaluer son exposition à ces vulnérabilités et de prendre les mesures appropriées pour traiter le
      risque associé.


      Une procédure de gestion des vulnérabilités doit être mise en place en prenant en compte principalement les éléments
      suivants :


      - L''inventaire des actifs informationnels en service ;


      - Les rôles et responsabilités associés à la gestion des vulnérabilités ;


      - Les délais d''intervention ;


      - Les modalités de corrections (Application de correctifs, cloisonnement, ... ).


      - Les vulnérabilités jugées critiques doivent être portées à la connaissance de la DGSSI.'
  requirements: []
- code: EXP-VULN-CORRECT
  domain: DOMAIN-8
  title:
    en: Patch management
    fr: Gestion des correctifs
  description:
    en: Each entity or critical infrastructure operator must define and implement a policy for monitoring and applying security
      patches. A patch management process specific to each system or application must be defined and adapted to its constraints
      and exposure level.
    fr: 'Chaque entité ou IIV doit définir et mettre en œuvre une politique de suivi et d''application des correctifs de sécurité.


      Un processus de gestion des correctifs propre à chaque système ou applicatif doit être défini et adapté suivant les
      contraintes et le niveau d''exposition du système.'
  guidance:
    en: Each entity or critical infrastructure operator must define and implement a policy for monitoring and applying security
      patches. A patch management process specific to each system or application must be defined and adapted to its constraints
      and exposure level.
    fr: 'Chaque entité ou IIV doit définir et mettre en œuvre une politique de suivi et d''application des correctifs de sécurité.


      Un processus de gestion des correctifs propre à chaque système ou applicatif doit être défini et adapté suivant les
      contraintes et le niveau d''exposition du système.'
  requirements: []
- code: EXP-AUDIT-MES
  domain: DOMAIN-8
  title:
    en: Information system audit measures
    fr: Mesures relatives à l'audit du système d'information
  description:
    en: The arrangements for audit operations performed by the entity or critical infrastructure operator must be clearly
      defined, including equipment access, permitted controls and processing, data consultation and auditor authorization.
      Audit requirements and activities on operational systems must be planned and controlled.
    fr: 'Les modalités de déroulement des opérations d''audit déployées par l''entité ou par l''IIV doivent être bien définies
      (accès aux équipements, contrôles et traitements admis, consultation des données, habilitation des auditeurs, etc.).


      Les exigences et activités d''audit impliquant des vérifications sur des systèmes en exploitation doivent être prévues
      avec soin et validées afin de réduire au minimum les perturbations qui pourraient être subies par les processus métier.


      Certaines règles applicables à l''audit des systèmes d''information sensibles sont définies par la loi nº 05-20 et ses
      textes d''application.'
  guidance:
    en: The arrangements for audit operations performed by the entity or critical infrastructure operator must be clearly
      defined, including equipment access, permitted controls and processing, data consultation and auditor authorization.
      Audit requirements and activities on operational systems must be planned and controlled.
    fr: 'Les modalités de déroulement des opérations d''audit déployées par l''entité ou par l''IIV doivent être bien définies
      (accès aux équipements, contrôles et traitements admis, consultation des données, habilitation des auditeurs, etc.).


      Les exigences et activités d''audit impliquant des vérifications sur des systèmes en exploitation doivent être prévues
      avec soin et validées afin de réduire au minimum les perturbations qui pourraient être subies par les processus métier.


      Certaines règles applicables à l''audit des systèmes d''information sensibles sont définies par la loi nº 05-20 et ses
      textes d''application.'
  requirements: []
- code: COM-MANAG-CLOISON
  domain: DOMAIN-9
  title:
    en: Network segregation
    fr: Cloisonnement du réseau
  description:
    en: Each entity or critical infrastructure operator must segment its network into zones such as public, user and server
      zones according to the classification and sensitivity levels of connected information assets.
    fr: Chaque entité ou IIV est tenue de cloisonner son réseau en zones (zone publique, zone utilisateurs, zone serveurs,
      etc.) selon la classification et les niveaux de sensibilité des actifs informationnels connectés.
  guidance:
    en: Each entity or critical infrastructure operator must segment its network into zones such as public, user and server
      zones according to the classification and sensitivity levels of connected information assets.
    fr: Chaque entité ou IIV est tenue de cloisonner son réseau en zones (zone publique, zone utilisateurs, zone serveurs,
      etc.) selon la classification et les niveaux de sensibilité des actifs informationnels connectés.
  requirements: []
- code: COM-MANAG-FILTRAGE
  domain: DOMAIN-9
  title:
    en: Traffic filtering
    fr: Filtrage des flux
  description:
    en: Incoming and outgoing traffic for each network zone must be subject to strict filtering rules in accordance with the
      access control policy and classification of processed data. The list of filtering rules must be documented and kept
      up to date.
    fr: 'Le trafic entrant et sortant de chaque zone réseau doit être soumis à des règles strictes de filtrage conformément
      à la politique de contrôle d''accès et à la classification des données traitées.


      La liste des règles de filtrage doit être documentée et tenue à jour.'
  guidance:
    en: Incoming and outgoing traffic for each network zone must be subject to strict filtering rules in accordance with the
      access control policy and classification of processed data. The list of filtering rules must be documented and kept
      up to date.
    fr: 'Le trafic entrant et sortant de chaque zone réseau doit être soumis à des règles strictes de filtrage conformément
      à la politique de contrôle d''accès et à la classification des données traitées.


      La liste des règles de filtrage doit être documentée et tenue à jour.'
  requirements: []
- code: COM-MANAG-SYSAUT
  domain: DOMAIN-9
  title:
    en: Systems authorized on the network
    fr: Systèmes autorisés sur le réseau
  description:
    en: The entity or critical infrastructure operator must implement the means and mechanisms necessary to ensure that only
      authorized equipment can connect to its internal network.
    fr: L'entité ou l'IIV doit mettre en place les moyens et mécanismes nécessaires pour s'assurer que seuls les équipements
      autorisés peuvent être connectés au réseau interne de l'entité ou de l'IIV.
  guidance:
    en: The entity or critical infrastructure operator must implement the means and mechanisms necessary to ensure that only
      authorized equipment can connect to its internal network.
    fr: L'entité ou l'IIV doit mettre en place les moyens et mécanismes nécessaires pour s'assurer que seuls les équipements
      autorisés peuvent être connectés au réseau interne de l'entité ou de l'IIV.
  requirements: []
- code: COM-MANAG-DISTANT
  domain: DOMAIN-9
  title:
    en: Remote access
    fr: Accès distants
  description:
    en: Remote access must only be possible for authorized and clearly identified persons using controlled means. Appropriate
      authentication measures and secure protocols are required for these connections.
    fr: 'L''accès distant ne doit être réalisable que par des personnes autorisées et bien définies et à partir de moyens
      maitrisés.


      Des mesures d''authentification adaptées et l''usage de protocoles sécurisés pour ce type de connexions sont nécessaires.'
  guidance:
    en: Remote access must only be possible for authorized and clearly identified persons using controlled means. Appropriate
      authentication measures and secure protocols are required for these connections.
    fr: 'L''accès distant ne doit être réalisable que par des personnes autorisées et bien définies et à partir de moyens
      maitrisés.


      Des mesures d''authentification adaptées et l''usage de protocoles sécurisés pour ce type de connexions sont nécessaires.'
  requirements: []
- code: COM-MANAG-TUNEL
  domain: DOMAIN-9
  title:
    en: Encrypted tunneling
    fr: Tunnelisation chiffrée
  description:
    en: Each entity or critical infrastructure operator must implement encryption mechanisms to protect remote connection
      tunnels when access is performed through a public network.
    fr: Chaque entité ou IIV doit mettre en place des mécanismes de chiffrement pour la protection des tunnels de connexion
      à distance lorsque l'accès se fait à travers un réseau public.
  guidance:
    en: Each entity or critical infrastructure operator must implement encryption mechanisms to protect remote connection
      tunnels when access is performed through a public network.
    fr: Chaque entité ou IIV doit mettre en place des mécanismes de chiffrement pour la protection des tunnels de connexion
      à distance lorsque l'accès se fait à travers un réseau public.
  requirements: []
- code: COM-MANAG-RSF
  domain: DOMAIN-9
  title:
    en: Wireless network security
    fr: Sécurité des réseaux sans fil
  description:
    en: Wireless network deployment must be subject to a specific security assessment. The wireless network must be segregated
      from the rest of the network through a controlled gateway that traces access and restricts exchanges to necessary traffic
      only. Appropriate authentication mechanisms must be implemented.
    fr: 'Le déploiement du réseau sans fil doit faire l''objet d''une étude de sécurité spécifique.


      Le réseau sans fil doit être cloisonné du reste du réseau : une passerelle maîtrisée doit être mise en place permettant
      de tracer les accès et de restreindre les échanges aux seuls flux nécessaires.


      Des moyens d''authentification adaptés doivent être mis en place pour limiter l''accès aux réseaux sans fil aux seules
      personnes autorisées.'
  guidance:
    en: Wireless network deployment must be subject to a specific security assessment. The wireless network must be segregated
      from the rest of the network through a controlled gateway that traces access and restricts exchanges to necessary traffic
      only. Appropriate authentication mechanisms must be implemented.
    fr: 'Le déploiement du réseau sans fil doit faire l''objet d''une étude de sécurité spécifique.


      Le réseau sans fil doit être cloisonné du reste du réseau : une passerelle maîtrisée doit être mise en place permettant
      de tracer les accès et de restreindre les échanges aux seuls flux nécessaires.


      Des moyens d''authentification adaptés doivent être mis en place pour limiter l''accès aux réseaux sans fil aux seules
      personnes autorisées.'
  requirements: []
- code: COM-TRANS-FICHIER
  domain: DOMAIN-9
  title:
    en: Use of file transfers
    fr: Usage des transferts par fichiers
  description:
    en: Appropriate means must be implemented to protect information transmitted through any communication mechanism, including
      file servers, sharing services and cloud storage, against interception, reproduction, modification, routing errors or
      destruction.
    fr: Des moyens adaptés doivent être mis en place pour la protection des informations qui transitent à travers tout type
      de moyens de communication (serveurs de fichier, partage ou stockage Cloud, etc.) contre l'interception, la reproduction,
      la modification, les erreurs d'acheminement ou la destruction.
  guidance:
    en: Appropriate means must be implemented to protect information transmitted through any communication mechanism, including
      file servers, sharing services and cloud storage, against interception, reproduction, modification, routing errors or
      destruction.
    fr: Des moyens adaptés doivent être mis en place pour la protection des informations qui transitent à travers tout type
      de moyens de communication (serveurs de fichier, partage ou stockage Cloud, etc.) contre l'interception, la reproduction,
      la modification, les erreurs d'acheminement ou la destruction.
  requirements: []
- code: COM-TRANS-MESS
  domain: DOMAIN-9
  title:
    en: Use of email
    fr: Usage de la messagerie électronique
  description:
    en: Each entity or critical infrastructure operator must formalize and implement rules for secure email use, including
      encryption and signing of sensitive messages, secure remote access to professional email, verification of message sources
      and awareness of email-related risks.
    fr: 'Chaque entité ou IIV doit formaliser et mettre en œuvre les règles de bon usage nécessaires pour la sécurité de la
      messagerie électronique notamment :


      - le chiffrement et la signature des messages sensibles par des moyens adaptés ;


      - l''accès à distance à la messagerie professionnelle via un canal sécurisé ;


      - la vérification de la source des courriers électroniques avant d''ouvrir les pièces jointes;


      - l''interdiction de l''usage de la messagerie professionnelle à des fins personnelles ;


      - l''interdiction du renvoi automatique vers une messagerie non maîtrisée, sauf autorisation expresse pour des raisons
      exceptionnelles.'
  guidance:
    en: Each entity or critical infrastructure operator must formalize and implement rules for secure email use, including
      encryption and signing of sensitive messages, secure remote access to professional email, verification of message sources
      and awareness of email-related risks.
    fr: 'Chaque entité ou IIV doit formaliser et mettre en œuvre les règles de bon usage nécessaires pour la sécurité de la
      messagerie électronique notamment :


      - le chiffrement et la signature des messages sensibles par des moyens adaptés ;


      - l''accès à distance à la messagerie professionnelle via un canal sécurisé ;


      - la vérification de la source des courriers électroniques avant d''ouvrir les pièces jointes;


      - l''interdiction de l''usage de la messagerie professionnelle à des fins personnelles ;


      - l''interdiction du renvoi automatique vers une messagerie non maîtrisée, sauf autorisation expresse pour des raisons
      exceptionnelles.'
  requirements: []
- code: COM-TRANS-FILTR
  domain: DOMAIN-9
  title:
    en: Email filtering
    fr: Filtrage des mails
  description:
    en: Each entity or critical infrastructure operator must ensure filtering mechanisms are applied to sent and received
      email, including anti-virus checks on attachments, checks on attachment size and type, anti-spam protection and SMTP
      header checks.
    fr: 'Chaque entité ou IIV doit veiller à l''application des mécanismes de filtrage du courrier électronique émis et reçu
      notamment par :


      - le contrôle antiviral des pièces jointes, leurs tailles et natures ;


      - la protection anti-spam ;


      - le contrôle des entêtes SMTP.'
  guidance:
    en: Each entity or critical infrastructure operator must ensure filtering mechanisms are applied to sent and received
      email, including anti-virus checks on attachments, checks on attachment size and type, anti-spam protection and SMTP
      header checks.
    fr: 'Chaque entité ou IIV doit veiller à l''application des mécanismes de filtrage du courrier électronique émis et reçu
      notamment par :


      - le contrôle antiviral des pièces jointes, leurs tailles et natures ;


      - la protection anti-spam ;


      - le contrôle des entêtes SMTP.'
  requirements: []
- code: DEV-EXIG-PROJET
  domain: DOMAIN-10
  title:
    en: Information security in project management
    fr: Sécurité de l'information dans la gestion de projet
  description:
    en: Each entity or critical infrastructure operator must address information security in the management of all types of
      information system projects. Security must be integrated into every phase of the project lifecycle, including risk assessment,
      security requirements, validation and appropriate controls.
    fr: 'Chaque entité ou IIV doit traiter la sécurité de l''information dans la gestion de tous types de projets SI. A ce
      titre, la sécurité doit être intégrée à toutes les phases du cycle de vie du projet de manière à s''assurer notamment
      que :


      - une appréciation du risque, liée à la sécurité de l''information, soit effectuée au commencement du projet pour identifier
      les exigences de sécurité ;


      - les objectifs en matière de sécurité de l''information soient intégrés aux objectifs du projet et pris en compte dès
      la conception ;


      - la vérification de la sécurité soit intégrée dans les tests d''acceptation.'
  guidance:
    en: Each entity or critical infrastructure operator must address information security in the management of all types of
      information system projects. Security must be integrated into every phase of the project lifecycle, including risk assessment,
      security requirements, validation and appropriate controls.
    fr: 'Chaque entité ou IIV doit traiter la sécurité de l''information dans la gestion de tous types de projets SI. A ce
      titre, la sécurité doit être intégrée à toutes les phases du cycle de vie du projet de manière à s''assurer notamment
      que :


      - une appréciation du risque, liée à la sécurité de l''information, soit effectuée au commencement du projet pour identifier
      les exigences de sécurité ;


      - les objectifs en matière de sécurité de l''information soient intégrés aux objectifs du projet et pris en compte dès
      la conception ;


      - la vérification de la sécurité soit intégrée dans les tests d''acceptation.'
  requirements: []
- code: DEV-EXIG-TRANSAC
  domain: DOMAIN-10
  title:
    en: Protection of application service transactions
    fr: Protection des transactions liées aux services d'application
  description:
    en: Each entity or critical infrastructure operator must identify files and transactions that need protection through
      encryption and/or electronic signature solutions at the application architecture level.
    fr: Chaque entité ou IIV doit identifier les fichiers et les transactions devant être protégés par des solutions de chiffrement
      et/ou de signature électronique au niveau de l'architecture applicative.
  guidance:
    en: Each entity or critical infrastructure operator must identify files and transactions that need protection through
      encryption and/or electronic signature solutions at the application architecture level.
    fr: Chaque entité ou IIV doit identifier les fichiers et les transactions devant être protégés par des solutions de chiffrement
      et/ou de signature électronique au niveau de l'architecture applicative.
  requirements: []
- code: DEV-PROC-POL
  domain: DOMAIN-10
  title:
    en: Secure development policy
    fr: Politique de développement sécurisé
  description:
    en: Each entity or critical infrastructure operator must develop and implement a secure software and systems development
      policy in accordance with DGSSI guides and frameworks. The policy must define development environment security requirements,
      design-phase security requirements, security checkpoints and validation practices.
    fr: 'Chaque entité ou IIV doit élaborer et mettre en place, conformément aux guides et référentiels élaborés par la DGSSI,
      une politique de développement sécurisé des logiciels et des systèmes, qui définit notamment :


      - les exigences de sécurité de l''environnement de développement ;


      - les exigences de sécurité dans la phase de conception ;


      - les points de contrôle de la sécurité aux différentes étapes clés du projet ;


      - les référentiels de développement sécurisé à utiliser ;


      - les règles de protection du code source et le contrôle des versions.'
  guidance:
    en: Each entity or critical infrastructure operator must develop and implement a secure software and systems development
      policy in accordance with DGSSI guides and frameworks. The policy must define development environment security requirements,
      design-phase security requirements, security checkpoints and validation practices.
    fr: 'Chaque entité ou IIV doit élaborer et mettre en place, conformément aux guides et référentiels élaborés par la DGSSI,
      une politique de développement sécurisé des logiciels et des systèmes, qui définit notamment :


      - les exigences de sécurité de l''environnement de développement ;


      - les exigences de sécurité dans la phase de conception ;


      - les points de contrôle de la sécurité aux différentes étapes clés du projet ;


      - les référentiels de développement sécurisé à utiliser ;


      - les règles de protection du code source et le contrôle des versions.'
  requirements: []
- code: DEV-PROC-CHANG
  domain: DOMAIN-10
  title:
    en: Control of system changes in the development lifecycle
    fr: Contrôle des changements apportés au système dans le cycle de développement
  description:
    en: Changes to the information system during the development lifecycle must be controlled using formal procedures. Each
      entity or critical infrastructure operator must assess change-related risks, limit changes to what is necessary, and
      ensure testing, approval and traceability.
    fr: 'Les changements apportés au SI dans le cycle de développement doivent être contrôlés en utilisant des procédures
      formelles.


      A cet effet, chaque entité ou IIV doit mener une appréciation du risque pour analyser les incidences des changements
      apportés au SI dans le cycle de développement et se limiter aux changements nécessaires.


      Lorsque les changements sont apportés, chaque entité ou IIV doit revoir et tester les applications métiers critiques
      afin de vérifier tout impact sur l''activité ou sur la sécurité.'
  guidance:
    en: Changes to the information system during the development lifecycle must be controlled using formal procedures. Each
      entity or critical infrastructure operator must assess change-related risks, limit changes to what is necessary, and
      ensure testing, approval and traceability.
    fr: 'Les changements apportés au SI dans le cycle de développement doivent être contrôlés en utilisant des procédures
      formelles.


      A cet effet, chaque entité ou IIV doit mener une appréciation du risque pour analyser les incidences des changements
      apportés au SI dans le cycle de développement et se limiter aux changements nécessaires.


      Lorsque les changements sont apportés, chaque entité ou IIV doit revoir et tester les applications métiers critiques
      afin de vérifier tout impact sur l''activité ou sur la sécurité.'
  requirements: []
- code: DEV-PROC-ENVIR
  domain: DOMAIN-10
  title:
    en: Secure development environment
    fr: Environnement de développement sécurisé
  description:
    en: Each entity or critical infrastructure operator must ensure development environments are secured, taking into account
      the sensitivity of processed, stored and transmitted data, applicable internal and external requirements, and the trustworthiness
      of staff working in those environments.
    fr: 'Chaque entité ou IIV doit veiller à ce que les environnements de développement soient sécurisés, de manière à tenir
      compte notamment de :


      - la sensibilité des données traitées, stockées et en transit ;


      - les exigences internes et externes découlant des politiques et référentiels en vigueur ;


      - le niveau de fiabilité du personnel travaillant dans l''environnement ;


      - le contrôle d''accès aux environnements ;


      - la séparation des différents environnements de développement ;


      - le degré d''externalisation associée à la tâche de développement.'
  guidance:
    en: Each entity or critical infrastructure operator must ensure development environments are secured, taking into account
      the sensitivity of processed, stored and transmitted data, applicable internal and external requirements, and the trustworthiness
      of staff working in those environments.
    fr: 'Chaque entité ou IIV doit veiller à ce que les environnements de développement soient sécurisés, de manière à tenir
      compte notamment de :


      - la sensibilité des données traitées, stockées et en transit ;


      - les exigences internes et externes découlant des politiques et référentiels en vigueur ;


      - le niveau de fiabilité du personnel travaillant dans l''environnement ;


      - le contrôle d''accès aux environnements ;


      - la séparation des différents environnements de développement ;


      - le degré d''externalisation associée à la tâche de développement.'
  requirements: []
- code: DEV-PROC-TEST
  domain: DOMAIN-10
  title:
    en: System security testing
    fr: Test de la sécurité du système
  description:
    en: Each entity or critical infrastructure operator must ensure security testing is performed during the development lifecycle
      in accordance with its secure development policy and with DGSSI guides and frameworks.
    fr: Chaque entité ou IIV doit assurer la réalisation des tests de la sécurité durant le cycle de développement conformément
      à la politique de développement sécurisé de l'entité ou de l'IIV et aux guides et référentiels élaborés par la DGSSI.
  guidance:
    en: Each entity or critical infrastructure operator must ensure security testing is performed during the development lifecycle
      in accordance with its secure development policy and with DGSSI guides and frameworks.
    fr: Chaque entité ou IIV doit assurer la réalisation des tests de la sécurité durant le cycle de développement conformément
      à la politique de développement sécurisé de l'entité ou de l'IIV et aux guides et référentiels élaborés par la DGSSI.
  requirements: []
- code: DEV-PROC-CODE
  domain: DOMAIN-10
  title:
    en: Protection of program source code
    fr: Protection du code source des programmes
  description:
    en: Strict access control to program source code and related items, such as design requirements, specifications and verification
      or validation programs, must be implemented.
    fr: Un contrôle strict de l'accès au code source des programmes et aux éléments associés tels que les exigences de conception,
      les spécifications, les programmes de vérification et de validation, doit être mis en place.
  guidance:
    en: Strict access control to program source code and related items, such as design requirements, specifications and verification
      or validation programs, must be implemented.
    fr: Un contrôle strict de l'accès au code source des programmes et aux éléments associés tels que les exigences de conception,
      les spécifications, les programmes de vérification et de validation, doit être mis en place.
  requirements: []
- code: DEV-PROC-DONNEE
  domain: DOMAIN-10
  title:
    en: Protection of test data
    fr: Protection des données de test
  description:
    en: When production data is used for testing, applicable access procedures for operational application systems must be
      followed, authorization must be obtained before copying operational information into a test environment, and operational
      information must be erased after testing.
    fr: 'Lorsque des données d''exploitation sont utilisées pour les besoins d''un test, il est nécessaire notamment de :


      - respecter les procédures d''accès qui s''appliquent aux systèmes d''applications en exploitation ;


      - obtenir une autorisation pour copier des informations d''exploitation dans un environnement de test ;


      - effacer les informations d''exploitation d''un environnement de test immédiatement après la fin des tests ;


      - journaliser toute reproduction et utilisation de l''information d''exploitation.


      En outre, lorsque les données d''exploitation sont de nature sensible, elles ne doivent pas être utilisées sans qu''il
      ne soit procédé à leur anonymisation.'
  guidance:
    en: When production data is used for testing, applicable access procedures for operational application systems must be
      followed, authorization must be obtained before copying operational information into a test environment, and operational
      information must be erased after testing.
    fr: 'Lorsque des données d''exploitation sont utilisées pour les besoins d''un test, il est nécessaire notamment de :


      - respecter les procédures d''accès qui s''appliquent aux systèmes d''applications en exploitation ;


      - obtenir une autorisation pour copier des informations d''exploitation dans un environnement de test ;


      - effacer les informations d''exploitation d''un environnement de test immédiatement après la fin des tests ;


      - journaliser toute reproduction et utilisation de l''information d''exploitation.


      En outre, lorsque les données d''exploitation sont de nature sensible, elles ne doivent pas être utilisées sans qu''il
      ne soit procédé à leur anonymisation.'
  requirements: []
- code: FOURNIS-REL-RISQ
  domain: DOMAIN-11
  title:
    en: Risks arising from suppliers
    fr: Risques émanant des fournisseurs
  description:
    en: Each entity or critical infrastructure operator must identify security risks related to interventions by suppliers
      and service providers. Supplier relationship security must include a policy defining specific measures applicable to
      suppliers and providers.
    fr: 'Chaque entité ou IIV doit identifier les risques de sécurité liés aux interventions des fournisseurs et des prestataires.
      FOURNIS-REL-POL : Politique de sécurité de l''information dans les relations avec les fournisseurs


      Chaque entité ou IIV doit mettre en place une politique qui définit les mesures de sécurité spécifiques applicables
      aux fournisseurs et aux prestataires.'
  guidance:
    en: Each entity or critical infrastructure operator must identify security risks related to interventions by suppliers
      and service providers. Supplier relationship security must include a policy defining specific measures applicable to
      suppliers and providers.
    fr: 'Chaque entité ou IIV doit identifier les risques de sécurité liés aux interventions des fournisseurs et des prestataires.
      FOURNIS-REL-POL : Politique de sécurité de l''information dans les relations avec les fournisseurs


      Chaque entité ou IIV doit mettre en place une politique qui définit les mesures de sécurité spécifiques applicables
      aux fournisseurs et aux prestataires.'
  requirements: []
- code: FOURNIS-REL-POL
  domain: DOMAIN-11
  title:
    en: Information security policy in supplier relationships
    fr: Politique de sécurité de l’information dans les relations avec les fournisseurs
  description:
    en: Each entity or critical infrastructure operator must implement a policy defining specific security measures applicable
      to suppliers and service providers.
    fr: 'Chaque entité ou IIV doit mettre en place une politique qui définit les mesures de sécurité spécifiques applicables

      aux fournisseurs et aux prestataires.'
  guidance:
    en: Each entity or critical infrastructure operator must implement a policy defining specific security measures applicable
      to suppliers and service providers.
    fr: 'Chaque entité ou IIV doit mettre en place une politique qui définit les mesures de sécurité spécifiques applicables

      aux fournisseurs et aux prestataires.'
  requirements: []
- code: FOURNIS-REL-EXIG
  domain: DOMAIN-11
  title:
    en: Contractual requirements
    fr: Exigences contractuelles
  description:
    en: Contracts must include the entity or critical infrastructure operator requirements for security and service levels.
      Suppliers and service providers must comply with the information systems security policy under the contracts. Auditability
      and reversibility clauses must be included where relevant.
    fr: 'Les contrats conclus doivent prévoir les exigences de l’entité ou de l’IIV en termes de sécurité et de niveaux de

      service. Les fournisseurs et les prestataires sont tenus conformément aux contrats conclus de respecter la politique

      de sécurité des SI de l’entité ou de l’IIV.

      Des clauses d’auditabilité et de réversibilité sont à prévoir lorsqu’il s’agit de contrats d’externalisation, et ce

      conformément aux dispositions de la loi n°05-20 relative à la cybersécurité.'
  guidance:
    en: Contracts must include the entity or critical infrastructure operator requirements for security and service levels.
      Suppliers and service providers must comply with the information systems security policy under the contracts. Auditability
      and reversibility clauses must be included where relevant.
    fr: 'Les contrats conclus doivent prévoir les exigences de l’entité ou de l’IIV en termes de sécurité et de niveaux de

      service. Les fournisseurs et les prestataires sont tenus conformément aux contrats conclus de respecter la politique

      de sécurité des SI de l’entité ou de l’IIV.

      Des clauses d’auditabilité et de réversibilité sont à prévoir lorsqu’il s’agit de contrats d’externalisation, et ce

      conformément aux dispositions de la loi n°05-20 relative à la cybersécurité.'
  requirements: []
- code: FOURNIS-GEST-SURVEIL
  domain: DOMAIN-11
  title:
    en: Monitoring and review of supplier services
    fr: Surveillance et revue des services des fournisseurs
  description:
    en: Each entity or critical infrastructure operator must monitor, review and audit supplier services at regular intervals
      to ensure contractual information security clauses are respected and possible incidents are properly managed.
    fr: 'Chaque entité ou IIV doit surveiller, revoir et auditer à intervalles réguliers les prestations assurées par les

      fournisseurs, afin de s’assurer que les clauses portant sur la sécurité de l’information prévues dans les contrats sont

      respectées et que les éventuels incidents sont correctement gérés.'
  guidance:
    en: Each entity or critical infrastructure operator must monitor, review and audit supplier services at regular intervals
      to ensure contractual information security clauses are respected and possible incidents are properly managed.
    fr: 'Chaque entité ou IIV doit surveiller, revoir et auditer à intervalles réguliers les prestations assurées par les

      fournisseurs, afin de s’assurer que les clauses portant sur la sécurité de l’information prévues dans les contrats sont

      respectées et que les éventuels incidents sont correctement gérés.'
  requirements: []
- code: INCID-GEST--PROC
  domain: DOMAIN-12
  title:
    en: Incident management procedures and responsibilities
    fr: Procédures et responsabilités en matière de gestion des incidents
  description:
    en: Incident management procedures must cover different types of incidents affecting system security or operation, including
      errors, malfunctions, natural disasters, malicious acts, denial of service, viral infection, intrusion, sabotage and
      saturation. They must define reporting and tracking mechanisms and assign responsibilities.
    fr: 'Les procédures de gestion d''incidents doivent couvrir les différents types d’incidents affectant la sécurité ou
      le

      fonctionnement du système (erreurs, dysfonctionnement, sinistres naturels, malveillances, dénis de service,

      infections virales, intrusion, sabotage, saturation, etc.) et définir les moyens de signalement et de suivi d’incidents.

      Les responsabilités de gestion des incidents de cybersécurité doivent être définies pour garantir que lesdites

      procédures soient développées et communiquées au sein de l’entité ou de l’IIV.'
  guidance:
    en: Incident management procedures must cover different types of incidents affecting system security or operation, including
      errors, malfunctions, natural disasters, malicious acts, denial of service, viral infection, intrusion, sabotage and
      saturation. They must define reporting and tracking mechanisms and assign responsibilities.
    fr: 'Les procédures de gestion d''incidents doivent couvrir les différents types d’incidents affectant la sécurité ou
      le

      fonctionnement du système (erreurs, dysfonctionnement, sinistres naturels, malveillances, dénis de service,

      infections virales, intrusion, sabotage, saturation, etc.) et définir les moyens de signalement et de suivi d’incidents.

      Les responsabilités de gestion des incidents de cybersécurité doivent être définies pour garantir que lesdites

      procédures soient développées et communiquées au sein de l’entité ou de l’IIV.'
  requirements: []
- code: INCID-GEST-CAT
  domain: DOMAIN-12
  title:
    en: Incident categorization and classification
    fr: Catégorisation et classification des incidents
  description:
    en: Each entity or critical infrastructure operator must define categories of incidents likely to affect information system
      security and define a classification scale based on the resulting impact.
    fr: 'Chaque entité ou IIV doit définir les différentes catégories d’incidents susceptibles d’affecter la sécurité du SI
      ainsi

      que l’échelle de classification de ces incidents selon l’impact induit.'
  guidance:
    en: Each entity or critical infrastructure operator must define categories of incidents likely to affect information system
      security and define a classification scale based on the resulting impact.
    fr: 'Chaque entité ou IIV doit définir les différentes catégories d’incidents susceptibles d’affecter la sécurité du SI
      ainsi

      que l’échelle de classification de ces incidents selon l’impact induit.'
  requirements: []
- code: INCID-GEST-SIGNAL
  domain: DOMAIN-12
  title:
    en: Event reporting
    fr: Signalement des événements
  description:
    en: All persons involved in system maintenance, operation, administration or use must be able to record and promptly report
      any observed or suspected malfunction during normal system use that could affect data or the system itself. The incident
      management procedure must define this reporting process.
    fr: 'L’ensemble des personnes impliquées dans la maintenance, l’exploitation, l’administration ou l’utilisation du

      système doivent être en mesure de noter et signaler dans les meilleurs délais tout dysfonctionnement observé ou

      soupçonné dans l’usage normal du système et pouvant porter atteinte aux données ou au système lui-même.

      La procédure de gestion des incidents doit garantir que le signalement soit remonté aux autorités compétentes

      selon les exigences législatives et réglementaires en vigueur.'
  guidance:
    en: All persons involved in system maintenance, operation, administration or use must be able to record and promptly report
      any observed or suspected malfunction during normal system use that could affect data or the system itself. The incident
      management procedure must define this reporting process.
    fr: 'L’ensemble des personnes impliquées dans la maintenance, l’exploitation, l’administration ou l’utilisation du

      système doivent être en mesure de noter et signaler dans les meilleurs délais tout dysfonctionnement observé ou

      soupçonné dans l’usage normal du système et pouvant porter atteinte aux données ou au système lui-même.

      La procédure de gestion des incidents doit garantir que le signalement soit remonté aux autorités compétentes

      selon les exigences législatives et réglementaires en vigueur.'
  requirements: []
- code: INCID-GEST-QUALIF
  domain: DOMAIN-12
  title:
    en: Event qualification
    fr: Qualification des événements
  description:
    en: Each entity or critical infrastructure operator must be able to assess each event to decide whether it is an information
      systems security incident and determine its category. Incident criticality must be assessed using a cybersecurity incident
      classification scale based on the sensitivity of the impacted service and the impact.
    fr: 'Chaque entité ou IIV doit pouvoir évaluer chaque évènement afin de pouvoir décider s’il s’agit d’un incident lié
      à la

      sécurité du SI et de déterminer sa catégorie. Dans ce cas, la criticité de cet incident doit être appréciée selon une

      échelle de classification des incidents de cybersécurité basée sur la sensibilité du service impacté et sur l’impact

      induit.'
  guidance:
    en: Each entity or critical infrastructure operator must be able to assess each event to decide whether it is an information
      systems security incident and determine its category. Incident criticality must be assessed using a cybersecurity incident
      classification scale based on the sensitivity of the impacted service and the impact.
    fr: 'Chaque entité ou IIV doit pouvoir évaluer chaque évènement afin de pouvoir décider s’il s’agit d’un incident lié
      à la

      sécurité du SI et de déterminer sa catégorie. Dans ce cas, la criticité de cet incident doit être appréciée selon une

      échelle de classification des incidents de cybersécurité basée sur la sensibilité du service impacté et sur l’impact

      induit.'
  requirements: []
- code: INCID-GEST-REPONSE
  domain: DOMAIN-12
  title:
    en: Response to information systems security incidents
    fr: Réponse aux incidents liés à la sécurité des SI
  description:
    en: Once a cybersecurity incident is confirmed, each entity or critical infrastructure operator must assign roles and
      responsibilities to members of the internal, external or mixed response team and ensure all response tasks are correctly
      performed and logged according to a formal response procedure.
    fr: 'Dès qu’un incident de cybersécurité est confirmé, chaque entité ou IIV doit attribuer les rôles et responsabilités
      aux

      différents membres de l’équipe d’intervention interne, externe ou mixte, et s’assurer que toutes les tâches

      concernant la réponse sont correctement réalisées et journalisées conformément à une procédure de réponse

      formalisée.'
  guidance:
    en: Once a cybersecurity incident is confirmed, each entity or critical infrastructure operator must assign roles and
      responsibilities to members of the internal, external or mixed response team and ensure all response tasks are correctly
      performed and logged according to a formal response procedure.
    fr: 'Dès qu’un incident de cybersécurité est confirmé, chaque entité ou IIV doit attribuer les rôles et responsabilités
      aux

      différents membres de l’équipe d’intervention interne, externe ou mixte, et s’assurer que toutes les tâches

      concernant la réponse sont correctement réalisées et journalisées conformément à une procédure de réponse

      formalisée.'
  requirements: []
- code: INCID-GEST-ALERT
  domain: DOMAIN-12
  title:
    en: Response to information systems security alerts
    fr: Réaction aux alertes liés à la sécurité des SI
  description:
    en: Each entity or critical infrastructure operator must mobilize internal and/or external resources to respond effectively
      to information systems security alerts. Alerts may come from a vendor, supplier, or the DGSSI monitoring, detection
      and response center ma-CERT, and must be handled according to the required instructions.
    fr: 'Chaque entité ou IIV doit mobiliser les ressources internes et/ou externes pour réagir efficacement aux alertes liées

      à la sécurité des SI.

      Ces alertes peuvent provenir soit d’un éditeur ou fournisseur, soit du centre de veille, de détection et de réponses

      aux attaques informatiques (ma-CERT) relevant de la DGSSI.

      Dans ce dernier cas, l’entité ou l’IIV accuse réception de l’alerte et transmet par la suite, si elle est impactée par

      cette alerte, un compte rendu d’exécution à la DGSSI.'
  guidance:
    en: Each entity or critical infrastructure operator must mobilize internal and/or external resources to respond effectively
      to information systems security alerts. Alerts may come from a vendor, supplier, or the DGSSI monitoring, detection
      and response center ma-CERT, and must be handled according to the required instructions.
    fr: 'Chaque entité ou IIV doit mobiliser les ressources internes et/ou externes pour réagir efficacement aux alertes liées

      à la sécurité des SI.

      Ces alertes peuvent provenir soit d’un éditeur ou fournisseur, soit du centre de veille, de détection et de réponses

      aux attaques informatiques (ma-CERT) relevant de la DGSSI.

      Dans ce dernier cas, l’entité ou l’IIV accuse réception de l’alerte et transmet par la suite, si elle est impactée par

      cette alerte, un compte rendu d’exécution à la DGSSI.'
  requirements: []
- code: INCID-GEST-REP
  domain: DOMAIN-12
  title:
    en: Incident register
    fr: Répertoire d’incidents
  description:
    en: Cybersecurity incident types and descriptions must be recorded locally in a database that allows progressive enrichment
      and easy selective access for processing and monitoring future incidents.
    fr: 'La typologie et la description des incidents de cybersécurité doivent être localement enregistrées dans une base

      permettant un enrichissement progressif ainsi qu''un accès sélectif facile pour effectuer le traitement et le suivi
      des

      divers incidents futurs.'
  guidance:
    en: Cybersecurity incident types and descriptions must be recorded locally in a database that allows progressive enrichment
      and easy selective access for processing and monitoring future incidents.
    fr: 'La typologie et la description des incidents de cybersécurité doivent être localement enregistrées dans une base

      permettant un enrichissement progressif ainsi qu''un accès sélectif facile pour effectuer le traitement et le suivi
      des

      divers incidents futurs.'
  requirements: []
- code: INCID-GEST-PREUV
  domain: DOMAIN-12
  title:
    en: Evidence collection
    fr: Recueil des preuves
  description:
    en: In case of a suspected attack, each entity or critical infrastructure operator must define and apply procedures for
      searching, identifying and documenting potential evidence, collecting physical items that may contain evidence, creating
      data copies, and protecting and preserving evidence integrity.
    fr: 'En cas d’attaque suspectée, chaque entité ou IIV doit définir et appliquer les procédures relatives :

      - aux processus de recherche, de reconnaissance et de documentation des preuves potentielles ;

      - au recueil des éléments physiques pouvant contenir des preuves potentielles ;

      - au processus de création de copie de données ;

      - à la protection et la sauvegarde de l’intégrité et l’état d’origine des preuves potentielles.'
  guidance:
    en: In case of a suspected attack, each entity or critical infrastructure operator must define and apply procedures for
      searching, identifying and documenting potential evidence, collecting physical items that may contain evidence, creating
      data copies, and protecting and preserving evidence integrity.
    fr: 'En cas d’attaque suspectée, chaque entité ou IIV doit définir et appliquer les procédures relatives :

      - aux processus de recherche, de reconnaissance et de documentation des preuves potentielles ;

      - au recueil des éléments physiques pouvant contenir des preuves potentielles ;

      - au processus de création de copie de données ;

      - à la protection et la sauvegarde de l’intégrité et l’état d’origine des preuves potentielles.'
  requirements: []
- code: CONTINU-BIA
  domain: DOMAIN-13
  title:
    en: Business impact analysis
    fr: Analyse d’impact sur l’activité
  description:
    en: Each entity or critical infrastructure operator must establish a business impact analysis that identifies critical
      activities and processes, analyzes risks related to those activities and processes, analyzes impacts that would result
      from their interruption, and determines how those impacts evolve over time.
    fr: 'Chaque entité ou IIV est tenue d’établir une analyse d’impacts sur son activité, qui consiste à :

      - identifier les activités et processus critiques ;

      - analyser les risques liés aux activités et processus ;

      - analyser les impacts qui résulteraient d’un arrêt de ces activités et processus critiques ;

      - déterminer comment ces impacts évolueraient dans le temps en cas d’arrêt prolongé ;

      - établir le temps d’arrêt ou d’indisponibilité maximum supportable des activités critiques ;

      - identifier et considérer toute activité critique dépendant d’autres entités ou IIV, des fournisseurs et

      d’autres tiers ;

      - estimer le délai cible de rétablissement des activités après un sinistre ;

      - estimer les ressources humaines, techniques et logistiques que chaque activité critique requiert pour sa

      reprise.'
  guidance:
    en: Each entity or critical infrastructure operator must establish a business impact analysis that identifies critical
      activities and processes, analyzes risks related to those activities and processes, analyzes impacts that would result
      from their interruption, and determines how those impacts evolve over time.
    fr: 'Chaque entité ou IIV est tenue d’établir une analyse d’impacts sur son activité, qui consiste à :

      - identifier les activités et processus critiques ;

      - analyser les risques liés aux activités et processus ;

      - analyser les impacts qui résulteraient d’un arrêt de ces activités et processus critiques ;

      - déterminer comment ces impacts évolueraient dans le temps en cas d’arrêt prolongé ;

      - établir le temps d’arrêt ou d’indisponibilité maximum supportable des activités critiques ;

      - identifier et considérer toute activité critique dépendant d’autres entités ou IIV, des fournisseurs et

      d’autres tiers ;

      - estimer le délai cible de rétablissement des activités après un sinistre ;

      - estimer les ressources humaines, techniques et logistiques que chaque activité critique requiert pour sa

      reprise.'
  requirements: []
- code: CONTINU-ACT
  domain: DOMAIN-13
  title:
    en: Business Continuity and Disaster Recovery Plan (BCP/DRP)
    fr: Plan de Continuité et de Reprise d’Activité (PCA/PRA)
  description:
    en: Each entity or critical infrastructure operator must prepare a business continuity and disaster recovery plan covering
      solutions to address interruption of critical processes and applications, including IT backup, recovery site, failover,
      network resilience, hardware and software redundancy and operational procedures.
    fr: 'Chaque entité ou IIV doit préparer un plan de continuité et de reprise d’activités intégrant l''ensemble des solutions

      pour pallier les arrêts des processus et applications critiques. Il doit porter notamment sur des solutions de secours

      informatique (sauvegarde, site de secours, bascule, résilience des réseaux, redondance matérielle et logicielle,

      etc.).

      Le PCA/PRA doit décrire de manière précise les rôles et les responsabilités de tous les intervenants en cas de

      sinistre.'
  guidance:
    en: Each entity or critical infrastructure operator must prepare a business continuity and disaster recovery plan covering
      solutions to address interruption of critical processes and applications, including IT backup, recovery site, failover,
      network resilience, hardware and software redundancy and operational procedures.
    fr: 'Chaque entité ou IIV doit préparer un plan de continuité et de reprise d’activités intégrant l''ensemble des solutions

      pour pallier les arrêts des processus et applications critiques. Il doit porter notamment sur des solutions de secours

      informatique (sauvegarde, site de secours, bascule, résilience des réseaux, redondance matérielle et logicielle,

      etc.).

      Le PCA/PRA doit décrire de manière précise les rôles et les responsabilités de tous les intervenants en cas de

      sinistre.'
  requirements: []
- code: CONTINU-PLAN
  domain: DOMAIN-13
  title:
    en: Testing of BCP/DRP plans
    fr: Mise à l’essai des PCA/PRA
  description:
    en: A technical test plan, including restoration tests for systems, applications, data or communications, must be implemented
      annually.
    fr: 'Un plan de test technique (tests de restauration des systèmes, des applications, des données ou des

      communications, etc.) doit être mis en œuvre annuellement.'
  guidance:
    en: A technical test plan, including restoration tests for systems, applications, data or communications, must be implemented
      annually.
    fr: 'Un plan de test technique (tests de restauration des systèmes, des applications, des données ou des

      communications, etc.) doit être mis en œuvre annuellement.'
  requirements: []
- code: CONTINU-EXERCICE
  domain: DOMAIN-13
  title:
    en: Exercises and scenarios
    fr: Exercices et Scenarios
  description:
    en: Each entity or critical infrastructure operator must regularly organize crisis exercises to test the business continuity
      and disaster recovery plan.
    fr: Chaque entité ou IIV est tenue d’organiser de manière régulière des exercices de crise afin de tester le PCA/PRA.
  guidance:
    en: Each entity or critical infrastructure operator must regularly organize crisis exercises to test the business continuity
      and disaster recovery plan.
    fr: Chaque entité ou IIV est tenue d’organiser de manière régulière des exercices de crise afin de tester le PCA/PRA.
  requirements: []
- code: CONF-OBLIG-IDF
  domain: DOMAIN-14
  title:
    en: Identification of applicable legislation
    fr: Identification de la législation en vigueur
  description:
    en: The legal, regulatory, normative and contractual framework applicable to the entity or critical infrastructure operator
      must be clearly identified. The information systems security policy must refer to this framework and emphasize the obligation
      to comply with it.
    fr: 'L’arsenal légal, réglementaire, normatif et contractuel auquel l’entité ou l’IIV est soumise doit être clairement

      identifié. La politique de sécurité des SI doit faire référence à cet arsenal et mettre l’accent sur l’obligation de
      s’y

      conformer.'
  guidance:
    en: The legal, regulatory, normative and contractual framework applicable to the entity or critical infrastructure operator
      must be clearly identified. The information systems security policy must refer to this framework and emphasize the obligation
      to comply with it.
    fr: 'L’arsenal légal, réglementaire, normatif et contractuel auquel l’entité ou l’IIV est soumise doit être clairement

      identifié. La politique de sécurité des SI doit faire référence à cet arsenal et mettre l’accent sur l’obligation de
      s’y

      conformer.'
  requirements: []
- code: CONF-OBLIG-CYBERSEC
  domain: DOMAIN-14
  title:
    en: Compliance with cybersecurity regulations
    fr: Conformité à la réglementation liée à la cybersécurité
  description:
    en: Each entity or critical infrastructure operator must ensure that information systems security management complies
      with the applicable cybersecurity legal framework, including Law No. 05-20 on cybersecurity and Decree No. 2-21-406
      issued for its implementation.
    fr: 'Chaque entité ou IIV doit veiller à ce que la gestion de la sécurité ses SI soit conforme au cadre juridique applicable

      en matière de cybersécurité notamment la loi n° 05-20 relative à la cybersécurité et le décret n° 2-21-406 pris pour

