- code: ORG-TELETRAV-SEC
  domain: DOMAIN-2
  title:
    en: Télétravail sécurisé
    fr: Télétravail sécurisé
  description:
    en: 'Chaque entité ou IIV doit prendre les mesures adéquates, en fonction du moyen d''accès, pour protéger les informations consultées, traitées ou stockées sur des sites de télétravail.


      A cet effet, une politique ou des procédures claires précisant les systèmes accessibles et les mesures de sécurité applicables, doivent être définies, validées par la hiérarchie, communiquées et tenues à jour pour une mise en œuvre appropriée du télétravail.'
