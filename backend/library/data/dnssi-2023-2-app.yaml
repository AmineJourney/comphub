- code: ACTIF--CLASSIF-INFO
  domain: DOMAIN-4
  title:
    en: Classification
    fr: Classification
  description:
    en: 'Chaque entité ou IIV doit classifier ses actifs informationnels selon leur niveau de sensibilité en termes de confidentialité, d''intégrité et de disponibilité, et ce sur la base d''une échelle d''impacts fixée par l''entité ou par l''IIV et qui tient compte notamment de sa taille, de son importance, de ses missions, de son domaine d''activités, de ses exigences métiers, de ses propres enjeux de sécurité et des obligations légales, règlementaires, contractuelles ou normatives qui lui sont applicables. Le résultat de cette classification traduit la valeur des actifs informationnels en fonction de leur sensibilité et de leur caractère critique pour l''entité ou pour l''IIV.


      En parallèle, l''entité ou l''IIV doit procéder à la classification des mêmes actifs informationnels et SI selon le référentiel de la classification des actifs informationnels et SI fixé par la loi nº 05.20 et son décret d''application. L''objectif de cette classification est d''identifier les SI sensibles et les données sensibles au sens de la loi précitée.'
    fr: 'Chaque entité ou IIV doit classifier ses actifs informationnels selon leur niveau de sensibilité en termes de confidentialité, d''intégrité et de disponibilité, et ce sur la base d''une échelle d''impacts fixée par l''entité ou par l''IIV et qui tient compte notamment de sa taille, de son importance, de ses missions, de son domaine d''activités, de ses exigences métiers, de ses propres enjeux de sécurité et des obligations légales, règlementaires, contractuelles ou normatives qui lui sont applicables. Le résultat de cette classification traduit la valeur des actifs informationnels en fonction de leur sensibilité et de leur caractère critique pour l''entité ou pour l''IIV.


      En parallèle, l''entité ou l''IIV doit procéder à la classification des mêmes actifs informationnels et SI selon le référentiel de la classification des actifs informationnels et SI fixé par la loi nº 05.20 et son décret d''application. L''objectif de cette classification est d''identifier les SI sensibles et les données sensibles au sens de la loi précitée.'
