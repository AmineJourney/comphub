controls:
- code: CC1.1
  domain: DOMAIN-1
  title:
    en: COSO Principle 1
    fr: COSO Principle 1
  description:
    en: The entity demonstrates a commitment to integrity and ethical values.
    fr: The entity demonstrates a commitment to integrity and ethical values.
  guidance:
    en: The entity demonstrates a commitment to integrity and ethical values.
    fr: The entity demonstrates a commitment to integrity and ethical values.
  requirements:
  - id: CC1.1.1
    control: CC1.1
    text:
      en: Sets the Tone at the Top — The board of directors and management, at all levels, demonstrate through their directives, actions, and behavior the importance of integrity and ethical values to support the functioning of the system of internal control.
      fr: Sets the Tone at the Top — The board of directors and management, at all levels, demonstrate through their directives, actions, and behavior the importance of integrity and ethical values to support the functioning of the system of internal control.
  - id: CC1.1.2
    control: CC1.1
    text:
      en: Establishes Standards of Conduct — The expectations of the board of directors and senior management concerning integrity and ethical values are defined in the entity’s standards of conduct and understood at all levels of the entity and by outsourced service providers and business partners.
      fr: Establishes Standards of Conduct — The expectations of the board of directors and senior management concerning integrity and ethical values are defined in the entity’s standards of conduct and understood at all levels of the entity and by outsourced service providers and business partners.
  - id: CC1.1.3
    control: CC1.1
    text:
      en: Evaluates Adherence to Standards of Conduct — Processes are in place to evaluate the performance of individuals and teams against the entity’s expected standards of conduct.
      fr: Evaluates Adherence to Standards of Conduct — Processes are in place to evaluate the performance of individuals and teams against the entity’s expected standards of conduct.
  - id: CC1.1.4
    control: CC1.1
    text:
      en: Addresses Deviations in a Timely Manner — Deviations from the entity’s expected standards of conduct are identified and remedied in a timely and consistent manner.
      fr: Addresses Deviations in a Timely Manner — Deviations from the entity’s expected standards of conduct are identified and remedied in a timely and consistent manner.
  - id: CC1.1.5
    control: CC1.1
    text:
      en: Considers Contractors and Vendor Employees in Demonstrating Its Commitment — Management and the board of directors consider the use of contractors and vendor employees in its processes for establishing standards of conduct, evaluating adherence to those standards, and addressing deviations in a timely manner.
      fr: Considers Contractors and Vendor Employees in Demonstrating Its Commitment — Management and the board of directors consider the use of contractors and vendor employees in its processes for establishing standards of conduct, evaluating adherence to those standards, and addressing deviations in a timely manner.
- code: CC1.2
  domain: DOMAIN-1
  title:
    en: COSO Principle 2
    fr: COSO Principle 2
  description:
    en: The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control.
    fr: The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control.
  guidance:
    en: The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control.
    fr: The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control.
  requirements:
  - id: CC1.2.1
    control: CC1.2
    text:
      en: Establishes Oversight Responsibilities — The board of directors identifies and accepts its oversight responsibilities in relation to established requirements and expectations.
      fr: Establishes Oversight Responsibilities — The board of directors identifies and accepts its oversight responsibilities in relation to established requirements and expectations.
  - id: CC1.2.2
    control: CC1.2
    text:
      en: Applies Relevant Expertise — The board of directors defines, maintains, and periodically evaluates the skills and expertise needed among its members to enable them to ask probing questions of senior management and take commensurate action.
      fr: Applies Relevant Expertise — The board of directors defines, maintains, and periodically evaluates the skills and expertise needed among its members to enable them to ask probing questions of senior management and take commensurate action.
  - id: CC1.2.3
    control: CC1.2
    text:
      en: Operates Independently — The board of directors has sufficient members who are independent from management and objective in evaluations and decision making.
      fr: Operates Independently — The board of directors has sufficient members who are independent from management and objective in evaluations and decision making.
  - id: CC1.2.4
    control: CC1.2
    text:
      en: Supplements Board Expertise — The board of directors supplements its expertise relevant to security, availability, processing integrity, confidentiality, and privacy, as needed, through the use of a subcommittee or consultants.
      fr: Supplements Board Expertise — The board of directors supplements its expertise relevant to security, availability, processing integrity, confidentiality, and privacy, as needed, through the use of a subcommittee or consultants.
- code: CC1.3
  domain: DOMAIN-1
  title:
    en: COSO Principle 3
    fr: COSO Principle 3
  description:
    en: Management establishes, with board oversight, structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives.
    fr: Management establishes, with board oversight, structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives.
  guidance:
    en: Management establishes, with board oversight, structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives.
    fr: Management establishes, with board oversight, structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives.
  requirements:
  - id: CC1.3.1
    control: CC1.3
    text:
      en: Considers All Structures of the Entity — Management and the board of directors consider the multiple structures used (including operating units, legal entities, geographic distribution, and outsourced service providers) to support the achievement of objectives.
      fr: Considers All Structures of the Entity — Management and the board of directors consider the multiple structures used (including operating units, legal entities, geographic distribution, and outsourced service providers) to support the achievement of objectives.
  - id: CC1.3.2
    control: CC1.3
    text:
      en: Establishes Reporting Lines — Management designs and evaluates lines of reporting for each entity structure to enable execution of authorities and responsibilities and flow of information to manage the activities of the entity.
      fr: Establishes Reporting Lines — Management designs and evaluates lines of reporting for each entity structure to enable execution of authorities and responsibilities and flow of information to manage the activities of the entity.
  - id: CC1.3.3
    control: CC1.3
    text:
      en: Defines, Assigns, and Limits Authorities and Responsibilities — Management and the board of directors delegate authority, define responsibilities, and use appropriate processes and technology to assign responsibility and segregate duties as necessary at the various levels of the organization.
      fr: Defines, Assigns, and Limits Authorities and Responsibilities — Management and the board of directors delegate authority, define responsibilities, and use appropriate processes and technology to assign responsibility and segregate duties as necessary at the various levels of the organization.
  - id: CC1.3.4
    control: CC1.3
    text:
      en: Addresses Specific Requirements When Defining Authorities and Responsibilities — Management and the board of directors consider requirements relevant to security, availability, processing integrity, confidentiality, and privacy when defining authorities and responsibilities.
      fr: Addresses Specific Requirements When Defining Authorities and Responsibilities — Management and the board of directors consider requirements relevant to security, availability, processing integrity, confidentiality, and privacy when defining authorities and responsibilities.
  - id: CC1.3.5
    control: CC1.3
    text:
      en: Considers Interactions With External Parties When Establishing Structures, Reporting Lines, Authorities, and Responsibilities — Management and the board of directors consider the need for the entity to interact with and monitor the activities of external parties when establishing structures, reporting lines, authorities, and responsibilities.
      fr: Considers Interactions With External Parties When Establishing Structures, Reporting Lines, Authorities, and Responsibilities — Management and the board of directors consider the need for the entity to interact with and monitor the activities of external parties when establishing structures, reporting lines, authorities, and responsibilities.
- code: CC1.4
  domain: DOMAIN-1
  title:
    en: COSO Principle 4
    fr: COSO Principle 4
  description:
    en: The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives.
    fr: The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives.
  guidance:
    en: The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives.
    fr: The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives.
  requirements:
  - id: CC1.4.1
    control: CC1.4
    text:
      en: Establishes Policies and Practices — Policies and practices reflect expectations of competence necessary to support the achievement of objectives.
      fr: Establishes Policies and Practices — Policies and practices reflect expectations of competence necessary to support the achievement of objectives.
  - id: CC1.4.2
    control: CC1.4
    text:
      en: Evaluates Competence and Addresses Shortcomings — The board of directors and management evaluate competence across the entity and in outsourced service providers in relation to established policies and practices and act as necessary to address shortcomings.
      fr: Evaluates Competence and Addresses Shortcomings — The board of directors and management evaluate competence across the entity and in outsourced service providers in relation to established policies and practices and act as necessary to address shortcomings.
  - id: CC1.4.3
    control: CC1.4
    text:
      en: Attracts, Develops, and Retains Individuals — The entity provides the mentoring and training needed to attract, develop, and retain sufficient and competent personnel and outsourced service providers to support the achievement of objectives.
      fr: Attracts, Develops, and Retains Individuals — The entity provides the mentoring and training needed to attract, develop, and retain sufficient and competent personnel and outsourced service providers to support the achievement of objectives.
  - id: CC1.4.4
    control: CC1.4
    text:
      en: Plans and Prepares for Succession — Senior management and the board of directors develop contingency plans for assignments of responsibility important for internal control.
      fr: Plans and Prepares for Succession — Senior management and the board of directors develop contingency plans for assignments of responsibility important for internal control.
  - id: CC1.4.5
    control: CC1.4
    text:
      en: Considers the Background of Individuals — The entity considers the background of potential and existing personnel, contractors, and vendor employees when determining whether to employ and retain the individuals.
      fr: Considers the Background of Individuals — The entity considers the background of potential and existing personnel, contractors, and vendor employees when determining whether to employ and retain the individuals.
  - id: CC1.4.6
    control: CC1.4
    text:
      en: Considers the Technical Competency of Individuals — The entity considers the technical competency of potential and existing personnel, contractors, and vendor employees when determining whether to employ and retain the individuals.
      fr: Considers the Technical Competency of Individuals — The entity considers the technical competency of potential and existing personnel, contractors, and vendor employees when determining whether to employ and retain the individuals.
  - id: CC1.4.7
    control: CC1.4
    text:
      en: Provides Training to Maintain Technical Competencies — The entity provides training programs, including continuing education and training, to ensure skill sets and technical competency of existing personnel, contractors, and vendor employees are developed and maintained.
      fr: Provides Training to Maintain Technical Competencies — The entity provides training programs, including continuing education and training, to ensure skill sets and technical competency of existing personnel, contractors, and vendor employees are developed and maintained.
- code: CC1.5
  domain: DOMAIN-1
  title:
    en: COSO Principle 5
    fr: COSO Principle 5
  description:
    en: The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives.
    fr: The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives.
  guidance:
    en: The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives.
    fr: The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives.
  requirements:
  - id: CC1.5.1
    control: CC1.5
    text:
      en: Enforces Accountability Through Structures, Authorities, and Responsibilities — Management and the board of directors establish the mechanisms to communicate and hold individuals accountable for performance of internal control responsibilities across the entity and implement corrective action as necessary.
      fr: Enforces Accountability Through Structures, Authorities, and Responsibilities — Management and the board of directors establish the mechanisms to communicate and hold individuals accountable for performance of internal control responsibilities across the entity and implement corrective action as necessary.
  - id: CC1.5.2
    control: CC1.5
    text:
      en: Establishes Performance Measures, Incentives, and Rewards — Management and the board of directors establish performance measures, incentives, and other rewards appropriate for responsibilities at all levels of the entity, reflecting appropriate dimensions of performance and expected standards of conduct, and considering the achievement of both short-term and longer-term objectives.
      fr: Establishes Performance Measures, Incentives, and Rewards — Management and the board of directors establish performance measures, incentives, and other rewards appropriate for responsibilities at all levels of the entity, reflecting appropriate dimensions of performance and expected standards of conduct, and considering the achievement of both short-term and longer-term objectives.
  - id: CC1.5.3
    control: CC1.5
    text:
      en: Evaluates Performance Measures, Incentives, and Rewards for Ongoing Relevance — Management and the board of directors align incentives and rewards with the fulfillment of internal control responsibilities in the achievement of objectives.
      fr: Evaluates Performance Measures, Incentives, and Rewards for Ongoing Relevance — Management and the board of directors align incentives and rewards with the fulfillment of internal control responsibilities in the achievement of objectives.
  - id: CC1.5.4
    control: CC1.5
    text:
      en: Considers Excessive Pressures — Management and the board of directors evaluate and adjust pressures associated with the achievement of objectives as they assign responsibilities, develop performance measures, and evaluate performance.
      fr: Considers Excessive Pressures — Management and the board of directors evaluate and adjust pressures associated with the achievement of objectives as they assign responsibilities, develop performance measures, and evaluate performance.
  - id: CC1.5.5
    control: CC1.5
    text:
      en: Evaluates Performance and Rewards or Disciplines Individuals — Management and the board of directors evaluate performance of internal control responsibilities, including adherence to standards of conduct and expected levels of competence, and provide rewards or exercise disciplinary action, as appropriate.
      fr: Evaluates Performance and Rewards or Disciplines Individuals — Management and the board of directors evaluate performance of internal control responsibilities, including adherence to standards of conduct and expected levels of competence, and provide rewards or exercise disciplinary action, as appropriate.
- code: CC2.1
  domain: CC2
  title:
    en: COSO Principle 13
    fr: COSO Principle 13
  description:
    en: The entity obtains or generates and uses relevant, quality information to support the functioning of internal control.
    fr: The entity obtains or generates and uses relevant, quality information to support the functioning of internal control.
  guidance:
    en: The entity obtains or generates and uses relevant, quality information to support the functioning of internal control.
    fr: The entity obtains or generates and uses relevant, quality information to support the functioning of internal control.
  requirements:
  - id: CC2.1.1
    control: CC2.1
    text:
      en: Identifies Information Requirements — A process is in place to identify the information required and expected to support the functioning of the other components of internal control and the achievement of the entity’s objectives.
      fr: Identifies Information Requirements — A process is in place to identify the information required and expected to support the functioning of the other components of internal control and the achievement of the entity’s objectives.
  - id: CC2.1.2
    control: CC2.1
    text:
      en: Captures Internal and External Sources of Data — Information systems capture internal and external sources of data.
      fr: Captures Internal and External Sources of Data — Information systems capture internal and external sources of data.
  - id: CC2.1.3
    control: CC2.1
    text:
      en: Processes Relevant Data Into Information — Information systems process and transform relevant data into information.
      fr: Processes Relevant Data Into Information — Information systems process and transform relevant data into information.
  - id: CC2.1.4
    control: CC2.1
    text:
      en: Maintains Quality Throughout Processing — Information systems produce information that is timely, current, accurate, complete, accessible, protected, verifiable, and retained. Information is reviewed to assess its relevance in supporting the internal control components.
      fr: Maintains Quality Throughout Processing — Information systems produce information that is timely, current, accurate, complete, accessible, protected, verifiable, and retained. Information is reviewed to assess its relevance in supporting the internal control components.
- code: CC2.2
  domain: CC2
  title:
    en: COSO Principle 14
    fr: COSO Principle 14
  description:
    en: The entity internally communicates information, including objectives and responsibilities for internal control, necessary to support the functioning of internal control.
    fr: The entity internally communicates information, including objectives and responsibilities for internal control, necessary to support the functioning of internal control.
  guidance:
    en: The entity internally communicates information, including objectives and responsibilities for internal control, necessary to support the functioning of internal control.
    fr: The entity internally communicates information, including objectives and responsibilities for internal control, necessary to support the functioning of internal control.
  requirements:
  - id: CC2.2.1
    control: CC2.2
    text:
      en: Communicates Internal Control Information — A process is in place to communicate required information to enable all personnel to understand and carry out their internal control responsibilities.
      fr: Communicates Internal Control Information — A process is in place to communicate required information to enable all personnel to understand and carry out their internal control responsibilities.
  - id: CC2.2.2
    control: CC2.2
    text:
      en: Communicates With the Board of Directors — Communication exists between management and the board of directors so that both have information needed to fulfill their roles with respect to the entity’s objectives.
      fr: Communicates With the Board of Directors — Communication exists between management and the board of directors so that both have information needed to fulfill their roles with respect to the entity’s objectives.
  - id: CC2.2.3
    control: CC2.2
    text:
      en: Provides Separate Communication Lines — Separate communication channels, such as whistle-blower hotlines, are in place and serve as fail-safe mechanisms to enable anonymous or confidential communication when normal channels are inoperative or ineffective.
      fr: Provides Separate Communication Lines — Separate communication channels, such as whistle-blower hotlines, are in place and serve as fail-safe mechanisms to enable anonymous or confidential communication when normal channels are inoperative or ineffective.
  - id: CC2.2.4
    control: CC2.2
    text:
      en: Selects Relevant Method of Communication — The method of communication considers the timing, audience, and nature of the information.
      fr: Selects Relevant Method of Communication — The method of communication considers the timing, audience, and nature of the information.
  - id: CC2.2.5
    control: CC2.2
    text:
      en: Communicates Responsibilities — Entity personnel with responsibility for designing, developing, implementing, operating, maintaining, or monitoring system controls receive communications about their responsibilities, including changes in their responsibilities, and have the information necessary to carry out those responsibilities.
      fr: Communicates Responsibilities — Entity personnel with responsibility for designing, developing, implementing, operating, maintaining, or monitoring system controls receive communications about their responsibilities, including changes in their responsibilities, and have the information necessary to carry out those responsibilities.
  - id: CC2.2.6
    control: CC2.2
    text:
      en: Communicates Information on Reporting Failures, Incidents, Concerns, and Other Matters — Entity personnel are provided with information on how to report systems failures, incidents, concerns, and other complaints to personnel.
      fr: Communicates Information on Reporting Failures, Incidents, Concerns, and Other Matters — Entity personnel are provided with information on how to report systems failures, incidents, concerns, and other complaints to personnel.
  - id: CC2.2.7
    control: CC2.2
    text:
      en: Communicates Objectives and Changes to Objectives — The entity communicates its objectives and changes to those objectives to personnel in a timely manner.
      fr: Communicates Objectives and Changes to Objectives — The entity communicates its objectives and changes to those objectives to personnel in a timely manner.
  - id: CC2.2.8
    control: CC2.2
    text:
      en: Communicates Information to Improve Security Knowledge and Awareness — The entity communicates information to improve security knowledge and awareness and to model appropriate security behaviors to personnel through a security awareness training program.
      fr: Communicates Information to Improve Security Knowledge and Awareness — The entity communicates information to improve security knowledge and awareness and to model appropriate security behaviors to personnel through a security awareness training program.
  - id: CC2.2.9
    control: CC2.2
    text:
      en: Communicates Information About System Operation and Boundaries — The entity prepares and communicates information about the design and operation of the system and its boundaries to authorized personnel to enable them to understand their role in the system and the results of system operation.
      fr: Communicates Information About System Operation and Boundaries — The entity prepares and communicates information about the design and operation of the system and its boundaries to authorized personnel to enable them to understand their role in the system and the results of system operation.
  - id: CC2.2.10
    control: CC2.2
    text:
      en: Communicates System Objectives — The entity communicates its objectives to personnel to enable them to carry out their responsibilities.
      fr: Communicates System Objectives — The entity communicates its objectives to personnel to enable them to carry out their responsibilities.
  - id: CC2.2.11
    control: CC2.2
    text:
      en: Communicates System Changes — System changes that affect responsibilities or the achievement of the entity's objectives are communicated in a timely manner.
      fr: Communicates System Changes — System changes that affect responsibilities or the achievement of the entity's objectives are communicated in a timely manner.
- code: CC2.3
  domain: CC2
  title:
    en: COSO Principle 15
    fr: COSO Principle 15
  description:
    en: The entity communicates with external parties regarding matters affecting the functioning of internal control.
    fr: The entity communicates with external parties regarding matters affecting the functioning of internal control.
  guidance:
    en: The entity communicates with external parties regarding matters affecting the functioning of internal control.
    fr: The entity communicates with external parties regarding matters affecting the functioning of internal control.
  requirements:
  - id: CC2.3.1
    control: CC2.3
    text:
      en: Communicates to External Parties — Processes are in place to communicate relevant and timely information to external parties, including shareholders, partners, owners, regulators, customers, financial analysts, and other external parties.
      fr: Communicates to External Parties — Processes are in place to communicate relevant and timely information to external parties, including shareholders, partners, owners, regulators, customers, financial analysts, and other external parties.
  - id: CC2.3.2
    control: CC2.3
    text:
      en: Enables Inbound Communications — Open communication channels allow input from customers, consumers, suppliers, external auditors, regulators, financial analysts, and others, providing management and the board of directors with relevant information.
      fr: Enables Inbound Communications — Open communication channels allow input from customers, consumers, suppliers, external auditors, regulators, financial analysts, and others, providing management and the board of directors with relevant information.
  - id: CC2.3.3
    control: CC2.3
    text:
      en: Communicates With the Board of Directors — Relevant information resulting from assessments conducted by external parties is communicated to the board of directors.
      fr: Communicates With the Board of Directors — Relevant information resulting from assessments conducted by external parties is communicated to the board of directors.
  - id: CC2.3.4
    control: CC2.3
    text:
      en: Provides Separate Communication Lines — Separate communication channels, such as whistle-blower hotlines, are in place and serve as fail-safe mechanisms to enable anonymous or confidential communication when normal channels are inoperative or ineffective.
      fr: Provides Separate Communication Lines — Separate communication channels, such as whistle-blower hotlines, are in place and serve as fail-safe mechanisms to enable anonymous or confidential communication when normal channels are inoperative or ineffective.
  - id: CC2.3.5
    control: CC2.3
    text:
      en: Selects Relevant Method of Communication — The method of communication considers the timing, audience, and nature of the communication and legal, regulatory, and fiduciary requirements and expectations.
      fr: Selects Relevant Method of Communication — The method of communication considers the timing, audience, and nature of the communication and legal, regulatory, and fiduciary requirements and expectations.
  - id: CC2.3.6
    control: CC2.3
    text:
      en: Communicates Objectives Related to Confidentiality and Changes to Objectives — The entity communicates, to external users, vendors, business partners and others whose products and services are part of the system, objectives and changes to objectives related to confidentiality.
      fr: Communicates Objectives Related to Confidentiality and Changes to Objectives — The entity communicates, to external users, vendors, business partners and others whose products and services are part of the system, objectives and changes to objectives related to confidentiality.
  - id: CC2.3.7
    control: CC2.3
    text:
      en: Communicates Objectives Related to Privacy and Changes to Objectives — The entity communicates, to external users, vendors, business partners and others whose products and services are part of the system, objectives related to privacy and changes to those objectives.
      fr: Communicates Objectives Related to Privacy and Changes to Objectives — The entity communicates, to external users, vendors, business partners and others whose products and services are part of the system, objectives related to privacy and changes to those objectives.
  - id: CC2.3.8
    control: CC2.3
    text:
      en: Communicates Information About System Operation and Boundaries—The entity prepares and communicates information about the design and operation of the system and its boundaries to authorized external users to permit users to understand their role in the system and the results of system operation.
      fr: Communicates Information About System Operation and Boundaries—The entity prepares and communicates information about the design and operation of the system and its boundaries to authorized external users to permit users to understand their role in the system and the results of system operation.
  - id: CC2.3.9
    control: CC2.3
    text:
      en: Communicates System Objectives — The entity communicates its system objectives to appropriate external users.
      fr: Communicates System Objectives — The entity communicates its system objectives to appropriate external users.
  - id: CC2.3.10
    control: CC2.3
    text:
      en: Communicates System Responsibilities — External users with responsibility for designing, developing, implementing, operating, maintaining, and monitoring system controls receive communications about their responsibilities and have the information necessary to carry out those responsibilities.
      fr: Communicates System Responsibilities — External users with responsibility for designing, developing, implementing, operating, maintaining, and monitoring system controls receive communications about their responsibilities and have the information necessary to carry out those responsibilities.
  - id: CC2.3.11
    control: CC2.3
    text:
      en: Communicates Information on Reporting System Failures, Incidents, Concerns, and Other Matters — External users are provided with information on how to report systems failures, incidents, concerns, and other complaints to appropriate personnel.
      fr: Communicates Information on Reporting System Failures, Incidents, Concerns, and Other Matters — External users are provided with information on how to report systems failures, incidents, concerns, and other complaints to appropriate personnel.
- code: CC3.1
  domain: CC3
  title:
    en: COSO Principle 6
    fr: COSO Principle 6
  description:
    en: The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks relating to objectives.
    fr: The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks relating to objectives.
  guidance:
    en: The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks relating to objectives.
    fr: The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks relating to objectives.
  requirements:
  - id: CC3.1.1
    control: CC3.1
    text:
      en: Operations Objectives — Reflects Management's Choices — Operations objectives reflect management's choices about structure, industry considerations, and performance of the entity.
      fr: Operations Objectives — Reflects Management's Choices — Operations objectives reflect management's choices about structure, industry considerations, and performance of the entity.
  - id: CC3.1.2
    control: CC3.1
    text:
      en: Considers Tolerances for Risk — Management considers the acceptable levels of variation relative to the achievement of operations objectives.
      fr: Considers Tolerances for Risk — Management considers the acceptable levels of variation relative to the achievement of operations objectives.
  - id: CC3.1.3
    control: CC3.1
    text:
      en: Includes Operations and Financial Performance Goals — The organization reflects the desired level of operations and financial performance for the entity within operations objectives.
      fr: Includes Operations and Financial Performance Goals — The organization reflects the desired level of operations and financial performance for the entity within operations objectives.
  - id: CC3.1.4
    control: CC3.1
    text:
      en: Forms a Basis for Committing of Resources — Management uses operations objectives as a basis for allocating resources needed to attain desired operations and financial performance.
      fr: Forms a Basis for Committing of Resources — Management uses operations objectives as a basis for allocating resources needed to attain desired operations and financial performance.
  - id: CC3.1.5
    control: CC3.1
    text:
      en: External Financial Reporting Objectives — Complies With Applicable Accounting Standards — Financial reporting objectives are consistent with accounting principles suitable and available for that entity. The accounting principles selected are appropriate in the circumstances.
      fr: External Financial Reporting Objectives — Complies With Applicable Accounting Standards — Financial reporting objectives are consistent with accounting principles suitable and available for that entity. The accounting principles selected are appropriate in the circumstances.
  - id: CC3.1.6
    control: CC3.1
    text:
      en: Considers Materiality — Management considers materiality in financial statement presentation.
      fr: Considers Materiality — Management considers materiality in financial statement presentation.
  - id: CC3.1.7
    control: CC3.1
    text:
      en: Reflects Entity Activities — External reporting reflects the underlying transactions and events to show qualitative characteristics and assertions.
      fr: Reflects Entity Activities — External reporting reflects the underlying transactions and events to show qualitative characteristics and assertions.
  - id: CC3.1.8
    control: CC3.1
    text:
      en: External Nonfinancial Reporting Objectives — Complies With Externally Established Frameworks — Management establishes objectives consistent with laws and regulations or standards and frameworks of recognized external organizations.
      fr: External Nonfinancial Reporting Objectives — Complies With Externally Established Frameworks — Management establishes objectives consistent with laws and regulations or standards and frameworks of recognized external organizations.
  - id: CC3.1.9
    control: CC3.1
    text:
      en: Considers the Required Level of Precision — Management reflects the required level of precision and accuracy suitable for user needs and based on criteria established by third parties in nonfinancial reporting.
      fr: Considers the Required Level of Precision — Management reflects the required level of precision and accuracy suitable for user needs and based on criteria established by third parties in nonfinancial reporting.
  - id: CC3.1.10
    control: CC3.1
    text:
      en: Reflects Entity Activities — External reporting reflects the underlying transactions and events within a range of acceptable limits.
      fr: Reflects Entity Activities — External reporting reflects the underlying transactions and events within a range of acceptable limits.
  - id: CC3.1.11
    control: CC3.1
    text:
      en: Internal Reporting Objectives — Reflects Management's Choices — Internal reporting provides management with accurate and complete information regarding management's choices and information needed in managing the entity.
      fr: Internal Reporting Objectives — Reflects Management's Choices — Internal reporting provides management with accurate and complete information regarding management's choices and information needed in managing the entity.
  - id: CC3.1.12
    control: CC3.1
    text:
      en: Considers the Required Level of Precision — Management reflects the required level of precision and accuracy suitable for user needs in nonfinancial reporting objectives and materiality within financial reporting objectives.
      fr: Considers the Required Level of Precision — Management reflects the required level of precision and accuracy suitable for user needs in nonfinancial reporting objectives and materiality within financial reporting objectives.
  - id: CC3.1.13
    control: CC3.1
    text:
      en: Reflects Entity Activities — Internal reporting reflects the underlying transactions and events within a range of acceptable limits.
      fr: Reflects Entity Activities — Internal reporting reflects the underlying transactions and events within a range of acceptable limits.
  - id: CC3.1.14
    control: CC3.1
    text:
      en: Compliance Objectives — Reflects External Laws and Regulations — Laws and regulations establish minimum standards of conduct, which the entity integrates into compliance objectives.
      fr: Compliance Objectives — Reflects External Laws and Regulations — Laws and regulations establish minimum standards of conduct, which the entity integrates into compliance objectives.
  - id: CC3.1.15
    control: CC3.1
    text:
      en: Considers Tolerances for Risk — Management considers the acceptable levels of variation relative to the achievement of operations objectives.
      fr: Considers Tolerances for Risk — Management considers the acceptable levels of variation relative to the achievement of operations objectives.
  - id: CC3.1.16
    control: CC3.1
    text:
      en: Establishes Sub-objectives to Support Objectives — Management identifies sub-objectives related to security, availability, processing integrity, confidentiality, and privacy to support the achievement of the entity’s objectives related to reporting, operations, and compliance.
      fr: Establishes Sub-objectives to Support Objectives — Management identifies sub-objectives related to security, availability, processing integrity, confidentiality, and privacy to support the achievement of the entity’s objectives related to reporting, operations, and compliance.
- code: CC3.2
  domain: CC3
  title:
    en: COSO Principle 7
    fr: COSO Principle 7
  description:
    en: The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed.
    fr: The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed.
  guidance:
    en: The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed.
    fr: The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed.
  requirements:
  - id: CC3.2.1
    control: CC3.2
    text:
      en: Includes Entity, Subsidiary, Division, Operating Unit, and Functional Levels — The entity identifies and assesses risk at the entity, subsidiary, division, operating unit, and functional levels relevant to the achievement of objectives.
      fr: Includes Entity, Subsidiary, Division, Operating Unit, and Functional Levels — The entity identifies and assesses risk at the entity, subsidiary, division, operating unit, and functional levels relevant to the achievement of objectives.
  - id: CC3.2.2
    control: CC3.2
    text:
      en: Analyzes Internal and External Factors — Risk identification considers both internal and external factors and their impact on the achievement of objectives.
      fr: Analyzes Internal and External Factors — Risk identification considers both internal and external factors and their impact on the achievement of objectives.
  - id: CC3.2.3
    control: CC3.2
    text:
      en: Involves Appropriate Levels of Management — The entity puts into place effective risk assessment mechanisms that involve appropriate levels of management.
      fr: Involves Appropriate Levels of Management — The entity puts into place effective risk assessment mechanisms that involve appropriate levels of management.
  - id: CC3.2.4
    control: CC3.2
    text:
      en: Estimates Significance of Risks Identified — Identified risks are analyzed through a process that includes estimating the potential significance of the risk.
      fr: Estimates Significance of Risks Identified — Identified risks are analyzed through a process that includes estimating the potential significance of the risk.
  - id: CC3.2.5
    control: CC3.2
    text:
      en: Determines How to Respond to Risks — Risk assessment includes considering how the risk should be managed and whether to accept, avoid, reduce, or share the risk.
      fr: Determines How to Respond to Risks — Risk assessment includes considering how the risk should be managed and whether to accept, avoid, reduce, or share the risk.
  - id: CC3.2.6
    control: CC3.2
    text:
      en: Identifies and Assesses Criticality of Information Assets and Identifies Threats and Vulnerabilities — The entity's risk identification and assessment process includes (1) identifying information assets, including physical devices and systems, virtual devices, software, data and data flows, external information systems, and organizational roles; (2) assessing the criticality of those information assets; (3) identifying the threats to the assets from intentional (including malicious) and unintentional acts and environmental events; and (4) identifying the vulnerabilities of the identified assets.
      fr: Identifies and Assesses Criticality of Information Assets and Identifies Threats and Vulnerabilities — The entity's risk identification and assessment process includes (1) identifying information assets, including physical devices and systems, virtual devices, software, data and data flows, external information systems, and organizational roles; (2) assessing the criticality of those information assets; (3) identifying the threats to the assets from intentional (including malicious) and unintentional acts and environmental events; and (4) identifying the vulnerabilities of the identified assets.
  - id: CC3.2.7
    control: CC3.2
    text:
      en: Analyzes Threats and Vulnerabilities From Vendors, Business Partners, and Other Parties — The entity's risk assessment process includes the analysis of potential threats and vulnerabilities arising from vendors providing goods and services, as well as threats and vulnerabilities arising from business partners, customers, and others with access to the entity's information systems.
      fr: Analyzes Threats and Vulnerabilities From Vendors, Business Partners, and Other Parties — The entity's risk assessment process includes the analysis of potential threats and vulnerabilities arising from vendors providing goods and services, as well as threats and vulnerabilities arising from business partners, customers, and others with access to the entity's information systems.
  - id: CC3.2.8
    control: CC3.2
    text:
      en: Considers the Significance of the Risk — The entity’s consideration of the potential significance of the identified risks includes (1) determining the criticality of identified assets in meeting objectives; (2) assessing the impact of identified threats and vulnerabilities in meeting objectives; (3) assessing the likelihood of identified threats; and (4) determining the risk associated with assets based on asset criticality, threat impact, and likelihood.
      fr: Considers the Significance of the Risk — The entity’s consideration of the potential significance of the identified risks includes (1) determining the criticality of identified assets in meeting objectives; (2) assessing the impact of identified threats and vulnerabilities in meeting objectives; (3) assessing the likelihood of identified threats; and (4) determining the risk associated with assets based on asset criticality, threat impact, and likelihood.
- code: CC3.3
  domain: CC3
  title:
    en: COSO Principle 8
    fr: COSO Principle 8
  description:
    en: The entity considers the potential for fraud in assessing risks to the achievement of objectives.
    fr: The entity considers the potential for fraud in assessing risks to the achievement of objectives.
  guidance:
    en: The entity considers the potential for fraud in assessing risks to the achievement of objectives.
    fr: The entity considers the potential for fraud in assessing risks to the achievement of objectives.
  requirements:
  - id: CC3.3.1
    control: CC3.3
    text:
      en: Considers Various Types of Fraud — The assessment of fraud considers fraudulent reporting, possible loss of assets, and corruption resulting from the various ways that fraud and misconduct can occur.
      fr: Considers Various Types of Fraud — The assessment of fraud considers fraudulent reporting, possible loss of assets, and corruption resulting from the various ways that fraud and misconduct can occur.
  - id: CC3.3.2
    control: CC3.3
    text:
      en: Assesses Incentives and Pressures — The assessment of fraud risks considers incentives and pressures.
      fr: Assesses Incentives and Pressures — The assessment of fraud risks considers incentives and pressures.
  - id: CC3.3.3
    control: CC3.3
    text:
      en: Assesses Opportunities — The assessment of fraud risk considers opportunities for unauthorized acquisition, use, or disposal of assets, altering the entity’s reporting records, or committing other inappropriate acts.
      fr: Assesses Opportunities — The assessment of fraud risk considers opportunities for unauthorized acquisition, use, or disposal of assets, altering the entity’s reporting records, or committing other inappropriate acts.
  - id: CC3.3.4
    control: CC3.3
    text:
      en: Assesses Attitudes and Rationalizations — The assessment of fraud risk considers how management and other personnel might engage in or justify inappropriate actions.
      fr: Assesses Attitudes and Rationalizations — The assessment of fraud risk considers how management and other personnel might engage in or justify inappropriate actions.
  - id: CC3.3.5
    control: CC3.3
    text:
      en: Considers the Risks Related to the Use of IT and Access to Information — The assessment of fraud risks includes consideration of threats and vulnerabilities that arise specifically from the use of IT and access to information.
      fr: Considers the Risks Related to the Use of IT and Access to Information — The assessment of fraud risks includes consideration of threats and vulnerabilities that arise specifically from the use of IT and access to information.
- code: CC3.4
  domain: CC3
  title:
    en: COSO Principle 9
    fr: COSO Principle 9
  description:
    en: The entity identifies and assesses changes that could significantly impact the system of internal control.
    fr: The entity identifies and assesses changes that could significantly impact the system of internal control.
  guidance:
    en: The entity identifies and assesses changes that could significantly impact the system of internal control.
    fr: The entity identifies and assesses changes that could significantly impact the system of internal control.
  requirements:
  - id: CC3.4.1
    control: CC3.4
    text:
      en: Assesses Changes in the External Environment—The risk identification process considers changes to the regulatory, economic, and physical environment in which the entity operates.
      fr: Assesses Changes in the External Environment—The risk identification process considers changes to the regulatory, economic, and physical environment in which the entity operates.
  - id: CC3.4.2
    control: CC3.4
    text:
      en: Assesses Changes in the Business Model—The entity considers the potential impacts of new business lines, dramatically altered compositions of existing business lines, acquired or divested business operations on the system of internal control, rapid growth, changing reliance on foreign geographies, and new technologies.
      fr: Assesses Changes in the Business Model—The entity considers the potential impacts of new business lines, dramatically altered compositions of existing business lines, acquired or divested business operations on the system of internal control, rapid growth, changing reliance on foreign geographies, and new technologies.
  - id: CC3.4.3
    control: CC3.4
    text:
      en: Assesses Changes in Leadership—The entity considers changes in management and respective attitudes and philosophies on the system of internal control.
      fr: Assesses Changes in Leadership—The entity considers changes in management and respective attitudes and philosophies on the system of internal control.
  - id: CC3.4.4
    control: CC3.4
    text:
      en: Assess Changes in Systems and Technology—The risk identification process considers changes arising from changes in the entity’s systems and changes in the technology environment.
      fr: Assess Changes in Systems and Technology—The risk identification process considers changes arising from changes in the entity’s systems and changes in the technology environment.
  - id: CC3.4.5
    control: CC3.4
    text:
      en: Assess Changes in Vendor and Business Partner Relationships—The risk identification process considers changes in vendor and business partner relationships.
      fr: Assess Changes in Vendor and Business Partner Relationships—The risk identification process considers changes in vendor and business partner relationships.
- code: CC4.1
  domain: CC4
  title:
    en: COSO Principle 16
    fr: COSO Principle 16
  description:
    en: The entity selects, develops, and performs ongoing and/or separate evaluations to ascertain whether the components of internal control are present and functioning.
    fr: The entity selects, develops, and performs ongoing and/or separate evaluations to ascertain whether the components of internal control are present and functioning.
  guidance:
    en: The entity selects, develops, and performs ongoing and/or separate evaluations to ascertain whether the components of internal control are present and functioning.
    fr: The entity selects, develops, and performs ongoing and/or separate evaluations to ascertain whether the components of internal control are present and functioning.
  requirements:
  - id: CC4.1.1
    control: CC4.1
    text:
      en: Considers a Mix of Ongoing and Separate Evaluations — Management includes a balance of ongoing and separate evaluations.
      fr: Considers a Mix of Ongoing and Separate Evaluations — Management includes a balance of ongoing and separate evaluations.
  - id: CC4.1.2
    control: CC4.1
    text:
      en: Considers Rate of Change — Management considers the rate of change in business and business processes when selecting and developing ongoing and separate evaluations.
      fr: Considers Rate of Change — Management considers the rate of change in business and business processes when selecting and developing ongoing and separate evaluations.
  - id: CC4.1.3
    control: CC4.1
    text:
      en: Establishes Baseline Understanding — The design and current state of an internal control system are used to establish a baseline for ongoing and separate evaluations.
      fr: Establishes Baseline Understanding — The design and current state of an internal control system are used to establish a baseline for ongoing and separate evaluations.
  - id: CC4.1.4
    control: CC4.1
    text:
      en: Uses Knowledgeable Personnel — Evaluators performing ongoing and separate evaluations have sufficient knowledge to understand what is being evaluated.
      fr: Uses Knowledgeable Personnel — Evaluators performing ongoing and separate evaluations have sufficient knowledge to understand what is being evaluated.
  - id: CC4.1.5
    control: CC4.1
    text:
      en: Integrates With Business Processes — Ongoing evaluations are built into the business processes and adjust to changing conditions.
      fr: Integrates With Business Processes — Ongoing evaluations are built into the business processes and adjust to changing conditions.
  - id: CC4.1.6
    control: CC4.1
    text:
      en: Adjusts Scope and Frequency — Management varies the scope and frequency of separate evaluations depending on risk.
      fr: Adjusts Scope and Frequency — Management varies the scope and frequency of separate evaluations depending on risk.
  - id: CC4.1.7
    control: CC4.1
    text:
      en: Objectively Evaluates — Separate evaluations are performed periodically to provide objective feedback.
      fr: Objectively Evaluates — Separate evaluations are performed periodically to provide objective feedback.
  - id: CC4.1.8
    control: CC4.1
    text:
      en: Considers Different Types of Ongoing and Separate Evaluations — Management uses a variety of different types of ongoing and separate evaluations, including penetration testing, independent certification made against established specifications (for example, ISO certifications), and internal audit assessments.
      fr: Considers Different Types of Ongoing and Separate Evaluations — Management uses a variety of different types of ongoing and separate evaluations, including penetration testing, independent certification made against established specifications (for example, ISO certifications), and internal audit assessments.
- code: CC4.2
  domain: CC4
  title:
    en: COSO Principle 17
    fr: COSO Principle 17
  description:
    en: The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action, including senior management and the board of directors, as appropriate.
    fr: The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action, including senior management and the board of directors, as appropriate.
  guidance:
    en: The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action, including senior management and the board of directors, as appropriate.
    fr: The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action, including senior management and the board of directors, as appropriate.
  requirements:
  - id: CC4.2.1
    control: CC4.2
    text:
      en: Assesses Results — Management and the board of directors, as appropriate, assess results of ongoing and separate evaluations.
      fr: Assesses Results — Management and the board of directors, as appropriate, assess results of ongoing and separate evaluations.
  - id: CC4.2.2
    control: CC4.2
    text:
      en: Communicates Deficiencies — Deficiencies are communicated to parties responsible for taking corrective action and to senior management and the board of directors, as appropriate.
      fr: Communicates Deficiencies — Deficiencies are communicated to parties responsible for taking corrective action and to senior management and the board of directors, as appropriate.
  - id: CC4.2.3
    control: CC4.2
    text:
      en: Monitors Corrective Action — Management tracks whether deficiencies are remedied on a timely basis.
      fr: Monitors Corrective Action — Management tracks whether deficiencies are remedied on a timely basis.
- code: CC5.1
  domain: CC5
  title:
    en: COSO Principle 10
    fr: COSO Principle 10
  description:
    en: The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels.
    fr: The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels.
  guidance:
    en: The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels.
    fr: The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels.
  requirements:
  - id: CC5.1.1
    control: CC5.1
    text:
      en: Integrates With Risk Assessment — Control activities help ensure that risk responses that address and mitigate risks are carried out.
      fr: Integrates With Risk Assessment — Control activities help ensure that risk responses that address and mitigate risks are carried out.
  - id: CC5.1.2
    control: CC5.1
    text:
      en: Considers Entity-Specific Factors — Management considers how the environment, complexity, nature, and scope of its operations, as well as the specific characteristics of its organization, affect the selection and development of control activities.
      fr: Considers Entity-Specific Factors — Management considers how the environment, complexity, nature, and scope of its operations, as well as the specific characteristics of its organization, affect the selection and development of control activities.
  - id: CC5.1.3
    control: CC5.1
    text:
      en: Determines Relevant Business Processes — Management determines which relevant business processes require control activities.
      fr: Determines Relevant Business Processes — Management determines which relevant business processes require control activities.
  - id: CC5.1.4
    control: CC5.1
    text:
      en: Evaluates a Mix of Control Activity Types — Control activities include a range and variety of controls and may include a balance of approaches to mitigate risks, considering both manual and automated controls, and preventive and detective controls.
      fr: Evaluates a Mix of Control Activity Types — Control activities include a range and variety of controls and may include a balance of approaches to mitigate risks, considering both manual and automated controls, and preventive and detective controls.
  - id: CC5.1.5
    control: CC5.1
    text:
      en: Considers at What Level Activities Are Applied — Management considers control activities at various levels in the entity.
      fr: Considers at What Level Activities Are Applied — Management considers control activities at various levels in the entity.
  - id: CC5.1.6
    control: CC5.1
    text:
      en: Addresses Segregation of Duties — Management segregates incompatible duties, and where such segregation is not practical, management selects and develops alternative control activities.
      fr: Addresses Segregation of Duties — Management segregates incompatible duties, and where such segregation is not practical, management selects and develops alternative control activities.
- code: CC5.2
  domain: CC5
  title:
    en: COSO Principle 11
    fr: COSO Principle 11
  description:
    en: The entity also selects and develops general control activities over technology to support the achievement of objectives.
    fr: The entity also selects and develops general control activities over technology to support the achievement of objectives.
  guidance:
    en: The entity also selects and develops general control activities over technology to support the achievement of objectives.
    fr: The entity also selects and develops general control activities over technology to support the achievement of objectives.
  requirements:
  - id: CC5.2.1
    control: CC5.2
    text:
      en: Determines Dependency Between the Use of Technology in Business Processes and Technology General Controls — Management understands and determines the dependency and linkage between business processes, automated control activities, and technology general controls.
      fr: Determines Dependency Between the Use of Technology in Business Processes and Technology General Controls — Management understands and determines the dependency and linkage between business processes, automated control activities, and technology general controls.
  - id: CC5.2.2
    control: CC5.2
    text:
      en: Establishes Relevant Technology Infrastructure Control Activities — Management selects and develops control activities over the technology infrastructure, which are designed and implemented to help ensure the completeness, accuracy, and availability of technology processing.
      fr: Establishes Relevant Technology Infrastructure Control Activities — Management selects and develops control activities over the technology infrastructure, which are designed and implemented to help ensure the completeness, accuracy, and availability of technology processing.
  - id: CC5.2.3
    control: CC5.2
    text:
      en: Establishes Relevant Security Management Process Controls Activities — Management selects and develops control activities that are designed and implemented to restrict technology access rights to authorized users commensurate with their job responsibilities and to protect the entity’s assets from external threats.
      fr: Establishes Relevant Security Management Process Controls Activities — Management selects and develops control activities that are designed and implemented to restrict technology access rights to authorized users commensurate with their job responsibilities and to protect the entity’s assets from external threats.
  - id: CC5.2.4
    control: CC5.2
    text:
      en: Establishes Relevant Technology Acquisition, Development, and Maintenance Process Control Activities — Management selects and develops control activities over the acquisition, development, and maintenance of technology and its infrastructure to achieve management’s objectives.
      fr: Establishes Relevant Technology Acquisition, Development, and Maintenance Process Control Activities — Management selects and develops control activities over the acquisition, development, and maintenance of technology and its infrastructure to achieve management’s objectives.
- code: CC5.3
  domain: CC5
  title:
    en: COSO Principle 12
    fr: COSO Principle 12
  description:
    en: The entity deploys control activities through policies that establish what is expected and in procedures that put policies into action.
    fr: The entity deploys control activities through policies that establish what is expected and in procedures that put policies into action.
  guidance:
    en: The entity deploys control activities through policies that establish what is expected and in procedures that put policies into action.
    fr: The entity deploys control activities through policies that establish what is expected and in procedures that put policies into action.
  requirements:
  - id: CC5.3.1
    control: CC5.3
    text:
      en: Establishes Policies and Procedures to Support Deployment of Management ‘s Directives—Management establishes control activities that are built into business processes and employees’ day-to-day activities through policies establishing what is expected and relevant procedures specifying actions.
      fr: Establishes Policies and Procedures to Support Deployment of Management ‘s Directives—Management establishes control activities that are built into business processes and employees’ day-to-day activities through policies establishing what is expected and relevant procedures specifying actions.
  - id: CC5.3.2
    control: CC5.3
    text:
      en: Establishes Responsibility and Accountability for Executing Policies and Procedures—Management establishes responsibility and accountability for control activities with management (or other designated personnel) of the business unit or function in which the relevant risks reside.
      fr: Establishes Responsibility and Accountability for Executing Policies and Procedures—Management establishes responsibility and accountability for control activities with management (or other designated personnel) of the business unit or function in which the relevant risks reside.
  - id: CC5.3.3
    control: CC5.3
    text:
      en: Performs in a Timely Manner—Responsible personnel perform control activities in a timely manner as defined by the policies and procedures.
      fr: Performs in a Timely Manner—Responsible personnel perform control activities in a timely manner as defined by the policies and procedures.
  - id: CC5.3.4
    control: CC5.3
    text:
      en: Takes Corrective Action—Responsible personnel investigate and act on matters identified as a result of executing control activities.
      fr: Takes Corrective Action—Responsible personnel investigate and act on matters identified as a result of executing control activities.
  - id: CC5.3.5
    control: CC5.3
    text:
      en: Performs Using Competent Personnel—Competent personnel with sufficient authority perform control activities with diligence and continuing focus.
      fr: Performs Using Competent Personnel—Competent personnel with sufficient authority perform control activities with diligence and continuing focus.
  - id: CC5.3.6
    control: CC5.3
    text:
      en: Reassesses Policies and Procedures—Management periodically reviews control activities to determine their continued relevance and refreshes them when necessary.
      fr: Reassesses Policies and Procedures—Management periodically reviews control activities to determine their continued relevance and refreshes them when necessary.
- code: CC6.1
  domain: CC6
  title:
    en: CC6.1
    fr: CC6.1
  description:
    en: The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events to meet the entity's objectives.
    fr: The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events to meet the entity's objectives.
  guidance:
    en: The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events to meet the entity's objectives.
    fr: The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events to meet the entity's objectives.
  requirements:
  - id: CC6.1.1
    control: CC6.1
    text:
      en: Identifies and Manages the Inventory of Information Assets — The entity identifies, inventories, classifies, and manages information assets.
      fr: Identifies and Manages the Inventory of Information Assets — The entity identifies, inventories, classifies, and manages information assets.
  - id: CC6.1.2
    control: CC6.1
    text:
      en: Restricts Logical Access — Logical access to information assets, including hardware, data (at-rest, during processing, or in transmission), software, administrative authorities, mobile devices, output, and offline system components is restricted through the use of access control software and rule sets.
      fr: Restricts Logical Access — Logical access to information assets, including hardware, data (at-rest, during processing, or in transmission), software, administrative authorities, mobile devices, output, and offline system components is restricted through the use of access control software and rule sets.
  - id: CC6.1.3
    control: CC6.1
    text:
      en: Identifies and Authenticates Users — Persons, infrastructure and software are identified and authenticated prior to accessing information assets, whether locally or remotely.
      fr: Identifies and Authenticates Users — Persons, infrastructure and software are identified and authenticated prior to accessing information assets, whether locally or remotely.
  - id: CC6.1.4
    control: CC6.1
    text:
      en: Considers Network Segmentation — Network segmentation permits unrelated portions of the entity's information system to be isolated from each other.
      fr: Considers Network Segmentation — Network segmentation permits unrelated portions of the entity's information system to be isolated from each other.
  - id: CC6.1.5
    control: CC6.1
    text:
      en: Manages Points of Access — Points of access by outside entities and the types of data that flow through the points of access are identified, inventoried, and managed. The types of individuals and systems using each point of access are identified, documented, and managed.
      fr: Manages Points of Access — Points of access by outside entities and the types of data that flow through the points of access are identified, inventoried, and managed. The types of individuals and systems using each point of access are identified, documented, and managed.
  - id: CC6.1.6
    control: CC6.1
    text:
      en: Restricts Access to Information Assets — Combinations of data classification, separate data structures, port restrictions, access protocol restrictions, user identification, and digital certificates are used to establish access control rules for information assets.
      fr: Restricts Access to Information Assets — Combinations of data classification, separate data structures, port restrictions, access protocol restrictions, user identification, and digital certificates are used to establish access control rules for information assets.
  - id: CC6.1.7
    control: CC6.1
    text:
      en: Manages Identification and Authentication — Identification and authentication requirements are established, documented, and managed for individuals and systems accessing entity information, infrastructure and software.
      fr: Manages Identification and Authentication — Identification and authentication requirements are established, documented, and managed for individuals and systems accessing entity information, infrastructure and software.
  - id: CC6.1.8
    control: CC6.1
    text:
      en: Manages Credentials for Infrastructure and Software — New internal and external infrastructure and software are registered, authorized, and documented prior to being granted access credentials and implemented on the network or access point. Credentials are removed and access is disabled when access is no longer required or the infrastructure and software are no longer in use.
      fr: Manages Credentials for Infrastructure and Software — New internal and external infrastructure and software are registered, authorized, and documented prior to being granted access credentials and implemented on the network or access point. Credentials are removed and access is disabled when access is no longer required or the infrastructure and software are no longer in use.
  - id: CC6.1.9
    control: CC6.1
    text:
      en: Uses Encryption to Protect Data — The entity uses encryption to supplement other measures used to protect data-at-rest, when such protections are deemed appropriate based on assessed risk.
      fr: Uses Encryption to Protect Data — The entity uses encryption to supplement other measures used to protect data-at-rest, when such protections are deemed appropriate based on assessed risk.
  - id: CC6.1.10
    control: CC6.1
    text:
      en: Protects Encryption Keys — Processes are in place to protect encryption keys during generation, storage, use, and destruction.
      fr: Protects Encryption Keys — Processes are in place to protect encryption keys during generation, storage, use, and destruction.
- code: CC6.2
  domain: CC6
  title:
    en: CC6.2
    fr: CC6.2
  description:
    en: Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users whose access is administered by the entity. For those users whose access is administered by the entity, user system credentials are removed when user access is no longer authorized.
    fr: Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users whose access is administered by the entity. For those users whose access is administered by the entity, user system credentials are removed when user access is no longer authorized.
  guidance:
    en: Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users whose access is administered by the entity. For those users whose access is administered by the entity, user system credentials are removed when user access is no longer authorized.
    fr: Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users whose access is administered by the entity. For those users whose access is administered by the entity, user system credentials are removed when user access is no longer authorized.
  requirements:
  - id: CC6.2.1
    control: CC6.2
    text:
      en: Controls Access Credentials to Protected Assets — Information asset access credentials are created based on an authorization from the system's asset owner or authorized custodian.
      fr: Controls Access Credentials to Protected Assets — Information asset access credentials are created based on an authorization from the system's asset owner or authorized custodian.
  - id: CC6.2.2
    control: CC6.2
    text:
      en: Removes Access to Protected Assets When Appropriate — Processes are in place to remove credential access when an individual no longer requires such access.
      fr: Removes Access to Protected Assets When Appropriate — Processes are in place to remove credential access when an individual no longer requires such access.
  - id: CC6.2.3
    control: CC6.2
    text:
      en: Reviews Appropriateness of Access Credentials — The appropriateness of access credentials is reviewed on a periodic basis for unnecessary and inappropriate individuals with credentials.
      fr: Reviews Appropriateness of Access Credentials — The appropriateness of access credentials is reviewed on a periodic basis for unnecessary and inappropriate individuals with credentials.
- code: CC6.3
  domain: CC6
  title:
    en: CC6.3
    fr: CC6.3
  description:
    en: The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles, responsibilities, or the system design and changes, giving consideration to the concepts of least privilege and segregation of duties, to meet the entity’s objectives.
    fr: The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles, responsibilities, or the system design and changes, giving consideration to the concepts of least privilege and segregation of duties, to meet the entity’s objectives.
  guidance:
    en: The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles, responsibilities, or the system design and changes, giving consideration to the concepts of least privilege and segregation of duties, to meet the entity’s objectives.
    fr: The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles, responsibilities, or the system design and changes, giving consideration to the concepts of least privilege and segregation of duties, to meet the entity’s objectives.
  requirements:
  - id: CC6.3.1
    control: CC6.3
    text:
      en: Creates or Modifies Access to Protected Information Assets — Processes are in place to create or modify access to protected information assets based on authorization from the asset’s owner.
      fr: Creates or Modifies Access to Protected Information Assets — Processes are in place to create or modify access to protected information assets based on authorization from the asset’s owner.
  - id: CC6.3.2
    control: CC6.3
    text:
      en: Removes Access to Protected Information Assets — Processes are in place to remove access to protected information assets when an individual no longer requires access.
      fr: Removes Access to Protected Information Assets — Processes are in place to remove access to protected information assets when an individual no longer requires access.
  - id: CC6.3.3
    control: CC6.3
    text:
      en: Uses Role-Based Access Controls — Role-based access control is utilized to support segregation of incompatible functions.
      fr: Uses Role-Based Access Controls — Role-based access control is utilized to support segregation of incompatible functions.
- code: CC6.4
  domain: CC6
  title:
    en: CC6.4
    fr: CC6.4
  description:
    en: The entity restricts physical access to facilities and protected information assets (for example, data center facilities, back-up media storage, and other sensitive locations) to authorized personnel to meet the entity’s objectives.
    fr: The entity restricts physical access to facilities and protected information assets (for example, data center facilities, back-up media storage, and other sensitive locations) to authorized personnel to meet the entity’s objectives.
  guidance:
    en: The entity restricts physical access to facilities and protected information assets (for example, data center facilities, back-up media storage, and other sensitive locations) to authorized personnel to meet the entity’s objectives.
    fr: The entity restricts physical access to facilities and protected information assets (for example, data center facilities, back-up media storage, and other sensitive locations) to authorized personnel to meet the entity’s objectives.
  requirements:
  - id: CC6.4.1
    control: CC6.4
    text:
      en: Creates or Modifies Physical Access — Processes are in place to create or modify physical access to facilities such as data centers, office spaces, and work areas, based on authorization from the system's asset owner.
      fr: Creates or Modifies Physical Access — Processes are in place to create or modify physical access to facilities such as data centers, office spaces, and work areas, based on authorization from the system's asset owner.
  - id: CC6.4.2
    control: CC6.4
    text:
      en: Removes Physical Access — Processes are in place to remove access to physical resources when an individual no longer requires access.
      fr: Removes Physical Access — Processes are in place to remove access to physical resources when an individual no longer requires access.
  - id: CC6.4.3
    control: CC6.4
    text:
      en: Reviews Physical Access — Processes are in place to periodically review physical access to ensure consistency with job responsibilities.
      fr: Reviews Physical Access — Processes are in place to periodically review physical access to ensure consistency with job responsibilities.
- code: CC6.5
  domain: CC6
  title:
    en: CC6.5
    fr: CC6.5
  description:
    en: The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data and software from those assets has been diminished and is no longer required to meet the entity’s objectives.
    fr: The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data and software from those assets has been diminished and is no longer required to meet the entity’s objectives.
  guidance:
    en: The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data and software from those assets has been diminished and is no longer required to meet the entity’s objectives.
    fr: The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data and software from those assets has been diminished and is no longer required to meet the entity’s objectives.
  requirements:
  - id: CC6.5.1
    control: CC6.5
    text:
      en: Identifies Data and Software for Disposal — Procedures are in place to identify data and software stored on equipment to be disposed and to render such data and software unreadable.
      fr: Identifies Data and Software for Disposal — Procedures are in place to identify data and software stored on equipment to be disposed and to render such data and software unreadable.
  - id: CC6.5.2
    control: CC6.5
    text:
      en: Removes Data and Software From Entity Control — Procedures are in place to remove data and software stored on equipment to be removed from the physical control of the entity and to render such data and software unreadable.
      fr: Removes Data and Software From Entity Control — Procedures are in place to remove data and software stored on equipment to be removed from the physical control of the entity and to render such data and software unreadable.
- code: CC6.6
  domain: CC6
  title:
    en: CC6.6
    fr: CC6.6
  description:
    en: The entity implements logical access security measures to protect against threats from sources outside its system boundaries.
    fr: The entity implements logical access security measures to protect against threats from sources outside its system boundaries.
  guidance:
    en: The entity implements logical access security measures to protect against threats from sources outside its system boundaries.
    fr: The entity implements logical access security measures to protect against threats from sources outside its system boundaries.
  requirements:
  - id: CC6.6.1
    control: CC6.6
    text:
      en: Restricts Access — The types of activities that can occur through a communication channel (for example, FTP site, router port) are restricted.
      fr: Restricts Access — The types of activities that can occur through a communication channel (for example, FTP site, router port) are restricted.
  - id: CC6.6.2
    control: CC6.6
    text:
      en: Protects Identification and Authentication Credentials — Identification and authentication credentials are protected during transmission outside its system boundaries.
      fr: Protects Identification and Authentication Credentials — Identification and authentication credentials are protected during transmission outside its system boundaries.
  - id: CC6.6.3
    control: CC6.6
    text:
      en: Requires Additional Authentication or Credentials — Additional authentication information or credentials are required when accessing the system from outside its boundaries.
      fr: Requires Additional Authentication or Credentials — Additional authentication information or credentials are required when accessing the system from outside its boundaries.
  - id: CC6.6.4
    control: CC6.6
    text:
      en: Implements Boundary Protection Systems — Boundary protection systems (for example, firewalls, demilitarized zones, and intrusion detection systems) are implemented to protect external access points from attempts and unauthorized access and are monitored to detect such attempts.
      fr: Implements Boundary Protection Systems — Boundary protection systems (for example, firewalls, demilitarized zones, and intrusion detection systems) are implemented to protect external access points from attempts and unauthorized access and are monitored to detect such attempts.
- code: CC6.7
  domain: CC6
  title:
    en: CC6.7
    fr: CC6.7
  description:
    en: The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes, and protects it during transmission, movement, or removal to meet the entity’s objectives.
    fr: The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes, and protects it during transmission, movement, or removal to meet the entity’s objectives.
  guidance:
    en: The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes, and protects it during transmission, movement, or removal to meet the entity’s objectives.
    fr: The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes, and protects it during transmission, movement, or removal to meet the entity’s objectives.
  requirements:
  - id: CC6.7.1
    control: CC6.7
    text:
      en: Restricts the Ability to Perform Transmission — Data loss prevention processes and technologies are used to restrict ability to authorize and execute transmission, movement and removal of information.
      fr: Restricts the Ability to Perform Transmission — Data loss prevention processes and technologies are used to restrict ability to authorize and execute transmission, movement and removal of information.
  - id: CC6.7.2
    control: CC6.7
    text:
      en: Uses Encryption Technologies or Secure Communication Channels to Protect Data — Encryption technologies or secured communication channels are used to protect transmission of data and other communications beyond connectivity access points.
      fr: Uses Encryption Technologies or Secure Communication Channels to Protect Data — Encryption technologies or secured communication channels are used to protect transmission of data and other communications beyond connectivity access points.
  - id: CC6.7.3
    control: CC6.7
    text:
      en: Protects Removal Media — Encryption technologies and physical asset protections are used for removable media (such as USB drives and back-up tapes), as appropriate.
      fr: Protects Removal Media — Encryption technologies and physical asset protections are used for removable media (such as USB drives and back-up tapes), as appropriate.
  - id: CC6.7.4
    control: CC6.7
    text:
      en: Protects Mobile Devices — Processes are in place to protect mobile devices (such as laptops, smart phones and tablets) that serve as information assets.
      fr: Protects Mobile Devices — Processes are in place to protect mobile devices (such as laptops, smart phones and tablets) that serve as information assets.
- code: CC6.8
  domain: CC6
  title:
    en: CC6.8
    fr: CC6.8
  description:
    en: The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software to meet the entity’s objectives.
    fr: The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software to meet the entity’s objectives.
  guidance:
    en: The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software to meet the entity’s objectives.
    fr: The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software to meet the entity’s objectives.
  requirements:
  - id: CC6.8.1
    control: CC6.8
    text:
      en: Restricts Application and Software Installation — The ability to install applications and software is restricted to authorized individuals.
      fr: Restricts Application and Software Installation — The ability to install applications and software is restricted to authorized individuals.
  - id: CC6.8.2
    control: CC6.8
    text:
      en: Detects Unauthorized Changes to Software and Configuration Parameters — Processes are in place to detect changes to software and configuration parameters that may be indicative of unauthorized or malicious software.
      fr: Detects Unauthorized Changes to Software and Configuration Parameters — Processes are in place to detect changes to software and configuration parameters that may be indicative of unauthorized or malicious software.
  - id: CC6.8.3
    control: CC6.8
    text:
      en: Uses a Defined Change Control Process — A management-defined change control process is used for the implementation of software.
      fr: Uses a Defined Change Control Process — A management-defined change control process is used for the implementation of software.
  - id: CC6.8.4
    control: CC6.8
    text:
      en: Uses Antivirus and Anti-Malware Software — Antivirus and anti-malware software is implemented and maintained to provide for the interception or detection and remediation of malware.
      fr: Uses Antivirus and Anti-Malware Software — Antivirus and anti-malware software is implemented and maintained to provide for the interception or detection and remediation of malware.
  - id: CC6.8.5
    control: CC6.8
    text:
      en: Scans Information Assets from Outside the Entity for Malware and Other Unauthorized Software — Procedures are in place to scan information assets that have been transferred or returned to the entity’s custody for malware and other unauthorized software and to remove any items detected prior to its implementation on the network.
      fr: Scans Information Assets from Outside the Entity for Malware and Other Unauthorized Software — Procedures are in place to scan information assets that have been transferred or returned to the entity’s custody for malware and other unauthorized software and to remove any items detected prior to its implementation on the network.
- code: CC7.1
  domain: CC7
  title:
    en: CC7.1
    fr: CC7.1
  description:
    en: To meet its objectives, the entity uses detection and monitoring procedures to identify (1) changes to configurations that result in the introduction of new vulnerabilities, and (2) susceptibilities to newly discovered vulnerabilities.
    fr: To meet its objectives, the entity uses detection and monitoring procedures to identify (1) changes to configurations that result in the introduction of new vulnerabilities, and (2) susceptibilities to newly discovered vulnerabilities.
  guidance:
    en: To meet its objectives, the entity uses detection and monitoring procedures to identify (1) changes to configurations that result in the introduction of new vulnerabilities, and (2) susceptibilities to newly discovered vulnerabilities.
    fr: To meet its objectives, the entity uses detection and monitoring procedures to identify (1) changes to configurations that result in the introduction of new vulnerabilities, and (2) susceptibilities to newly discovered vulnerabilities.
  requirements:
  - id: CC7.1.1
    control: CC7.1
    text:
      en: Uses Defined Configuration Standards — Management has defined configuration standards.
      fr: Uses Defined Configuration Standards — Management has defined configuration standards.
  - id: CC7.1.2
    control: CC7.1
    text:
      en: Monitors Infrastructure and Software — The entity monitors infrastructure and software for noncompliance with the standards, which could threaten the achievement of the entity's objectives.
      fr: Monitors Infrastructure and Software — The entity monitors infrastructure and software for noncompliance with the standards, which could threaten the achievement of the entity's objectives.
  - id: CC7.1.3
    control: CC7.1
    text:
      en: Implements Change-Detection Mechanisms — The IT system includes a change-detection mechanism (for example, file integrity monitoring tools) to alert personnel to unauthorized modifications of critical system files, configuration files, or content files.
      fr: Implements Change-Detection Mechanisms — The IT system includes a change-detection mechanism (for example, file integrity monitoring tools) to alert personnel to unauthorized modifications of critical system files, configuration files, or content files.
  - id: CC7.1.4
    control: CC7.1
    text:
      en: Detects Unknown or Unauthorized Components — Procedures are in place to detect the introduction of unknown or unauthorized components.
      fr: Detects Unknown or Unauthorized Components — Procedures are in place to detect the introduction of unknown or unauthorized components.
  - id: CC7.1.5
    control: CC7.1
    text:
      en: Conducts Vulnerability Scans — The entity conducts vulnerability scans designed to identify potential vulnerabilities or misconfigurations on a periodic basis and after any significant change in the environment and takes action to remediate identified deficiencies on a timely basis.
      fr: Conducts Vulnerability Scans — The entity conducts vulnerability scans designed to identify potential vulnerabilities or misconfigurations on a periodic basis and after any significant change in the environment and takes action to remediate identified deficiencies on a timely basis.
- code: CC7.2
  domain: CC7
  title:
    en: CC7.2
    fr: CC7.2
  description:
    en: The entity monitors system components and the operation of those components for anomalies that are indicative of malicious acts, natural disasters, and errors affecting the entity's ability to meet its objectives; anomalies are analyzed to determine whether they represent security events.
    fr: The entity monitors system components and the operation of those components for anomalies that are indicative of malicious acts, natural disasters, and errors affecting the entity's ability to meet its objectives; anomalies are analyzed to determine whether they represent security events.
  guidance:
    en: The entity monitors system components and the operation of those components for anomalies that are indicative of malicious acts, natural disasters, and errors affecting the entity's ability to meet its objectives; anomalies are analyzed to determine whether they represent security events.
    fr: The entity monitors system components and the operation of those components for anomalies that are indicative of malicious acts, natural disasters, and errors affecting the entity's ability to meet its objectives; anomalies are analyzed to determine whether they represent security events.
  requirements:
  - id: CC7.2.1
    control: CC7.2
    text:
      en: Implements Detection Policies, Procedures, and Tools — Detection policies and procedures are defined and implemented, and detection tools are implemented on Infrastructure and software to identify anomalies in the operation or unusual activity on systems. Procedures may include (1) a defined governance process for security event detection and management that includes provision of resources; (2) use of intelligence sources to identify newly discovered threats and vulnerabilities; and (3) logging of unusual system activities.
      fr: Implements Detection Policies, Procedures, and Tools — Detection policies and procedures are defined and implemented, and detection tools are implemented on Infrastructure and software to identify anomalies in the operation or unusual activity on systems. Procedures may include (1) a defined governance process for security event detection and management that includes provision of resources; (2) use of intelligence sources to identify newly discovered threats and vulnerabilities; and (3) logging of unusual system activities.
  - id: CC7.2.2
    control: CC7.2
    text:
      en: Designs Detection Measures — Detection measures are designed to identify anomalies that could result from actual or attempted (1) compromise of physical barriers; (2) unauthorized actions of authorized personnel; (3) use of compromised identification and authentication credentials; (4) unauthorized access from outside the system boundaries; (5) compromise of authorized external parties; and (6) implementation or connection of unauthorized hardware and software.
      fr: Designs Detection Measures — Detection measures are designed to identify anomalies that could result from actual or attempted (1) compromise of physical barriers; (2) unauthorized actions of authorized personnel; (3) use of compromised identification and authentication credentials; (4) unauthorized access from outside the system boundaries; (5) compromise of authorized external parties; and (6) implementation or connection of unauthorized hardware and software.
  - id: CC7.2.3
    control: CC7.2
    text:
      en: Implements Filters to Analyze Anomalies — Management has implemented procedures to filter, summarize, and analyze anomalies to identify security events.
      fr: Implements Filters to Analyze Anomalies — Management has implemented procedures to filter, summarize, and analyze anomalies to identify security events.
  - id: CC7.2.4
    control: CC7.2
    text:
      en: Monitors Detection Tools for Effective Operation — Management has implemented processes to monitor the effectiveness of detection tools.
      fr: Monitors Detection Tools for Effective Operation — Management has implemented processes to monitor the effectiveness of detection tools.
- code: CC7.3
  domain: CC7
  title:
    en: CC7.3
    fr: CC7.3
  description:
    en: The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives (security incidents) and, if so, takes actions to prevent or address such failures.
    fr: The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives (security incidents) and, if so, takes actions to prevent or address such failures.
  guidance:
    en: The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives (security incidents) and, if so, takes actions to prevent or address such failures.
    fr: The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives (security incidents) and, if so, takes actions to prevent or address such failures.
  requirements:
  - id: CC7.3.1
    control: CC7.3
    text:
      en: Responds to Security Incidents — Procedures are in place for responding to security incidents and evaluating the effectiveness of those policies and procedures on a periodic basis.
      fr: Responds to Security Incidents — Procedures are in place for responding to security incidents and evaluating the effectiveness of those policies and procedures on a periodic basis.
  - id: CC7.3.2
    control: CC7.3
    text:
      en: Communicates and Reviews Detected Security Events — Detected security events are communicated to and reviewed by the individuals responsible for the management of the security program and actions are taken, if necessary.
      fr: Communicates and Reviews Detected Security Events — Detected security events are communicated to and reviewed by the individuals responsible for the management of the security program and actions are taken, if necessary.
  - id: CC7.3.3
    control: CC7.3
    text:
      en: Develops and Implements Procedures to Analyze Security Incidents — Procedures are in place to analyze security incidents and determine system impact.
      fr: Develops and Implements Procedures to Analyze Security Incidents — Procedures are in place to analyze security incidents and determine system impact.
  - id: CC7.3.4
    control: CC7.3
    text:
      en: Assesses the Impact on Personal Information — Detected security events are evaluated to determine whether they could or did result in the unauthorized disclosure or use of personal information and whether there has been a failure to comply with applicable laws or regulations.
      fr: Assesses the Impact on Personal Information — Detected security events are evaluated to determine whether they could or did result in the unauthorized disclosure or use of personal information and whether there has been a failure to comply with applicable laws or regulations.
  - id: CC7.3.5
    control: CC7.3
    text:
      en: Determines Personal Information Used or Disclosed — When an unauthorized use or disclosure of personal information has occurred, the affected information is identified.
      fr: Determines Personal Information Used or Disclosed — When an unauthorized use or disclosure of personal information has occurred, the affected information is identified.
- code: CC7.4
  domain: CC7
  title:
    en: CC7.4
    fr: CC7.4
  description:
    en: The entity responds to identified security incidents by executing a defined incident response program to understand, contain, remediate, and communicate security incidents, as appropriate.
    fr: The entity responds to identified security incidents by executing a defined incident response program to understand, contain, remediate, and communicate security incidents, as appropriate.
  guidance:
    en: The entity responds to identified security incidents by executing a defined incident response program to understand, contain, remediate, and communicate security incidents, as appropriate.
    fr: The entity responds to identified security incidents by executing a defined incident response program to understand, contain, remediate, and communicate security incidents, as appropriate.
  requirements:
  - id: CC7.4.1
    control: CC7.4
    text:
      en: Assigns Roles and Responsibilities — Roles and responsibilities for the design, implementation, maintenance, and execution of the incident response program are assigned, including the use of external resources when necessary.
      fr: Assigns Roles and Responsibilities — Roles and responsibilities for the design, implementation, maintenance, and execution of the incident response program are assigned, including the use of external resources when necessary.
  - id: CC7.4.2
    control: CC7.4
    text:
      en: Contains Security Incidents — Procedures are in place to contain security incidents that actively threaten entity objectives.
      fr: Contains Security Incidents — Procedures are in place to contain security incidents that actively threaten entity objectives.
  - id: CC7.4.3
    control: CC7.4
    text:
      en: Mitigates Ongoing Security Incidents — Procedures are in place to mitigate the effects of ongoing security incidents.
      fr: Mitigates Ongoing Security Incidents — Procedures are in place to mitigate the effects of ongoing security incidents.
  - id: CC7.4.4
    control: CC7.4
    text:
      en: Ends Threats Posed by Security Incidents — Procedures are in place to end the threats posed by security incidents through closure of the vulnerability, removal of unauthorized access, and other remediation actions.
      fr: Ends Threats Posed by Security Incidents — Procedures are in place to end the threats posed by security incidents through closure of the vulnerability, removal of unauthorized access, and other remediation actions.
  - id: CC7.4.5
    control: CC7.4
    text:
      en: Restores Operations — Procedures are in place to restore data and business operations to an interim state that permits the achievement of entity objectives.
      fr: Restores Operations — Procedures are in place to restore data and business operations to an interim state that permits the achievement of entity objectives.
  - id: CC7.4.6
    control: CC7.4
    text:
      en: Develops and Implements Communication Protocols for Security Incidents — Protocols for communicating security incidents and actions taken to affected parties are developed and implemented to meet the entity's objectives.
      fr: Develops and Implements Communication Protocols for Security Incidents — Protocols for communicating security incidents and actions taken to affected parties are developed and implemented to meet the entity's objectives.
  - id: CC7.4.7
    control: CC7.4
    text:
      en: Obtains Understanding of Nature of Incident and Determines Containment Strategy — An understanding of the nature (for example, the method by which the incident occurred and the affected system resources) and severity of the security incident is obtained to determine the appropriate containment strategy, including (1) a determination of the appropriate response time frame, and (2) the determination and execution of the containment approach.
      fr: Obtains Understanding of Nature of Incident and Determines Containment Strategy — An understanding of the nature (for example, the method by which the incident occurred and the affected system resources) and severity of the security incident is obtained to determine the appropriate containment strategy, including (1) a determination of the appropriate response time frame, and (2) the determination and execution of the containment approach.
  - id: CC7.4.8
    control: CC7.4
    text:
      en: Remediates Identified Vulnerabilities — Identified vulnerabilities are remediated through the development and execution of remediation activities.
      fr: Remediates Identified Vulnerabilities — Identified vulnerabilities are remediated through the development and execution of remediation activities.
  - id: CC7.4.9
    control: CC7.4
    text:
      en: Communicates Remediation Activities — Remediation activities are documented and communicated in accordance with the incident response program.
      fr: Communicates Remediation Activities — Remediation activities are documented and communicated in accordance with the incident response program.
  - id: CC7.4.10
    control: CC7.4
    text:
      en: Evaluates the Effectiveness of Incident Response — The design of incident response activities is evaluated for effectiveness on a periodic basis.
      fr: Evaluates the Effectiveness of Incident Response — The design of incident response activities is evaluated for effectiveness on a periodic basis.
  - id: CC7.4.11
    control: CC7.4
    text:
      en: Periodically Evaluates Incidents — Periodically, management reviews incidents related to security, availability, processing integrity, confidentiality, and privacy and identifies the need for system changes based on incident patterns and root causes.
      fr: Periodically Evaluates Incidents — Periodically, management reviews incidents related to security, availability, processing integrity, confidentiality, and privacy and identifies the need for system changes based on incident patterns and root causes.
  - id: CC7.4.12
    control: CC7.4
    text:
      en: Communicates Unauthorized Use and Disclosure — Events that resulted in unauthorized use or disclosure of personal information are communicated to the data subjects, legal and regulatory authorities, and others as required.
      fr: Communicates Unauthorized Use and Disclosure — Events that resulted in unauthorized use or disclosure of personal information are communicated to the data subjects, legal and regulatory authorities, and others as required.
  - id: CC7.4.13
    control: CC7.4
    text:
      en: Application of Sanctions — The conduct of individuals and organizations operating under the authority of the entity and involved in the unauthorized use or disclosure of personal information is evaluated and, if appropriate, sanctioned in accordance with entity policies and legal and regulatory requirements.
      fr: Application of Sanctions — The conduct of individuals and organizations operating under the authority of the entity and involved in the unauthorized use or disclosure of personal information is evaluated and, if appropriate, sanctioned in accordance with entity policies and legal and regulatory requirements.
- code: CC7.5
  domain: CC7
  title:
    en: CC7.5
    fr: CC7.5
  description:
    en: The entity identifies, develops, and implements activities to recover from identified security incidents.
    fr: The entity identifies, develops, and implements activities to recover from identified security incidents.
  guidance:
    en: The entity identifies, develops, and implements activities to recover from identified security incidents.
    fr: The entity identifies, develops, and implements activities to recover from identified security incidents.
  requirements:
  - id: CC7.5.1
    control: CC7.5
    text:
      en: Restores the Affected Environment — The activities restore the affected environment to functional operation by rebuilding systems, updating software, installing patches, and changing configurations, as needed.
      fr: Restores the Affected Environment — The activities restore the affected environment to functional operation by rebuilding systems, updating software, installing patches, and changing configurations, as needed.
  - id: CC7.5.2
    control: CC7.5
    text:
      en: Communicates Information About the Event — Communications about the nature of the incident, recovery actions taken, and activities required for the prevention of future security events are made to management and others as appropriate (internal and external).
      fr: Communicates Information About the Event — Communications about the nature of the incident, recovery actions taken, and activities required for the prevention of future security events are made to management and others as appropriate (internal and external).
  - id: CC7.5.3
    control: CC7.5
    text:
      en: Determines Root Cause of the Event — The root cause of the event is determined.
      fr: Determines Root Cause of the Event — The root cause of the event is determined.
  - id: CC7.5.4
    control: CC7.5
    text:
      en: Implements Changes to Prevent and Detect Recurrences — Additional architecture or changes to preventive and detective controls, or both, are implemented to prevent and detect recurrences on a timely basis.
      fr: Implements Changes to Prevent and Detect Recurrences — Additional architecture or changes to preventive and detective controls, or both, are implemented to prevent and detect recurrences on a timely basis.
  - id: CC7.5.5
    control: CC7.5
    text:
      en: Improves Response and Recovery Procedures — Lessons learned are analyzed, and the incident response plan and recovery procedures are improved.
      fr: Improves Response and Recovery Procedures — Lessons learned are analyzed, and the incident response plan and recovery procedures are improved.
  - id: CC7.5.6
    control: CC7.5
    text:
      en: Implements Incident Recovery Plan Testing — Incident recovery plan testing is performed on a periodic basis. The testing includes (1) development of testing scenarios based on threat likelihood and magnitude; (2) consideration of relevant system components from across the entity that can impair availability; (3) scenarios that consider the potential for the lack of availability of key personnel; and (4) revision of continuity plans and systems based on test results.
      fr: Implements Incident Recovery Plan Testing — Incident recovery plan testing is performed on a periodic basis. The testing includes (1) development of testing scenarios based on threat likelihood and magnitude; (2) consideration of relevant system components from across the entity that can impair availability; (3) scenarios that consider the potential for the lack of availability of key personnel; and (4) revision of continuity plans and systems based on test results.
- code: CC8.1
  domain: CC8
  title:
    en: CC8.1
    fr: CC8.1
  description:
    en: The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its objectives.
    fr: The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its objectives.
  guidance:
    en: The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its objectives.
    fr: The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its objectives.
  requirements:
  - id: CC8.1.1
    control: CC8.1
    text:
      en: Manages Changes Throughout the System Lifecycle — A process for managing system changes throughout the lifecycle of the system and its components (infrastructure, data, software and procedures) is used to support system availability and processing integrity.
      fr: Manages Changes Throughout the System Lifecycle — A process for managing system changes throughout the lifecycle of the system and its components (infrastructure, data, software and procedures) is used to support system availability and processing integrity.
  - id: CC8.1.2
    control: CC8.1
    text:
      en: Authorizes Changes — A process is in place to authorize system changes prior to development.
      fr: Authorizes Changes — A process is in place to authorize system changes prior to development.
  - id: CC8.1.3
    control: CC8.1
    text:
      en: Designs and Develops Changes — A process is in place to design and develop system changes.
      fr: Designs and Develops Changes — A process is in place to design and develop system changes.
  - id: CC8.1.4
    control: CC8.1
    text:
      en: Documents Changes — A process is in place to document system changes to support ongoing maintenance of the system and to support system users in performing their responsibilities.
      fr: Documents Changes — A process is in place to document system changes to support ongoing maintenance of the system and to support system users in performing their responsibilities.
  - id: CC8.1.5
    control: CC8.1
    text:
      en: Tracks System Changes — A process is in place to track system changes prior to implementation.
      fr: Tracks System Changes — A process is in place to track system changes prior to implementation.
  - id: CC8.1.6
    control: CC8.1
    text:
      en: Configures Software — A process is in place to select and implement the configuration parameters used to control the functionality of software.
      fr: Configures Software — A process is in place to select and implement the configuration parameters used to control the functionality of software.
  - id: CC8.1.7
    control: CC8.1
    text:
      en: Tests System Changes — A process is in place to test system changes prior to implementation.
      fr: Tests System Changes — A process is in place to test system changes prior to implementation.
  - id: CC8.1.8
    control: CC8.1
    text:
      en: Approves System Changes — A process is in place to approve system changes prior to implementation.
      fr: Approves System Changes — A process is in place to approve system changes prior to implementation.
  - id: CC8.1.9
    control: CC8.1
    text:
      en: Deploys System Changes — A process is in place to implement system changes.
      fr: Deploys System Changes — A process is in place to implement system changes.
  - id: CC8.1.10
    control: CC8.1
    text:
      en: Identifies and Evaluates System Changes — Objectives affected by system changes are identified, and the ability of the modified system to meet the objectives is evaluated throughout the system development life cycle.
      fr: Identifies and Evaluates System Changes — Objectives affected by system changes are identified, and the ability of the modified system to meet the objectives is evaluated throughout the system development life cycle.
  - id: CC8.1.11
    control: CC8.1
    text:
      en: Identifies Changes in Infrastructure, Data, Software, and Procedures Required to Remediate Incidents — Changes in infrastructure, data, software, and procedures required to remediate incidents to continue to meet objectives are identified, and the change process is initiated upon identification.
      fr: Identifies Changes in Infrastructure, Data, Software, and Procedures Required to Remediate Incidents — Changes in infrastructure, data, software, and procedures required to remediate incidents to continue to meet objectives are identified, and the change process is initiated upon identification.
  - id: CC8.1.12
    control: CC8.1
    text:
      en: Creates Baseline Configuration of IT Technology — A baseline configuration of IT and control systems is created and maintained.
      fr: Creates Baseline Configuration of IT Technology — A baseline configuration of IT and control systems is created and maintained.
  - id: CC8.1.13
    control: CC8.1
    text:
      en: Provides for Changes Necessary in Emergency Situations — A process is in place for authorizing, designing, testing, approving and implementing changes necessary in emergency situations (that is, changes that need to be implemented in an urgent timeframe).
      fr: Provides for Changes Necessary in Emergency Situations — A process is in place for authorizing, designing, testing, approving and implementing changes necessary in emergency situations (that is, changes that need to be implemented in an urgent timeframe).
  - id: CC8.1.14
    control: CC8.1
    text:
      en: Protects Confidential Information — The entity protects confidential information during system design, development, testing, implementation, and change processes to meet the entity’s objectives related to confidentiality.
      fr: Protects Confidential Information — The entity protects confidential information during system design, development, testing, implementation, and change processes to meet the entity’s objectives related to confidentiality.
  - id: CC8.1.15
    control: CC8.1
    text:
      en: Protects Personal Information — The entity protects personal information during system design, development, testing, implementation, and change processes to meet the entity’s objectives related to privacy.
      fr: Protects Personal Information — The entity protects personal information during system design, development, testing, implementation, and change processes to meet the entity’s objectives related to privacy.
- code: CC9.1
  domain: CC9
  title:
    en: CC9.1
    fr: CC9.1
  description:
    en: The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions.
    fr: The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions.
  guidance:
    en: The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions.
    fr: The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions.
  requirements:
  - id: CC9.1.1
    control: CC9.1
    text:
      en: Considers Mitigation of Risks of Business Disruption — Risk mitigation activities include the development of planned policies, procedures, communications, and alternative processing solutions to respond to, mitigate, and recover from security events that disrupt business operations. Those policies and procedures include monitoring processes and information and communications to meet the entity's objectives during response, mitigation, and recovery efforts.
      fr: Considers Mitigation of Risks of Business Disruption — Risk mitigation activities include the development of planned policies, procedures, communications, and alternative processing solutions to respond to, mitigate, and recover from security events that disrupt business operations. Those policies and procedures include monitoring processes and information and communications to meet the entity's objectives during response, mitigation, and recovery efforts.
  - id: CC9.1.2
    control: CC9.1
    text:
      en: Considers the Use of Insurance to Mitigate Financial Impact Risks — The risk management activities consider the use of insurance to offset the financial impact of loss events that would otherwise impair the ability of the entity to meet its objectives.
      fr: Considers the Use of Insurance to Mitigate Financial Impact Risks — The risk management activities consider the use of insurance to offset the financial impact of loss events that would otherwise impair the ability of the entity to meet its objectives.
- code: CC9.2
  domain: CC9
  title:
    en: CC9.2
    fr: CC9.2
  description:
    en: The entity assesses and manages risks associated with vendors and business partners.
    fr: The entity assesses and manages risks associated with vendors and business partners.
  guidance:
    en: The entity assesses and manages risks associated with vendors and business partners.
    fr: The entity assesses and manages risks associated with vendors and business partners.
  requirements:
  - id: CC9.2.1
    control: CC9.2
    text:
      en: Establishes Requirements for Vendor and Business Partner Engagements — The entity establishes specific requirements for a vendor and business partner engagement that includes (1) scope of services and product specifications, (2) roles and responsibilities, (3) compliance requirements, and (4) service levels.
      fr: Establishes Requirements for Vendor and Business Partner Engagements — The entity establishes specific requirements for a vendor and business partner engagement that includes (1) scope of services and product specifications, (2) roles and responsibilities, (3) compliance requirements, and (4) service levels.
  - id: CC9.2.2
    control: CC9.2
    text:
      en: Assesses Vendor and Business Partner Risks — The entity assesses, on a periodic basis, the risks that vendors and business partners (and those entities’ vendors and business partners) represent to the achievement of the entity's objectives.
      fr: Assesses Vendor and Business Partner Risks — The entity assesses, on a periodic basis, the risks that vendors and business partners (and those entities’ vendors and business partners) represent to the achievement of the entity's objectives.
  - id: CC9.2.3
    control: CC9.2
    text:
      en: Assigns Responsibility and Accountability for Managing Vendors and Business Partners — The entity assigns responsibility and accountability for the management of risks associated with vendors and business partners.
      fr: Assigns Responsibility and Accountability for Managing Vendors and Business Partners — The entity assigns responsibility and accountability for the management of risks associated with vendors and business partners.
  - id: CC9.2.4
    control: CC9.2
    text:
      en: Establishes Communication Protocols for Vendors and Business Partners — The entity establishes communication and resolution protocols for service or product issues related to vendors and business partners.
      fr: Establishes Communication Protocols for Vendors and Business Partners — The entity establishes communication and resolution protocols for service or product issues related to vendors and business partners.
  - id: CC9.2.5
    control: CC9.2
    text:
      en: Establishes Exception Handling Procedures From Vendors and Business Partners — The entity establishes exception handling procedures for service or product issues related to vendors and business partners.
      fr: Establishes Exception Handling Procedures From Vendors and Business Partners — The entity establishes exception handling procedures for service or product issues related to vendors and business partners.
  - id: CC9.2.6
    control: CC9.2
    text:
      en: Assesses Vendor and Business Partner Performance — The entity periodically assesses the performance of vendors and business partners.
      fr: Assesses Vendor and Business Partner Performance — The entity periodically assesses the performance of vendors and business partners.
  - id: CC9.2.7
    control: CC9.2
    text:
      en: Implements Procedures for Addressing Issues Identified During Vendor and Business Partner Assessments — The entity implements procedures for addressing issues identified with vendor and business partner relationships.
      fr: Implements Procedures for Addressing Issues Identified During Vendor and Business Partner Assessments — The entity implements procedures for addressing issues identified with vendor and business partner relationships.
  - id: CC9.2.8
    control: CC9.2
    text:
      en: Implements Procedures for Terminating Vendor and Business Partner Relationships — The entity implements procedures for terminating vendor and business partner relationships.
      fr: Implements Procedures for Terminating Vendor and Business Partner Relationships — The entity implements procedures for terminating vendor and business partner relationships.
  - id: CC9.2.9
    control: CC9.2
    text:
      en: Obtains Confidentiality Commitments from Vendors and Business Partners — The entity obtains confidentiality commitments that are consistent with the entity’s confidentiality commitments and requirements from vendors and business partners who have access to confidential information.
      fr: Obtains Confidentiality Commitments from Vendors and Business Partners — The entity obtains confidentiality commitments that are consistent with the entity’s confidentiality commitments and requirements from vendors and business partners who have access to confidential information.
  - id: CC9.2.10
    control: CC9.2
    text:
      en: Assesses Compliance With Confidentiality Commitments of Vendors and Business Partners — On a periodic and as-needed basis, the entity assesses compliance by vendors and business partners with the entity’s confidentiality commitments and requirements.
      fr: Assesses Compliance With Confidentiality Commitments of Vendors and Business Partners — On a periodic and as-needed basis, the entity assesses compliance by vendors and business partners with the entity’s confidentiality commitments and requirements.
  - id: CC9.2.11
    control: CC9.2
    text:
      en: Obtains Privacy Commitments from Vendors and Business Partners — The entity obtains privacy commitments, consistent with the entity’s privacy commitments and requirements, from vendors and business partners who have access to personal information.
      fr: Obtains Privacy Commitments from Vendors and Business Partners — The entity obtains privacy commitments, consistent with the entity’s privacy commitments and requirements, from vendors and business partners who have access to personal information.
  - id: CC9.2.12
    control: CC9.2
    text:
      en: Assesses Compliance with Privacy Commitments of Vendors and Business Partners — On a periodic and as-needed basis, the entity assesses compliance by vendors and business partners with the entity’s privacy commitments and requirements and takes corrective action as necessary.
      fr: Assesses Compliance with Privacy Commitments of Vendors and Business Partners — On a periodic and as-needed basis, the entity assesses compliance by vendors and business partners with the entity’s privacy commitments and requirements and takes corrective action as necessary.
- code: A1.1
  domain: A
  title:
    en: A1.1
    fr: A1.1
  description:
    en: The entity maintains, monitors, and evaluates current processing capacity and use of system components (infrastructure, data, and software) to manage capacity demand and to enable the implementation of additional capacity to help meet its objectives.
    fr: The entity maintains, monitors, and evaluates current processing capacity and use of system components (infrastructure, data, and software) to manage capacity demand and to enable the implementation of additional capacity to help meet its objectives.
  guidance:
    en: The entity maintains, monitors, and evaluates current processing capacity and use of system components (infrastructure, data, and software) to manage capacity demand and to enable the implementation of additional capacity to help meet its objectives.
    fr: The entity maintains, monitors, and evaluates current processing capacity and use of system components (infrastructure, data, and software) to manage capacity demand and to enable the implementation of additional capacity to help meet its objectives.
  requirements:
  - id: A1.1.1
    control: A1.1
    text:
      en: Measures Current Usage — The use of the system components is measured to establish a baseline for capacity management and to use when evaluating the risk of impaired availability due to capacity constraints.
      fr: Measures Current Usage — The use of the system components is measured to establish a baseline for capacity management and to use when evaluating the risk of impaired availability due to capacity constraints.
  - id: A1.1.2
    control: A1.1
    text:
      en: Forecasts Capacity — The expected average and peak use of system components is forecasted and compared to system capacity and associated tolerances. Forecasting considers capacity in the event of the failure of system components that constrain capacity.
      fr: Forecasts Capacity — The expected average and peak use of system components is forecasted and compared to system capacity and associated tolerances. Forecasting considers capacity in the event of the failure of system components that constrain capacity.
  - id: A1.1.3
    control: A1.1
    text:
      en: Makes Changes Based on Forecasts — The system change management process is initiated when forecasted usage exceeds capacity tolerances.
      fr: Makes Changes Based on Forecasts — The system change management process is initiated when forecasted usage exceeds capacity tolerances.
- code: A1.2
  domain: A
  title:
    en: A1.2
    fr: A1.2
  description:
    en: The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data back-up processes, and recovery infrastructure to meet its objectives.
    fr: The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data back-up processes, and recovery infrastructure to meet its objectives.
  guidance:
    en: The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data back-up processes, and recovery infrastructure to meet its objectives.
    fr: The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data back-up processes, and recovery infrastructure to meet its objectives.
  requirements:
  - id: A1.2.1
    control: A1.2
    text:
      en: Identifies Environmental Threats — As part of the risk assessment process, management identifies environmental threats that could impair the availability of the system, including threats resulting from adverse weather, failure of environmental control systems, electrical discharge, fire, and water.
      fr: Identifies Environmental Threats — As part of the risk assessment process, management identifies environmental threats that could impair the availability of the system, including threats resulting from adverse weather, failure of environmental control systems, electrical discharge, fire, and water.
  - id: A1.2.2
    control: A1.2
    text:
      en: Designs Detection Measures — Detection measures are implemented to identify anomalies that could result from environmental threat events.
      fr: Designs Detection Measures — Detection measures are implemented to identify anomalies that could result from environmental threat events.
  - id: A1.2.3
    control: A1.2
    text:
      en: Implements and Maintains Environmental Protection Mechanisms — Management implements and maintains environmental protection mechanisms to prevent and mitigate against environmental events.
      fr: Implements and Maintains Environmental Protection Mechanisms — Management implements and maintains environmental protection mechanisms to prevent and mitigate against environmental events.
  - id: A1.2.4
    control: A1.2
    text:
      en: Implements Alerts to Analyze Anomalies — Management implements alerts that are communicated to personnel for analysis to identify environmental threat events.
      fr: Implements Alerts to Analyze Anomalies — Management implements alerts that are communicated to personnel for analysis to identify environmental threat events.
  - id: A1.2.5
    control: A1.2
    text:
      en: Responds to Environmental Threat Events — Procedures are in place for responding to environmental threat events and for evaluating the effectiveness of those policies and procedures on a periodic basis. This includes automatic mitigation systems (for example, uninterruptable power system and generator back-up subsystem).
      fr: Responds to Environmental Threat Events — Procedures are in place for responding to environmental threat events and for evaluating the effectiveness of those policies and procedures on a periodic basis. This includes automatic mitigation systems (for example, uninterruptable power system and generator back-up subsystem).
  - id: A1.2.6
    control: A1.2
    text:
      en: Communicates and Reviews Detected Environmental Threat Events — Detected environmental threat events are communicated to and reviewed by the individuals responsible for the management of the system, and actions are taken, if necessary.
      fr: Communicates and Reviews Detected Environmental Threat Events — Detected environmental threat events are communicated to and reviewed by the individuals responsible for the management of the system, and actions are taken, if necessary.
  - id: A1.2.7
    control: A1.2
    text:
      en: Determines Data Requiring Backup — Data is evaluated to determine whether backup is required.
      fr: Determines Data Requiring Backup — Data is evaluated to determine whether backup is required.
  - id: A1.2.8
    control: A1.2
    text:
      en: Performs Data Backup — Procedures are in place for backing up data, monitoring to detect back-up failures, and initiating corrective action when such failures occur.
      fr: Performs Data Backup — Procedures are in place for backing up data, monitoring to detect back-up failures, and initiating corrective action when such failures occur.
  - id: A1.2.9
    control: A1.2
    text:
      en: Addresses Offsite Storage — Back-up data is stored in a location at a distance from its principal storage location sufficient that the likelihood of a security or environmental threat event affecting both sets of data is reduced to an appropriate level.
      fr: Addresses Offsite Storage — Back-up data is stored in a location at a distance from its principal storage location sufficient that the likelihood of a security or environmental threat event affecting both sets of data is reduced to an appropriate level.
  - id: A1.2.10
    control: A1.2
    text:
      en: Implements Alternate Processing Infrastructure — Measures are implemented for migrating processing to alternate infrastructure in the event normal processing infrastructure becomes unavailable.
      fr: Implements Alternate Processing Infrastructure — Measures are implemented for migrating processing to alternate infrastructure in the event normal processing infrastructure becomes unavailable.
- code: A1.3
  domain: A
  title:
    en: A1.3
    fr: A1.3
  description:
    en: The entity tests recovery plan procedures supporting system recovery to meet its objectives.
    fr: The entity tests recovery plan procedures supporting system recovery to meet its objectives.
  guidance:
    en: The entity tests recovery plan procedures supporting system recovery to meet its objectives.
    fr: The entity tests recovery plan procedures supporting system recovery to meet its objectives.
  requirements:
  - id: A1.3.1
    control: A1.3
    text:
      en: Implements Business Continuity Plan Testing — Business continuity plan testing is performed on a periodic basis. The testing includes (1) development of testing scenarios based on threat likelihood and magnitude; (2) consideration of system components from across the entity that can impair the availability; (3) scenarios that consider the potential for the lack of availability of key personnel; and (4) revision of continuity plans and systems based on test results.
      fr: Implements Business Continuity Plan Testing — Business continuity plan testing is performed on a periodic basis. The testing includes (1) development of testing scenarios based on threat likelihood and magnitude; (2) consideration of system components from across the entity that can impair the availability; (3) scenarios that consider the potential for the lack of availability of key personnel; and (4) revision of continuity plans and systems based on test results.
  - id: A1.3.2
    control: A1.3
    text:
      en: Tests Integrity and Completeness of Back-Up Data — The integrity and completeness of back-up information is tested on a periodic basis.
      fr: Tests Integrity and Completeness of Back-Up Data — The integrity and completeness of back-up information is tested on a periodic basis.
- code: C1.1
  domain: C
  title:
    en: C1.1
    fr: C1.1
  description:
    en: The entity identifies and maintains confidential information to meet the entity’s objectives related to confidentiality.
    fr: The entity identifies and maintains confidential information to meet the entity’s objectives related to confidentiality.
  guidance:
    en: The entity identifies and maintains confidential information to meet the entity’s objectives related to confidentiality.
    fr: The entity identifies and maintains confidential information to meet the entity’s objectives related to confidentiality.
  requirements:
  - id: C1.1.1
    control: C1.1
    text:
      en: Identifies Confidential information — Procedures are in place to identify and designate confidential information when it is received or created and to determine the period over which the confidential information is to be retained.
      fr: Identifies Confidential information — Procedures are in place to identify and designate confidential information when it is received or created and to determine the period over which the confidential information is to be retained.
  - id: C1.1.2
    control: C1.1
    text:
      en: Protects Confidential Information from Destruction — Procedures are in place to protect confidential information from erasure or destruction during the specified retention period of the information.
      fr: Protects Confidential Information from Destruction — Procedures are in place to protect confidential information from erasure or destruction during the specified retention period of the information.
- code: C1.2
  domain: C
  title:
    en: C1.2
    fr: C1.2
  description:
    en: The entity disposes of confidential information to meet the entity’s objectives related to confidentiality.
    fr: The entity disposes of confidential information to meet the entity’s objectives related to confidentiality.
  guidance:
    en: The entity disposes of confidential information to meet the entity’s objectives related to confidentiality.
    fr: The entity disposes of confidential information to meet the entity’s objectives related to confidentiality.
  requirements:
  - id: C1.2.1
    control: C1.2
    text:
      en: Identifies Confidential Information for Destruction — Procedures are in place to identify confidential information requiring destruction when the end of the retention period is reached.
      fr: Identifies Confidential Information for Destruction — Procedures are in place to identify confidential information requiring destruction when the end of the retention period is reached.
  - id: C1.2.2
    control: C1.2
    text:
      en: Destroys Confidential Information — Procedures are in place to erase or otherwise destroy confidential information that has been identified for destruction.
      fr: Destroys Confidential Information — Procedures are in place to erase or otherwise destroy confidential information that has been identified for destruction.
- code: PI1.1
  domain: PI1
  title:
    en: PI1.1
    fr: PI1.1
  description:
    en: The entity obtains or generates, uses, and communicates relevant, quality information regarding the objectives related to processing, including definitions of data processed and product and service specifications, to support the use of products and services.
    fr: The entity obtains or generates, uses, and communicates relevant, quality information regarding the objectives related to processing, including definitions of data processed and product and service specifications, to support the use of products and services.
  guidance:
    en: The entity obtains or generates, uses, and communicates relevant, quality information regarding the objectives related to processing, including definitions of data processed and product and service specifications, to support the use of products and services.
    fr: The entity obtains or generates, uses, and communicates relevant, quality information regarding the objectives related to processing, including definitions of data processed and product and service specifications, to support the use of products and services.
  requirements:
  - id: PI1.1.1
    control: PI1.1
    text:
      en: Identifies Information Specifications — The entity identifies information specifications required to support the use of products and services.
      fr: Identifies Information Specifications — The entity identifies information specifications required to support the use of products and services.
  - id: PI1.1.2
    control: PI1.1
    text:
      en: 'Defines Data Necessary to Support a Product or Service — When data is provided as part of a service or product or as part of a reporting obligation related to a product or service: —  1. The definition of the data is available to the users of the data —  2. The definition of the data includes the following information: —  a. The population of events or instances included in the data —  b. The nature of each element (for example, field) of the data (that is, the event or instance to which the data element relates, for example, transaction price of a sale of XYZ Corporation stock for the last trade in that stock on a given day) —  c. Source(s) of the data —  d. The unit(s) of measurement of data elements (for example, fields) —  e. The accuracy/correctness/precision of measurement —  f. The uncertainty or confidence interval inherent in each data element and in the population of those elements —  g. The date the data was observed or the period of time during which the events relevant
        to the data occurred —  h. The factors in addition to the date and period of time used to determine the inclusion and exclusion of items in the data elements and population —  3. The definition is complete and accurate. —  4. The description of the data identifies any information that is necessary to understand each data element and the population in a manner consistent with its definition and intended purpose (meta-data) that has not been included within the data.'
      fr: 'Defines Data Necessary to Support a Product or Service — When data is provided as part of a service or product or as part of a reporting obligation related to a product or service: —  1. The definition of the data is available to the users of the data —  2. The definition of the data includes the following information: —  a. The population of events or instances included in the data —  b. The nature of each element (for example, field) of the data (that is, the event or instance to which the data element relates, for example, transaction price of a sale of XYZ Corporation stock for the last trade in that stock on a given day) —  c. Source(s) of the data —  d. The unit(s) of measurement of data elements (for example, fields) —  e. The accuracy/correctness/precision of measurement —  f. The uncertainty or confidence interval inherent in each data element and in the population of those elements —  g. The date the data was observed or the period of time during which the events relevant
        to the data occurred —  h. The factors in addition to the date and period of time used to determine the inclusion and exclusion of items in the data elements and population —  3. The definition is complete and accurate. —  4. The description of the data identifies any information that is necessary to understand each data element and the population in a manner consistent with its definition and intended purpose (meta-data) that has not been included within the data.'
