- code: P1.1
  domain: P
  title:
    en: P1.1
    fr: P1.1
  description:
    en: The entity provides notice to data subjects about its privacy practices to meet the entity’s objectives related to privacy. The notice is updated and communicated to data subjects in a timely manner for changes to the entity’s privacy practices, including changes in the use of personal information, to meet the entity’s objectives related to privacy.
    fr: The entity provides notice to data subjects about its privacy practices to meet the entity’s objectives related to privacy. The notice is updated and communicated to data subjects in a timely manner for changes to the entity’s privacy practices, including changes in the use of personal information, to meet the entity’s objectives related to privacy.
  guidance:
    en: The entity provides notice to data subjects about its privacy practices to meet the entity’s objectives related to privacy. The notice is updated and communicated to data subjects in a timely manner for changes to the entity’s privacy practices, including changes in the use of personal information, to meet the entity’s objectives related to privacy.
    fr: The entity provides notice to data subjects about its privacy practices to meet the entity’s objectives related to privacy. The notice is updated and communicated to data subjects in a timely manner for changes to the entity’s privacy practices, including changes in the use of personal information, to meet the entity’s objectives related to privacy.
  requirements:
  - id: P1.1.1
    control: P1.1
    text:
      en: 'Communicates to Data Subjects — Notice is provided to data subjects regarding the following: — — Purpose for collecting personal information — — Choice and consent — — Types of personal information collected — — Methods of collection (for example, use of cookies or other tracking techniques) — — Use, retention, and disposal — — Access — — Disclosure to third parties — — Security for privacy — — Quality, including data subjects’ responsibilities for quality — — Monitoring and enforcement — If personal information is collected from sources other than the individual, such sources are described in the privacy notice.'
      fr: 'Communicates to Data Subjects — Notice is provided to data subjects regarding the following: — — Purpose for collecting personal information — — Choice and consent — — Types of personal information collected — — Methods of collection (for example, use of cookies or other tracking techniques) — — Use, retention, and disposal — — Access — — Disclosure to third parties — — Security for privacy — — Quality, including data subjects’ responsibilities for quality — — Monitoring and enforcement — If personal information is collected from sources other than the individual, such sources are described in the privacy notice.'
  - id: P1.1.2
    control: P1.1
    text:
      en: Provides Notice to Data Subjects — Notice is provided to data subjects (1) at or before the time personal information is collected or as soon as practical thereafter, (2) at or before the entity changes its privacy notice or as soon as practical thereafter, or (3) before personal information is used for new purposes not previously identified.
      fr: Provides Notice to Data Subjects — Notice is provided to data subjects (1) at or before the time personal information is collected or as soon as practical thereafter, (2) at or before the entity changes its privacy notice or as soon as practical thereafter, or (3) before personal information is used for new purposes not previously identified.
