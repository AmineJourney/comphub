    en: This control ensures employees can promptly report information security events. Measures include incident reporting channels, awareness campaigns, and follow-up procedures to investigate and address reported events.
    fr: Cette mesure de sécurité garantit que les employés peuvent signaler rapidement les événements de sécurité de l'information. Les mesures incluent des canaux de signalement d'incidents, des campagnes de sensibilisation et des procédures de suivi pour enquêter et traiter les événements signalés.
