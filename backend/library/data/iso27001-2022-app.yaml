    en: Confidentiality or non-disclosure agreements
    fr: Accords de confidentialité ou de non-divulgation
  description:
    en: This control implements confidentiality or non-disclosure agreements to protect sensitive information. Measures include signed agreements at the start of employment, periodic reminders, and enforcement of legal actions in case of violations.
    fr: Cette mesure de sécurité met en œuvre des accords de confidentialité ou de non-divulgation pour protéger les informations sensibles. Les mesures incluent des accords signés au début de l'emploi, des rappels périodiques et l'application d'actions légales en cas de violations.
