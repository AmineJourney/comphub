    en: Responsibilities after termination or change of employment
    fr: Responsabilités après la fin ou le changement d'emploi
  description:
    en: This control ensures that responsibilities related to information security are defined and enforced after termination or role changes. Measures include revoking access rights, collecting organizational assets, and conducting exit interviews.
    fr: Cette mesure de sécurité garantit que les responsabilités liées à la sécurité de l'information sont définies et appliquées après la fin d’un contrat ou un changement de rôle. Les mesures incluent la révocation des droits d'accès, la récupération des actifs de l'organisation et la réalisation d'entretiens de sortie.
