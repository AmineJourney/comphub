controls:
- code: '4.1'
  domain: core
  title:
    en: Understanding the organization and its context
    fr: Compréhension de l'organisation et de son contexte
  description:
    en: Identify internal and external factors that influence the organization’s ability to achieve information security objectives, ensuring the ISMS is aligned with its context.
    fr: Identifier les facteurs internes et externes qui influencent la capacité de l’organisation à atteindre ses objectifs de sécurité de l’information, en veillant à ce que le SMSI soit aligné sur son contexte.
  guidance:
    en: Identify internal and external factors that influence the organization’s ability to achieve information security objectives, ensuring the ISMS is aligned with its context.
    fr: Identifier les facteurs internes et externes qui influencent la capacité de l’organisation à atteindre ses objectifs de sécurité de l’information, en veillant à ce que le SMSI soit aligné sur son contexte.
  requirements: []
- code: '4.2'
  domain: core
  title:
    en: Understanding the needs and expectations of interested parties
    fr: Compréhension des besoins et attentes des parties intéressées
  description:
    en: Analyze the needs and expectations of interested parties to incorporate them into the ISMS and address relevant information security requirements.
    fr: Analyser les besoins et attentes des parties intéressées pour les intégrer dans le SMSI et répondre aux exigences pertinentes en matière de sécurité de l’information.
  guidance:
    en: Analyze the needs and expectations of interested parties to incorporate them into the ISMS and address relevant information security requirements.
    fr: Analyser les besoins et attentes des parties intéressées pour les intégrer dans le SMSI et répondre aux exigences pertinentes en matière de sécurité de l’information.
  requirements: []
- code: '4.3'
  domain: core
  title:
    en: Determining the scope of the information security management system
    fr: Détermination du domaine d'application du système de management de la sécurité de l'information
  description:
    en: Define the scope of the ISMS by considering internal and external factors, stakeholder needs, and dependencies within the operational environment.
    fr: Définir le périmètre du SMSI en prenant en compte les facteurs internes et externes, les besoins des parties prenantes et les dépendances dans l’environnement opérationnel.
  guidance:
    en: Define the scope of the ISMS by considering internal and external factors, stakeholder needs, and dependencies within the operational environment.
    fr: Définir le périmètre du SMSI en prenant en compte les facteurs internes et externes, les besoins des parties prenantes et les dépendances dans l’environnement opérationnel.
  requirements: []
- code: '4.4'
  domain: core
  title:
    en: Information security management system
    fr: Système de management de la sécurité de l'information
  description:
    en: Build, run, and continually improve an ISMS to effectively manage information security risks and meet organizational goals.
    fr: Concevoir, exploiter et améliorer en continu un SMSI pour gérer efficacement les risques de sécurité de l’information et atteindre les objectifs organisationnels.
  guidance:
    en: Build, run, and continually improve an ISMS to effectively manage information security risks and meet organizational goals.
    fr: Concevoir, exploiter et améliorer en continu un SMSI pour gérer efficacement les risques de sécurité de l’information et atteindre les objectifs organisationnels.
  requirements: []
- code: '5.1'
  domain: core
  title:
    en: Leadership and commitment
    fr: Leadership et engagement
  description:
    en: Demonstrate leadership and commitment by supporting the ISMS, aligning it with organizational objectives, allocating resources, promoting a security culture, and driving continual improvement.
    fr: Démontrer un leadership et un engagement en soutenant le SMSI, en l'alignant sur les objectifs organisationnels, en allouant des ressources, en promouvant une culture de sécurité et en favorisant l'amélioration continue.
  guidance:
    en: Demonstrate leadership and commitment by supporting the ISMS, aligning it with organizational objectives, allocating resources, promoting a security culture, and driving continual improvement.
    fr: Démontrer un leadership et un engagement en soutenant le SMSI, en l'alignant sur les objectifs organisationnels, en allouant des ressources, en promouvant une culture de sécurité et en favorisant l'amélioration continue.
  requirements: []
- code: '5.2'
  domain: core
  title:
    en: Policy
    fr: Politique
  description:
    en: Establish an information security policy aligned with the organization's objectives and strategic direction, outlining commitments to compliance, continual improvement, and the promotion of information security.
    fr: Établir une politique de sécurité de l’information alignée sur les objectifs et la direction stratégique de l'organisation, précisant les engagements en matière de conformité, d'amélioration continue et de promotion de la sécurité de l’information.
  guidance:
    en: Establish an information security policy aligned with the organization's objectives and strategic direction, outlining commitments to compliance, continual improvement, and the promotion of information security.
    fr: Établir une politique de sécurité de l’information alignée sur les objectifs et la direction stratégique de l'organisation, précisant les engagements en matière de conformité, d'amélioration continue et de promotion de la sécurité de l’information.
  requirements: []
- code: '5.3'
  domain: core
  title:
    en: Organizational roles, responsibilities and authorities
    fr: Rôles, responsabilités et autorités au sein de l'organisation
  description:
    en: Define, assign, and communicate roles, responsibilities, and authorities to ensure the effective implementation and operation of the ISMS, with accountability aligned to organizational objectives.
    fr: Définir, attribuer et communiquer les rôles, responsabilités et autorités pour assurer la mise en œuvre et le fonctionnement efficaces du SMSI, avec une responsabilité alignée sur les objectifs organisationnels.
  guidance:
    en: Define, assign, and communicate roles, responsibilities, and authorities to ensure the effective implementation and operation of the ISMS, with accountability aligned to organizational objectives.
    fr: Définir, attribuer et communiquer les rôles, responsabilités et autorités pour assurer la mise en œuvre et le fonctionnement efficaces du SMSI, avec une responsabilité alignée sur les objectifs organisationnels.
  requirements: []
- code: 6.1.1
  domain: core
  title:
    en: General
    fr: Généralités
  description:
    en: Establish a process to identify information security risks and opportunities, considering internal and external factors, stakeholder needs, and applicable requirements to ensure the ISMS achieves its objectives.
    fr: Établir un processus pour identifier les risques et opportunités en matière de sécurité de l’information, en prenant en compte les facteurs internes et externes, les besoins des parties prenantes et les exigences applicables, afin d’assurer que le SMSI atteigne ses objectifs.
  guidance:
    en: Establish a process to identify information security risks and opportunities, considering internal and external factors, stakeholder needs, and applicable requirements to ensure the ISMS achieves its objectives.
    fr: Établir un processus pour identifier les risques et opportunités en matière de sécurité de l’information, en prenant en compte les facteurs internes et externes, les besoins des parties prenantes et les exigences applicables, afin d’assurer que le SMSI atteigne ses objectifs.
  requirements: []
- code: 6.1.2
  domain: core
  title:
    en: Information security risk assessment requirement
    fr: Appréciation des risques de sécurité de l'information
  description:
    en: Establish a process to assess information security risks at planned intervals, using defined criteria to evaluate threats to confidentiality, integrity, and availability, ensuring consistent and reliable results.
    fr: Établir un processus pour évaluer les risques liés à la sécurité de l’information à des intervalles planifiés, en utilisant des critères définis pour évaluer les menaces sur la confidentialité, l’intégrité et la disponibilité, garantissant des résultats cohérents et fiables.
  guidance:
    en: Establish a process to assess information security risks at planned intervals, using defined criteria to evaluate threats to confidentiality, integrity, and availability, ensuring consistent and reliable results.
    fr: Établir un processus pour évaluer les risques liés à la sécurité de l’information à des intervalles planifiés, en utilisant des critères définis pour évaluer les menaces sur la confidentialité, l’intégrité et la disponibilité, garantissant des résultats cohérents et fiables.
  requirements: []
- code: 6.1.3
  domain: core
  title:
    en: Information security risk treatment
    fr: Traitement des risques de sécurité de l'information
  description:
    en: Define a process to address identified information security risks by selecting appropriate controls, ensuring alignment with risk acceptance criteria, and documenting them in a risk treatment plan.
    fr: Définir un processus pour traiter les risques identifiés en matière de sécurité de l’information en sélectionnant des contrôles appropriés, en assurant leur alignement avec les critères d’acceptation des risques et en les documentant dans un plan de traitement des risques.
  guidance:
    en: Define a process to address identified information security risks by selecting appropriate controls, ensuring alignment with risk acceptance criteria, and documenting them in a risk treatment plan.
    fr: Définir un processus pour traiter les risques identifiés en matière de sécurité de l’information en sélectionnant des contrôles appropriés, en assurant leur alignement avec les critères d’acceptation des risques et en les documentant dans un plan de traitement des risques.
  requirements: []
- code: '6.2'
  domain: core
  title:
    en: Information security objectives and planning to achieve them
    fr: Objectifs de sécurité de l'information et plans pour les atteindre
  description:
    en: Set measurable information security objectives aligned with the ISMS and strategic goals, and plan actions detailing responsibilities, resources, timelines, and evaluation methods to achieve them.
    fr: Définir des objectifs mesurables en matière de sécurité de l’information alignés sur le SMSI et les objectifs stratégiques, et planifier des actions détaillant les responsabilités, les ressources, les échéances et les méthodes d’évaluation pour les atteindre.
  guidance:
    en: Set measurable information security objectives aligned with the ISMS and strategic goals, and plan actions detailing responsibilities, resources, timelines, and evaluation methods to achieve them.
    fr: Définir des objectifs mesurables en matière de sécurité de l’information alignés sur le SMSI et les objectifs stratégiques, et planifier des actions détaillant les responsabilités, les ressources, les échéances et les méthodes d’évaluation pour les atteindre.
  requirements: []
- code: '6.3'
  domain: core
  title:
    en: Planning for changes
    fr: Planification des modifications
  description:
    en: Plan changes to the ISMS systematically to ensure alignment with information security requirements, seamless integration into existing processes, and effective risk management.
    fr: Planifier les changements au SMSI de manière systématique pour garantir leur alignement avec les exigences de sécurité de l’information, leur intégration transparente dans les processus existants et une gestion efficace des risques.
  guidance:
    en: Plan changes to the ISMS systematically to ensure alignment with information security requirements, seamless integration into existing processes, and effective risk management.
    fr: Planifier les changements au SMSI de manière systématique pour garantir leur alignement avec les exigences de sécurité de l’information, leur intégration transparente dans les processus existants et une gestion efficace des risques.
  requirements: []
- code: '7.1'
  domain: core
  title:
    en: Resources
    fr: Ressources
  description:
    en: Provide the necessary resources to build, run, and continually improve the ISMS, ensuring its effective operation and alignment with organizational goals.
    fr: Fournir les ressources nécessaires pour construire, exploiter et améliorer en continu le SMSI, en garantissant son fonctionnement efficace et son alignement avec les objectifs organisationnels.
  guidance:
    en: Provide the necessary resources to build, run, and continually improve the ISMS, ensuring its effective operation and alignment with organizational goals.
    fr: Fournir les ressources nécessaires pour construire, exploiter et améliorer en continu le SMSI, en garantissant son fonctionnement efficace et son alignement avec les objectifs organisationnels.
  requirements: []
- code: '7.2'
  domain: core
  title:
    en: Competence
    fr: Compétences
  description:
    en: Ensure personnel involved in the ISMS possess the necessary competence through appropriate education, training, or experience to fulfill their responsibilities effectively.
    fr: Garantir que le personnel impliqué dans le SMSI dispose des compétences nécessaires grâce à une formation, une éducation ou une expérience appropriées pour remplir efficacement leurs responsabilités.
  guidance:
    en: Ensure personnel involved in the ISMS possess the necessary competence through appropriate education, training, or experience to fulfill their responsibilities effectively.
    fr: Garantir que le personnel impliqué dans le SMSI dispose des compétences nécessaires grâce à une formation, une éducation ou une expérience appropriées pour remplir efficacement leurs responsabilités.
  requirements: []
- code: '7.3'
  domain: core
  title:
    en: Awareness
    fr: Sensibilisation
  description:
    en: Promote awareness among relevant personnel about the ISMS, their role in information security, and the importance of compliance with security policies and requirements.
    fr: Promouvoir la sensibilisation du personnel concerné au SMSI, à leur rôle dans la sécurité de l’information et à l’importance de se conformer aux politiques et exigences de sécurité.
  guidance:
    en: Promote awareness among relevant personnel about the ISMS, their role in information security, and the importance of compliance with security policies and requirements.
    fr: Promouvoir la sensibilisation du personnel concerné au SMSI, à leur rôle dans la sécurité de l’information et à l’importance de se conformer aux politiques et exigences de sécurité.
  requirements: []
- code: '7.4'
  domain: core
  title:
    en: Communication
    fr: Communication
  description:
    en: Establish effective internal and external communication processes, ensuring the timely and appropriate exchange of information relevant to the ISMS and its objectives.
    fr: Établir des processus de communication internes et externes efficaces, assurant un échange d’informations opportun et approprié en lien avec le SMSI et ses objectifs.
  guidance:
    en: Establish effective internal and external communication processes, ensuring the timely and appropriate exchange of information relevant to the ISMS and its objectives.
    fr: Établir des processus de communication internes et externes efficaces, assurant un échange d’informations opportun et approprié en lien avec le SMSI et ses objectifs.
  requirements: []
- code: 7.5.1
  domain: core
  title:
    en: General
    fr: Généralités
  description:
    en: Document the ISMS as needed to ensure effective planning, operation, control of processes, and alignment with organizational requirements.
    fr: Documenter le SMSI selon les besoins pour garantir une planification efficace, le fonctionnement, le contrôle des processus et l’alignement avec les exigences organisationnelles.
  guidance:
    en: Document the ISMS as needed to ensure effective planning, operation, control of processes, and alignment with organizational requirements.
    fr: Documenter le SMSI selon les besoins pour garantir une planification efficace, le fonctionnement, le contrôle des processus et l’alignement avec les exigences organisationnelles.
  requirements: []
- code: 7.5.2
  domain: core
  title:
    en: Creating and Updating documented information
    fr: Création et mise à jour
  description:
    en: Ensure ISMS documentation is appropriately created, updated, and controlled, including proper approval and version management.
    fr: S’assurer que la documentation du SMSI est correctement créée, mise à jour et contrôlée, y compris avec une approbation et une gestion des versions appropriées.
  guidance:
    en: Ensure ISMS documentation is appropriately created, updated, and controlled, including proper approval and version management.
    fr: S’assurer que la documentation du SMSI est correctement créée, mise à jour et contrôlée, y compris avec une approbation et une gestion des versions appropriées.
  requirements: []
- code: 7.5.3
  domain: core
  title:
    en: Control of documented information
    fr: Contrôle des informations documentées
  description:
    en: Make ISMS documentation accessible and usable for those who need it, while protecting it from unauthorized access or loss.
    fr: Rendre la documentation du SMSI accessible et utilisable pour ceux qui en ont besoin, tout en la protégeant contre tout accès non autorisé ou perte.
  guidance:
    en: Make ISMS documentation accessible and usable for those who need it, while protecting it from unauthorized access or loss.
    fr: Rendre la documentation du SMSI accessible et utilisable pour ceux qui en ont besoin, tout en la protégeant contre tout accès non autorisé ou perte.
  requirements: []
- code: '8.1'
  domain: core
  title:
    en: Operational planning and control
    fr: Planification et contrôle opérationnels
  description:
    en: Plan and control ISMS processes, ensuring consistency with requirements and making necessary adjustments to address risks and opportunities.
    fr: Planifier et contrôler les processus du SMSI, en garantissant leur cohérence avec les exigences et en apportant les ajustements nécessaires pour traiter les risques et opportunités.
  guidance:
    en: Plan and control ISMS processes, ensuring consistency with requirements and making necessary adjustments to address risks and opportunities.
    fr: Planifier et contrôler les processus du SMSI, en garantissant leur cohérence avec les exigences et en apportant les ajustements nécessaires pour traiter les risques et opportunités.
  requirements: []
- code: '8.2'
  domain: core
  title:
    en: Information security risk assessment
    fr: Appréciation des risques de sécurité de l'information
  description:
    en: Implement the risk assessment process to identify, evaluate, and prioritize information security risks as defined in the ISMS framework.
    fr: Mettre en œuvre le processus d’évaluation des risques pour identifier, évaluer et prioriser les risques liés à la sécurité de l’information, tel que défini dans le cadre du SMSI.
  guidance:
    en: Implement the risk assessment process to identify, evaluate, and prioritize information security risks as defined in the ISMS framework.
    fr: Mettre en œuvre le processus d’évaluation des risques pour identifier, évaluer et prioriser les risques liés à la sécurité de l’information, tel que défini dans le cadre du SMSI.
  requirements: []
- code: '8.3'
  domain: core
  title:
    en: Information security risk treatment
    fr: Traitement des risques de sécurité de l'information
  description:
    en: Apply the risk treatment process by selecting and implementing appropriate controls to address identified risks, ensuring alignment with the organization’s risk acceptance criteria.
    fr: Appliquer le processus de traitement des risques en sélectionnant et en mettant en œuvre des contrôles appropriés pour traiter les risques identifiés, en assurant leur alignement avec les critères d’acceptation des risques de l’organisation.
  guidance:
    en: Apply the risk treatment process by selecting and implementing appropriate controls to address identified risks, ensuring alignment with the organization’s risk acceptance criteria.
    fr: Appliquer le processus de traitement des risques en sélectionnant et en mettant en œuvre des contrôles appropriés pour traiter les risques identifiés, en assurant leur alignement avec les critères d’acceptation des risques de l’organisation.
  requirements: []
- code: '9.1'
  domain: core
  title:
    en: Monitoring, measurement, analysis, evaluation
    fr: Surveillance, mesurages, analyse et évaluation
  description:
    en: Monitor, measure, analyze, and evaluate the ISMS’s performance and effectiveness using appropriate methods aligned with the organization’s objectives.
    fr: Surveiller, mesurer, analyser et évaluer la performance et l’efficacité du SMSI en utilisant des méthodes appropriées alignées sur les objectifs de l’organisation.
  guidance:
    en: Monitor, measure, analyze, and evaluate the ISMS’s performance and effectiveness using appropriate methods aligned with the organization’s objectives.
    fr: Surveiller, mesurer, analyser et évaluer la performance et l’efficacité du SMSI en utilisant des méthodes appropriées alignées sur les objectifs de l’organisation.
  requirements: []
- code: 9.2.1
  domain: core
  title:
    en: General
    fr: Généralités
  description:
    en: Conduct internal audits at planned intervals to ensure the ISMS complies with ISO/IEC 27001 requirements and is effectively implemented and maintained.
    fr: Effectuer des audits internes à des intervalles planifiés pour garantir que le SMSI est conforme aux exigences de l’ISO/CEI 27001 et qu’il est efficacement mis en œuvre et maintenu.
  guidance:
    en: Conduct internal audits at planned intervals to ensure the ISMS complies with ISO/IEC 27001 requirements and is effectively implemented and maintained.
    fr: Effectuer des audits internes à des intervalles planifiés pour garantir que le SMSI est conforme aux exigences de l’ISO/CEI 27001 et qu’il est efficacement mis en œuvre et maintenu.
  requirements: []
- code: 9.2.2
  domain: core
  title:
    en: Internal audit programme
    fr: Programme d'audit interne
  description:
    en: Plan and perform internal audits, including defining criteria, scope, methods, and responsibilities, and report the results to relevant management.
    fr: Planifier et réaliser des audits internes, y compris la définition des critères, du périmètre, des méthodes et des responsabilités, et rapporter les résultats à la direction concernée.
  guidance:
    en: Plan and perform internal audits, including defining criteria, scope, methods, and responsibilities, and report the results to relevant management.
    fr: Planifier et réaliser des audits internes, y compris la définition des critères, du périmètre, des méthodes et des responsabilités, et rapporter les résultats à la direction concernée.
  requirements: []
- code: 9.3.1
  domain: core
  title:
    en: General
    fr: Généralités
  description:
    en: Review the ISMS periodically to ensure its suitability, adequacy, and effectiveness in achieving organizational objectives.
    fr: Examiner le SMSI périodiquement pour s’assurer de son adéquation, de son efficacité et de sa capacité à atteindre les objectifs organisationnels.
  guidance:
    en: Review the ISMS periodically to ensure its suitability, adequacy, and effectiveness in achieving organizational objectives.
    fr: Examiner le SMSI périodiquement pour s’assurer de son adéquation, de son efficacité et de sa capacité à atteindre les objectifs organisationnels.
  requirements: []
- code: 9.3.2
  domain: core
  title:
    en: Management review inputs
    fr: Eléments d'entrée de la revue de direction
  description:
    en: Include inputs such as audit results, ISMS performance, risk status, improvement opportunities, and required changes in the management review.
    fr: Inclure des éléments tels que les résultats d’audits, la performance du SMSI, l’état des risques, les opportunités d’amélioration et les changements nécessaires dans la revue de direction.
  guidance:
    en: Include inputs such as audit results, ISMS performance, risk status, improvement opportunities, and required changes in the management review.
    fr: Inclure des éléments tels que les résultats d’audits, la performance du SMSI, l’état des risques, les opportunités d’amélioration et les changements nécessaires dans la revue de direction.
  requirements: []
- code: 9.3.3
  domain: core
  title:
    en: Management review results
    fr: Résultats des revues de direction
  description:
    en: Document the results of the management reviews, including decisions on improvements, ISMS changes, and resource requirements.
    fr: Documenter les résultats des revues de direction, y compris les décisions sur les améliorations, les modifications du SMSI et les besoins en ressources.
  guidance:
    en: Document the results of the management reviews, including decisions on improvements, ISMS changes, and resource requirements.
    fr: Documenter les résultats des revues de direction, y compris les décisions sur les améliorations, les modifications du SMSI et les besoins en ressources.
  requirements: []
- code: '10.1'
  domain: core
  title:
    en: Continual improvement
    fr: Amélioration continue
  description:
    en: Identify and act on opportunities for continual improvement to enhance the ISMS's effectiveness and alignment with organizational goals.
    fr: Identifier et agir sur les opportunités d’amélioration continue pour renforcer l’efficacité du SMSI et son alignement avec les objectifs organisationnels.
  guidance:
    en: Identify and act on opportunities for continual improvement to enhance the ISMS's effectiveness and alignment with organizational goals.
    fr: Identifier et agir sur les opportunités d’amélioration continue pour renforcer l’efficacité du SMSI et son alignement avec les objectifs organisationnels.
  requirements: []
- code: '10.2'
  domain: core
  title:
    en: Nonconformity and corrective action
    fr: Non-conformité et action corrective
  description:
    en: Address nonconformities by taking corrective actions, identifying root causes, and implementing measures to prevent recurrence while documenting the process.
    fr: Traiter les non-conformités en prenant des actions correctives, en identifiant les causes profondes et en mettant en œuvre des mesures pour éviter leur récurrence, tout en documentant le processus.
  guidance:
    en: Address nonconformities by taking corrective actions, identifying root causes, and implementing measures to prevent recurrence while documenting the process.
    fr: Traiter les non-conformités en prenant des actions correctives, en identifiant les causes profondes et en mettant en œuvre des mesures pour éviter leur récurrence, tout en documentant le processus.
  requirements: []
- code: A.5.1
  domain: annex-a
  title:
    en: Policies for information security
    fr: Politiques de sécurité de l'information
  description:
    en: This control establishes and maintains information security policies aligned with organizational objectives. Measures include defining scope, setting goals, and ensuring alignment with compliance requirements.
    fr: Cette mesure de sécurité établit et maintient des politiques de sécurité de l'information alignées sur les objectifs organisationnels. Les mesures incluent la définition de la portée, la fixation des objectifs et l'alignement avec les exigences de conformité.
  guidance:
    en: This control establishes and maintains information security policies aligned with organizational objectives. Measures include defining scope, setting goals, and ensuring alignment with compliance requirements.
    fr: Cette mesure de sécurité établit et maintient des politiques de sécurité de l'information alignées sur les objectifs organisationnels. Les mesures incluent la définition de la portée, la fixation des objectifs et l'alignement avec les exigences de conformité.
  requirements: []
- code: A.5.2
  domain: annex-a
  title:
    en: Information security roles and responsibilities
    fr: Fonctions et responsabilités liées à la sécurité de l'information
  description:
    en: This control defines and assigns roles and responsibilities for information security to ensure accountability. Measures include clear documentation of responsibilities, periodic reviews, and enforcement mechanisms.
    fr: Cette mesure de sécurité définit et attribue des rôles et responsabilités en matière de sécurité de l'information pour garantir la responsabilité. Les mesures incluent une documentation claire des responsabilités, des revues périodiques et des mécanismes d'application.
  guidance:
    en: This control defines and assigns roles and responsibilities for information security to ensure accountability. Measures include clear documentation of responsibilities, periodic reviews, and enforcement mechanisms.
    fr: Cette mesure de sécurité définit et attribue des rôles et responsabilités en matière de sécurité de l'information pour garantir la responsabilité. Les mesures incluent une documentation claire des responsabilités, des revues périodiques et des mécanismes d'application.
  requirements: []
- code: A.5.3
  domain: annex-a
  title:
    en: Segregation of duties
    fr: Séparation des tâches
