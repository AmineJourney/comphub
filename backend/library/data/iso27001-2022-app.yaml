    en: This control ensures sensitive information is not left exposed by adopting clear desk and clear screen policies. Measures include locking sensitive documents away and auto-locking screens when not in use.
    fr: Cette mesure de sécurité garantit que les informations sensibles ne sont pas laissées exposées en adoptant des politiques de bureau propre et d'écran clair. Les mesures incluent le verrouillage des documents sensibles et le verrouillage automatique des écrans en cas d'inutilisation.
