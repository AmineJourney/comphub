  guidance:
    en: This control ensures that systems and data are safeguarded during audits by preventing unauthorized access, data leakage, or disruptions. Measures include using non-production environments, access restrictions, and confidentiality agreements to maintain system security and integrity.
    fr: Cette mesure de sécurité garantit que les systèmes et les données sont protégés pendant les audits en empêchant les accès non autorisés, les fuites de données ou les perturbations. Les mesures incluent l'utilisation d'environnements non productifs, des restrictions d'accès et des accords de confidentialité pour préserver la sécurité et l'intégrité des systèmes.
  requirements: []
