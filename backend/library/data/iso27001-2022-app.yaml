    en: Physical security perimeters
    fr: Périmètres de sécurité physique
  description:
    en: This control establishes physical security perimeters to protect critical areas from unauthorized access. Measures include barriers, access controls, and monitoring systems to ensure only authorized individuals can enter.
    fr: Cette mesure de sécurité établit des périmètres de sécurité physique pour protéger les zones critiques contre les accès non autorisés. Les mesures incluent des barrières, des contrôles d'accès et des systèmes de surveillance pour garantir que seules les personnes autorisées peuvent entrer.
