    fr: Cette mesure de sécurité garantit la mise en œuvre de processus de vérification pour évaluer l'adéquation des candidats avant leur embauche. Les mesures incluent des vérifications des antécédents, la vérification d'identité et l'évaluation des qualifications pour réduire les risques de sécurité.
