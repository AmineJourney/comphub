    en: Information security awareness, education and training
    fr: Sensibilisation, enseignement et formation en sécurité de l'information
  description:
    en: This control ensures that employees receive regular information security awareness, education, and training. Measures include scheduled training sessions, e-learning programs, and simulated phishing exercises.
    fr: Cette mesure de sécurité garantit que les employés reçoivent une sensibilisation, une éducation et une formation régulières en matière de sécurité de l'information. Les mesures incluent des sessions de formation planifiées, des programmes d'apprentissage en ligne et des exercices de phishing simulés.
