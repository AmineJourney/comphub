    en: Remote working
    fr: Travail à distance
  description:
    en: This control ensures the secure management of information security risks during remote working. Measures include secure access to corporate systems, mandatory use of VPNs, and policies for handling sensitive data remotely.
    fr: Cette mesure de sécurité garantit la gestion sécurisée des risques liés à la sécurité de l'information pendant le télétravail. Les mesures incluent un accès sécurisé aux systèmes de l'entreprise, l'utilisation obligatoire de VPN et des politiques pour la gestion des données sensibles à distance.
