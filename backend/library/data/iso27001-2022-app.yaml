    fr: Cette mesure de sécurité met en œuvre et maintient des mécanismes de contrôle d'accès pour limiter l'accès aux individus autorisés. Les mesures incluent des contrôles basés sur les rôles, l'authentification multifacteur et des revues périodiques.
