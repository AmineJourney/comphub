- code: CTRL-37
  domain: '1'
  title:
    en: (should)
    fr: (should)
  description:
    en: "+ During processing, reported events are categorized (e.g. by responsibility into personnel, physical and cyber), qualified (e.g. not security relevant, observation, suggested security improvement, security vulnerability, security incident) and prioritized (e.g. low, moderate, severe, critical).\n+ Responsibilities for handling of events based on their category are defined and assigned. The following aspects are considered:\n  - Coordination of incidents and vulnerabilities across multiple categories\n  - Qualification and resources\n  - Contact mechanisms based on type and priority (e.g., non-time-critical communication, time-critical communication, emergency communication)\n  - Absence-management\n+ A strategy for filing official reports and searching prosecution of potentially criminally relevant aspects of security incidents exists. (C, I, A)"
