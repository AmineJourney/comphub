- code: CTRL-20
  domain: '1'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ External IT services are not used without explicit assessment and implementation of the information security requirements:\n  - A risk assessment of the external IT services is available,\n  - Legal, regulatory, and contractual requirements are considered.\n+ The external IT services have been harmonized with the protection need of the processed information assets."
    fr: "+ External IT services are not used without explicit assessment and implementation of the information security requirements:\n  - A risk assessment of the external IT services is available,\n  - Legal, regulatory, and contractual requirements are considered.\n+ The external IT services have been harmonized with the protection need of the processed information assets."
  guidance:
    en: "+ External IT services are not used without explicit assessment and implementation of the information security requirements:\n  - A risk assessment of the external IT services is available,\n  - Legal, regulatory, and contractual requirements are considered.\n+ The external IT services have been harmonized with the protection need of the processed information assets."
    fr: "+ External IT services are not used without explicit assessment and implementation of the information security requirements:\n  - A risk assessment of the external IT services is available,\n  - Legal, regulatory, and contractual requirements are considered.\n+ The external IT services have been harmonized with the protection need of the processed information assets."
  requirements: []
- code: CTRL-21
  domain: '1'
  title:
    en: (should)
    fr: (should)
  description:
    en: '+ Requirements regarding the procurement, commissioning and release associated with the use of external IT services are determined and fulfilled.

      + A procedure for release in consideration of the protection need is established.

      + External IT services and their approval are documented.

      + It is verified at regular intervals that only approved external IT services are used.'
    fr: '+ Requirements regarding the procurement, commissioning and release associated with the use of external IT services are determined and fulfilled.

      + A procedure for release in consideration of the protection need is established.

      + External IT services and their approval are documented.

      + It is verified at regular intervals that only approved external IT services are used.'
