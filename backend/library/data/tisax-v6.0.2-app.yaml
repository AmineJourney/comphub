  title:
    en: (must)
    fr: (must)
  description:
    en: "+ Information assets and other assets where security is relevant to the organization are identified and recorded.\n  - A person responsible for these information assets is assigned.\n+ The supporting assets processing the information assets are identified and recorded:\n  - A person responsible for these supporting assets is assigned."
    fr: "+ Information assets and other assets where security is relevant to the organization are identified and recorded.\n  - A person responsible for these information assets is assigned.\n+ The supporting assets processing the information assets are identified and recorded:\n  - A person responsible for these supporting assets is assigned."
  guidance:
    en: "+ Information assets and other assets where security is relevant to the organization are identified and recorded.\n  - A person responsible for these information assets is assigned.\n+ The supporting assets processing the information assets are identified and recorded:\n  - A person responsible for these supporting assets is assigned."
