- code: CTRL-34
  domain: '1'
  title:
    en: (should)
    fr: (should)
  description:
    en: "+ A common point of contact for event reporting exists.\n+ Different reporting channels according to perceived severity exist (i.e., real time communication for significant events / emergencies in addition to asynchronous mechanisms such as tickets or email) are available.\n+ Employees are obliged and trained to report relevant events.\n+ Security event reports from external parties are considered.\n  - An externally accessible way to report security events exists and is communicated,\n  - Reaction to security event reports from external parties are defined\n+ Mechanism to - and information how to - report incidents is accessible by all relevant reporters.\n+ A feedback procedure to reporters is established."
