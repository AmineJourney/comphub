    fr: "+ A consistent scheme for the classification of information assets regarding the protection goal of confidentiality is available.\n+ Evaluation of the identified information assets is carried out according to the defined criteria and assigned to the existing classification scheme. \n+ Specifications for the handling of supporting assets (e.g. identification, correct handling, transport, storage, return, deletion/disposal) depending on the classification of information assets are in place and implemented."
  requirements: []
