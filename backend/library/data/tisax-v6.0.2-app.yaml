controls:
- code: CTRL-1
  domain: '1'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ The requirements for information security have been determined and documented:\n  - The requirements are adapted to the organization’s goals,\n  - A policy is prepared and is released by the organization.\n+ The policy includes objectives and the significance of information security within the organization."
    fr: "+ The requirements for information security have been determined and documented:\n  - The requirements are adapted to the organization’s goals,\n  - A policy is prepared and is released by the organization.\n+ The policy includes objectives and the significance of information security within the organization."
  guidance:
    en: "+ The requirements for information security have been determined and documented:\n  - The requirements are adapted to the organization’s goals,\n  - A policy is prepared and is released by the organization.\n+ The policy includes objectives and the significance of information security within the organization."
    fr: "+ The requirements for information security have been determined and documented:\n  - The requirements are adapted to the organization’s goals,\n  - A policy is prepared and is released by the organization.\n+ The policy includes objectives and the significance of information security within the organization."
  requirements: []
- code: CTRL-2
  domain: '1'
  title:
    en: (should)
    fr: (should)
  description:
    en: "+ The information security requirements based on the strategy of the organization, legislation and contracts are considered in the policy.\n+ The policy indicates consequences in case of non-conformance. \n+ Other relevant security policies are established.\n+ Periodic review and, if required, revision of the policies are established.\n+ The policies are made available to employees in a suitable form (e.g. intranet).\n+ Employees and external business partners are informed of any changes relevant to them."
    fr: "+ The information security requirements based on the strategy of the organization, legislation and contracts are considered in the policy.\n+ The policy indicates consequences in case of non-conformance. \n+ Other relevant security policies are established.\n+ Periodic review and, if required, revision of the policies are established.\n+ The policies are made available to employees in a suitable form (e.g. intranet).\n+ Employees and external business partners are informed of any changes relevant to them."
