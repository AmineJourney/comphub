    fr: (for Simplified Group Assessments)
  description:
    en: + The management system is approved by an entity that has the necessary authority for the entire assessment scope (i.e., all locations within the scope).
    fr: + The management system is approved by an entity that has the necessary authority for the entire assessment scope (i.e., all locations within the scope).
