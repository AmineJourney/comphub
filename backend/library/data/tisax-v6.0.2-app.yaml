    fr: (must)
  description:
    en: '+ Responsibilities for information security within the organization are defined, documented, and assigned.

      + The responsible employees are defined and qualified for their task.

      + The required resources are available.

      + The contact persons are known within the organization and to relevant business partners.'
    fr: '+ Responsibilities for information security within the organization are defined, documented, and assigned.

