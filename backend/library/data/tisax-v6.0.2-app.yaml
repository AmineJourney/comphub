- code: CTRL-165
  domain: '9'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ Requests from data subjects are processed in a timely manner.\n  - Procedures are in place to assist the controller in responding to data subject requests.\n  - Employees are trained to the effect that they must immediately contact the respective person responsible in the event of an incoming request from a data subject and coordinate the further procedure with this person."
