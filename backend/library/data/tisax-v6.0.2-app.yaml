- code: CTRL-164
  domain: '9'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ Transfers to third countries are known and systematically recorded.\n  - e.g. through corresponding documentation in the processing directory\n+ Sufficient guarantees (Chapter V GDPR, consideration of decisions of the ECJ on international data transfer, Transfer Impact Assessment in case of relevance, especially in the role of data exporter) are available for data transfers.\n+ In the case of data transfers to third countries, it is determined whether the consent of the person responsible is to be obtained for each transfer to third countries."
    fr: "+ Transfers to third countries are known and systematically recorded.\n  - e.g. through corresponding documentation in the processing directory\n+ Sufficient guarantees (Chapter V GDPR, consideration of decisions of the ECJ on international data transfer, Transfer Impact Assessment in case of relevance, especially in the role of data exporter) are available for data transfers.\n+ In the case of data transfers to third countries, it is determined whether the consent of the person responsible is to be obtained for each transfer to third countries."
