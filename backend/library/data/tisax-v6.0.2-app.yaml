- code: CTRL-166
  domain: '9'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ Data protection incidents (e.g. unauthorized access to personal data) are processed in a timely manner.\n+ The requirements from 1.6 of the information security questionnaire also take into account data protection incidents or, alternatively, there is an emergency plan for dealing with data protection incidents.\n+ In addition, procedures are established and documented to ensure the following aspects:\n  - immediate notification to the respective responsible person, as far as his order is affected\n  - Documentation of the incident handling activities\n  - Training of employees on the defined measures/processes\n  - Support of the respective controller in the processing of data protection incidents"
