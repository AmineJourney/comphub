- code: CTRL-72
  domain: '4'
  title:
    en: (must)
    fr: (must)
  description:
    en: "+ The requirements for the management of access rights (authorization) are determined and fulfilled. The following aspects are considered:\n  - Procedure for application, verification, and approval,\n  - Applying the minimum (“need-to-know”/\"least privilege\") principle.\n  - Access rights are revoked when no longer needed\n+ The access rights granted for normal and privileged user accounts and technical accounts are reviewed at regular intervals also within IT systems of customers."
